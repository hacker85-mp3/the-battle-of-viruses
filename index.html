function playSound(type) {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        const now = ctx.currentTime;
        if (type === 'laser') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
            gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15); osc.start(now); osc.stop(now + 0.15);
        } else if (type === 'explosion' || type === 'fire') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(type === 'fire' ? 180 : 120, now); gain.gain.setValueAtTime(0.6, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4); osc.start(now); osc.stop(now + 0.4);
        } else if (type === 'zombie') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(90, now); gain.gain.setValueAtTime(0.4, now); osc.start(now); osc.stop(now + 0.5);
        }
    } catch (e) {}
}

spawnBtn.onclick = function(e) {
    e.stopPropagation();
    if (window.spawnedThisRound >= getMaxViruses() || (window.currentRound % 10 === 0 && window.flyingViruses.length > 0)) return;
    window.spawnedThisRound++; updateSpawnButtonText();
    const isB = window.currentRound % 10 === 0;
    const bi = window.currentRound / 10;
    const ds = getDiffStats();
    let hp = isB ? (10000 * Math.pow(10, bi - 1)) : (100 * window.currentRound);
    hp *= ds.hp;
    let type = "normal";
    if (!isB) {
        let r = Math.random();
        if (r < 0.2) type = "spy";
        else if (r < 0.4) type = "doctor";
        else if (r < 0.5) type = "mutant";
    }
    createVirusElement(hp, isB, false, type);
};

function spawnLucifer() {
    window.spawnedThisRound = 1;
    createVirusElement(100000000, true, true, "lucifer");
    window.lucFireInt = setInterval(() => {
        const l = window.flyingViruses.find(v => v.isLucifer);
        if (!l) { clearInterval(window.lucFireInt); return; }
        const f = document.createElement("div"); f.className = "lucifer-fire";
        f.style.left = (l.x + 30) + "px"; f.style.top = (l.y + 30) + "px"; f.style.width = "180px"; f.style.height = "180px"; arena.appendChild(f);
        playSound('fire');
        const cs = setInterval(() => {
            if (!arena.contains(f)) { clearInterval(cs); return; }
            const fR = f.getBoundingClientRect();
            const d = Math.sqrt(Math.pow((fR.left + 90) - mouseX, 2) + Math.pow((fR.top + 90) - mouseY, 2));
            window.cursorSpeedMultiplier = d <= 90 ? 0.2 : 1;
        }, 100);
        setTimeout(() => { clearInterval(cs); window.cursorSpeedMultiplier = 1; f.remove(); }, 4000);
    }, 1500);
}

        a.style.border = "4px solid #6a5acd"; a.style.padding = "25px"; a.style.fontSize = "20px"; a.style.color = "#fff"; a.style.left = "40%"; a.style.top = "40%"; a.textContent = "👨 ЧЕЛОВЕК [500 HP]";
    } else if (type === "sigma") {
        a.style.border = "4px solid #ffd700"; a.style.padding = "25px"; a.style.fontSize = "20px"; a.style.color = "#fff"; a.style.left = "40%"; a.style.top = "40%"; a.textContent = "🗿 СИГМА [1М HP]";
    } else if (type === "vader") {
        a.style.border = "5px solid #ff0000"; a.style.padding = "35px"; a.style.fontSize = "24px"; a.style.color = "#fff"; a.style.left = "40%"; a.style.top = "40%"; a.textContent = "🌌 ВЕЙДЕР [1Т HP]";
    } else if (type === "sauron") {
        a.style.border = "5px solid #4b0082"; a.style.padding = "35px"; a.style.fontSize = "24px"; a.style.color = "#fff"; a.style.left = "40%"; a.style.top = "40%"; a.textContent = "👁️ САУРОН [INF HP]";
    } else if (isB) {
        a.style.border = "4px solid #8a2be2"; a.style.padding = "25px"; a.style.fontSize = "20px"; a.style.color = "#fff"; a.style.left = "40%"; a.style.top = "40%"; a.textContent = `👑 БОСС [${hp} HP]`;
    } else {
        a.style.padding = "8px";
        if (type === "spy") { a.style.border = "1px solid #ff00ff"; a.style.color = "#ff00ff"; hp = 1000; a.textContent = `🕵️ ШПИОН [${hp} HP]`; }
        else if (type === "doctor") { a.style.border = "1px solid #00ff00"; a.style.color = "#00ff00"; hp = 100; a.textContent = `🩺 ДОКТОР [${hp} HP]`; }
        else if (type === "mutant") { a.style.border = "2px solid #ff3300"; a.style.color = "#ff3300"; hp = 5000; a.textContent = `🧬 МУТАНТ [${hp} HP]`; }
        else if (type === "human_minion") { a.style.border = "1px solid #aaa"; a.style.color = "#aaa"; hp = 500; a.textContent = `👨 ЧЕЛОВЕК [${hp} HP]`; }
        else if (type === "vader_robot") { a.style.border = "1px solid #f00"; a.style.color = "#f00"; hp = 2000; a.textContent = `🤖 РОБОТ [${hp} HP]`; }
        else if (type === "sauron_orc") { a.style.border = "1px solid #4b0082"; a.style.color = "#4b0082"; hp = 2000; a.textContent = `👹 ОРК [${hp} HP]`; }
        else { a.style.border = "1px solid #ff3333"; a.style.color = "#ff3333"; a.textContent = `🦠 TARGET [${hp} HP]`; }
        a.style.left = Math.random() * (window.innerWidth - 150) + "px"; a.style.top = 100 + Math.random() * (window.innerHeight - 200) + "px";
    }
    arena.appendChild(a); const o = getDiffStats(); const s = (isL || type === "gazan" || type === "vader" || type === "sauron") ? 20 : (isB ? 14 : 5) * o.speed * (1 + window.currentRound * 0.05);
    window.flyingViruses.push({ element: a, x: parseFloat(a.style.left) || window.innerWidth / 2, y: parseFloat(a.style.top) || window.innerHeight / 2, speedX: (Math.random() - 0.5) * s, speedY: (Math.random() - 0.5) * s, hp: hp, maxHp: hp, isBoss: isB, isLucifer: isL, type: type, isFrozen: false, isZombie: false, isBurning: false, burnTicks: 0 });
}

function moveEngine() {
    window.flyingViruses.forEach(v => {
        if (!v.isFrozen) {
            const t = v.element.getBoundingClientRect(); v.x += v.speedX; v.y += v.speedY;
            if (v.x <= 0 || v.x + t.width >= window.innerWidth) v.speedX *= -1; if (v.y <= 0 || v.y + t.height >= window.innerHeight) v.speedY *= -1;
            window.gameWalls.forEach(w => {
                const wR = w.getBoundingClientRect(); if (v.x + t.width >= wR.left && v.x <= wR.right && v.y + t.height >= wR.top && v.y <= wR.bottom) { v.speedX *= -1; v.speedY *= -1; v.x += v.speedX * 2; v.y += v.speedY * 2; }
            });
            v.element.style.left = v.x + "px"; v.element.style.top = v.y + "px";
        }
    });
    requestAnimationFrame(moveEngine);
}
moveEngine();

setInterval(() => {
    window.flyingViruses.forEach(v => {
        if (v.type === "spy" && !v.isFrozen) v.element.style.color = v.element.style.color === "black" ? "#ff00ff" : "black";
        if (v.type === "human" && !v.isFrozen && Math.random() < 0.2) {
            let r = Math.random(); let pool = "human_minion"; if (r < 0.25) pool = "spy"; else if (r < 0.5) pool = "doctor"; else if (r < 0.75) pool = "mutant";
            createVirusElement(500, false, false, pool);
        }
        if (v.type === "vader" && !v.isFrozen && Math.random() < 0.15) { createVirusElement(2000, false, false, "vader_robot"); }
        if (v.type === "sauron" && !v.isFrozen && Math.random() < 0.15) { createVirusElement(2000, false, false, "sauron_orc"); }
        if (v.type === "doctor" && !v.isFrozen) {
            window.flyingViruses.forEach(t => { if (t !== v && Math.sqrt(Math.pow(t.x - v.x, 2) + Math.pow(t.y - v.y, 2)) <= 200) { t.hp = Math.min(t.maxHp, t.hp + 100); updateVirusText(t); } });
        }
    });
}, 1000);

let isDraggingRing = false; let ringEl = null;
arena.onmousedown = (e) => { if (e.target && e.target.id === "sauronRing") { isDraggingRing = true; ringEl = e.target; e.preventDefault(); } };
arena.onmouseup = () => {
    if (isDraggingRing && ringEl) {
        isDraggingRing = false; const rR = ringEl.getBoundingClientRect(); const vR = document.getElementById("volcanoEl").getBoundingClientRect();
        if (rR.left + 20 >= vR.left && rR.left <= vR.right && rR.top + 20 >= vR.top && rR.top <= vR.bottom) {
            const sauron = window.flyingViruses.find(v => v.type === "sauron"); if (sauron) { ringEl.remove(); document.getElementById("volcanoEl").style.display = "none"; damageVirus(sauron, 9999999999999); }
        }
    }
};
// ==========================================
// 6. СЛЕДЫ МЫШИ (МЕЧ ТЬМЫ И МЕЧ ЛЮЦИФЕРА)
// ==========================================
function handleMouseTraces() {
    if (isDraggingRing && ringEl) {
        ringEl.style.left = (realMouseX - 20) + "px"; ringEl.style.top = (realMouseY - 20) + "px";
    }
    window.flyingViruses.forEach(v => {
        const r = v.element.getBoundingClientRect();
        if (mouseX >= r.left && mouseX <= r.right && mouseY >= r.top && mouseY <= r.bottom) {
            if (window.currentWeapon === "darkBlade") {
                playSound('laser'); let d = 15 * (window.weaponLevels.darkBlade || 1);
                if (Math.random() < 0.1) d *= 3; // 10% шанс крита х3
                if (v.type !== "mutant") damageVirus(v, d * getAuraMult() * getStatusMult("darkBlade"));
            }
            if (window.currentWeapon === "luciferSword" && v.type !== "mutant" && !v.isBurning) { v.isBurning = true; v.burnTicks = 5; }
        }
    });
}

function getAuraMult() { return window.chosenAura === "dark" ? 2 : 1; }
function getStatusMult(wId) {
    let m = 1; if (window.sigmaStatus) m *= 6;
    const swordWeapons = ["darkBlade", "luciferSword", "vader_saber", "saber"];
    if (window.obiWanStatus && swordWeapons.includes(wId)) m *= 6; return m;
}

setInterval(() => {
    window.flyingViruses.forEach(v => {
        if (v.isBurning && v.burnTicks > 0) {
            v.burnTicks--; v.element.style.backgroundColor = "#ff4500";
            let t = 600 * (window.weaponLevels.luciferSword || 1); if (Math.random() < 0.1) t *= 3;
            damageVirus(v, t * getStatusMult("luciferSword")); if (v.burnTicks <= 0) { v.isBurning = false; v.element.style.backgroundColor = "black"; }
        }
    });
}, 1000);

setInterval(() => {
    const z = window.flyingViruses.filter(e => e.isZombie); const n = window.flyingViruses.filter(e => !e.isZombie);
    z.forEach(e => {
        const rectZ = e.element.getBoundingClientRect(); const g = rectZ.left + rectZ.width / 2; const a = rectZ.top + rectZ.height / 2;
        n.forEach(t => {
            const rectN = t.element.getBoundingClientRect(); const o = Math.sqrt(Math.pow((rectN.left + rectN.width / 2) - g, 2) + Math.pow((rectN.top + rectN.height / 2) - a, 2));
            const s = window.weaponLevels[window.currentWeapon] || 1; // Берем силу гипноза/зомби по саурон-настройкам
            let finalZombieDmg = 100 * s; if(window.sauronStatus) finalZombieDmg = window.zombieSettings.hp;
            if (o <= 150) { playSound('zombie'); damageVirus(t, finalZombieDmg); damageVirus(e, 100); }
        });
    });
}, 1000);

// ==========================================
// 7. КЛИКИ, АТАКИ И ОБРАБОТЧИК КРИТОВ
// ==========================================
arena.onclick = function(e) {
    const t = e.target;
    const n = t && t.textContent && (t.textContent.includes("TARGET") || t.textContent.includes("БОСС") || t.textContent.includes("ZOMBIE") || t.textContent.includes("ЛЮЦИФЕР") || t.textContent.includes("ШПИОН") || t.textContent.includes("ДОКТОР") || t.textContent.includes("МУТАНТ") || t.textContent.includes("ГАЗАН") || t.textContent.includes("ЧЕЛОВЕК") || t.textContent.includes("СИГМА") || t.textContent.includes("ВЕЙДЕР") || t.textContent.includes("САУРОН") || t.textContent.includes("РОБОТ") || t.textContent.includes("ОРК"));
    let lvl = window.weaponLevels[window.currentWeapon] || 1;
    
    if (n && window.musicianStatus && Math.random() < 0.465) {
        const w = document.createElement("div"); w.className = "sound-wave"; w.style.left = mouseX + "px"; w.style.top = mouseY + "px"; arena.appendChild(w); setTimeout(() => w.remove(), 800);
        window.flyingViruses.forEach(item => {
            if (Math.sqrt(Math.pow(item.x - mouseX, 2) + Math.pow(item.y - mouseY, 2)) <= 300) {
                item.isFrozen = true; item.element.style.borderColor = "#00ffff"; setTimeout(() => { item.isFrozen = false; item.element.style.borderColor = "#ff3333"; }, 3000); damageVirus(item, 100);
            }
        });
    }

    if (window.currentWeapon === "shocker") {
        if (Date.now() < window.cooldowns.shocker) { alert("Шокер КД!"); return; }
        window.cooldowns.shocker = Date.now() + 10000; playSound('laser');
        let a = [], o = 250; window.flyingViruses.forEach(v => { if (Math.sqrt(Math.pow(v.x - mouseX, 2) + Math.pow(v.y - mouseY, 2)) <= o) a.push(v); });
        let s = 50 * lvl * a.length; a.forEach(v => damageVirus(v, s * getStatusMult("shocker"))); return;
    }
    if (window.currentWeapon === "brick") {
        playSound('explosion'); window.flyingViruses.forEach(v => {
            const r = v.element.getBoundingClientRect(); if (mouseX >= r.left && mouseX <= r.right && mouseY >= r.top && mouseY <= r.bottom) {
                let d = 300 * lvl; if (Math.random() < 0.1) d *= 3; damageVirus(v, d * getAuraMult() * getStatusMult("brick"));
            }
        }); return;
    }
    if (n) {
        e.stopPropagation(); const a = window.flyingViruses.find(i => i.element === t); if (!a || a.isZombie) return;
        if (a.type === "sauron") { alert("Саурон неуязвим для оружия! Затолкните Кольцо в вулкан!"); return; }
        
        let o = 100;
        if (window.currentWeapon === "laser") o = 100;
        if (window.currentWeapon === "bomb_default") o = 200;
        if (window.currentWeapon === "saber") o = 1;
        if (window.currentWeapon === "human_gun") o = 600;
        if (window.currentWeapon === "human_axe") o = 400;
        if (window.currentWeapon === "vader_saber") o = 800;
        if (window.currentWeapon === "sauron_yatagan") o = 500;

        o *= lvl;
        const chanceWeapons = ["brick", "saber", "darkBlade", "luciferSword", "human_axe", "vader_saber", "sauron_yatagan"];
        if (chanceWeapons.includes(window.currentWeapon) && Math.random() < 0.1) o *= 3; // 10% шанс крита х3
        
        if (window.currentWeapon === "bomb_default") {
            playSound('explosion'); const rect = t.getBoundingClientRect(); window.flyingViruses.forEach(vItem => { if (Math.sqrt(Math.pow(vItem.x - rect.left, 2) + Math.pow(vItem.y - rect.top, 2)) <= 150) damageVirus(vItem, o * getAuraMult() * getStatusMult("bomb_default")); });
        } else {
            playSound('laser'); damageVirus(a, o * getAuraMult() * getStatusMult(window.currentWeapon));
        }
    }
};

function updateVirusText(e) {
    if (e.isZombie) e.element.textContent = `🧟 ZOMBIE [${e.hp} HP]`;
    else if (e.type === "lucifer") e.element.textContent = `😈 ЛЮЦИФЕР [${e.hp} HP]`;
    else if (e.type === "gazan") e.element.textContent = `🎵 ГАЗАН [${e.hp} HP]`;
    else if (e.type === "human") e.element.textContent = `👨 ЧЕЛОВЕК [${e.hp} HP]`;
    else if (e.type === "sigma") e.element.textContent = `🗿 СИГМА [${e.hp} HP]`;
    else if (e.type === "vader") e.element.textContent = `🌌 ВЕЙДЕР [${e.hp} HP]`;
    else if (e.type === "sauron") e.element.textContent = `👁️ САУРОН [INF HP]`;
    else if (e.isBoss) e.element.textContent = `👑 БОСС [${e.hp} HP]`;
    else e.element.textContent = `${e.type === 'spy' ? '🕵️ ШПИОН' : (e.type === 'doctor' ? '🩺 ДОКТОР' : (e.type === 'mutant' ? '🧬 МУТАНТ' : '🦠 TARGET'))} [${e.hp} HP]`;
}

function damageVirus(e, t) {
    e.hp -= t; if (e.type === "mutant" && e.hp <= 100 && e.hp + t > 100) { createVirusElement(100, false, false, Math.random() < 0.5 ? "doctor" : "spy"); }
    if (e.hp <= 0) {
        e.element.remove(); let n = 100 * window.currentRound;
        if (e.type === "lucifer") n = 50000000;
        else if (e.type === "human") n = 1000;
        else if (e.type === "sigma") n = 100000000;
        else if (e.type === "vader") n = 10500000;
        else if (e.type === "sauron") n = 1000000;
        else if (e.isBoss) n = (10000 * Math.pow(10, (window.currentRound / 10) - 1));

        const g = getDiffStats(); n *= g.cash; if (window.chosenAura === "light") n *= 2;
        
        if (e.type === "human") {
            let roll = Math.random();
            if (roll < 0.5 && !window.unlockedWeapons.includes("human_gun")) window.unlockedWeapons.push("human_gun");
            if (roll < 0.5) window.loot.human_armor++;
            if (Math.random() < 0.4025 && !window.unlockedWeapons.includes("human_axe")) window.unlockedWeapons.push("human_axe");
            alert("Человек повержен!");
        }
        if (e.type === "sigma") { window.sigmaStatus = true; localStorage.setItem("vGame_sigmaStatus", "true"); alert("Вы Сигма! Урон x6!"); }
        if (e.type === "vader") {
            let roll = Math.random(); if (roll < 0.5) window.loot.vader_mask++;
            if (roll < 0.5 && !window.unlockedWeapons.includes("vader_saber")) window.unlockedWeapons.push("vader_saber");
            if (Math.random() < 0.40) window.loot.vader_cloak++; alert("Вейдер повержен!");
        }
        if (e.type === "sauron") {
            let roll = Math.random(); if (roll < 0.5 && !window.unlockedWeapons.includes("sauron_yatagan")) window.unlockedWeapons.push("sauron_yatagan");
            if (roll < 0.1) { window.sauronStatus = true; localStorage.setItem("vGame_sauronStatus", "true"); }
            if (Math.random() < 0.40) window.loot.sauron_wall++; alert("Саурон низвергнут!");
        }
        if (e.type === "lucifer") {
            let a = Math.random(); if (a < 0.5) window.loot.luc_wings++; if (a < 0.1) window.loot.luc_dna++; if (a < 0.01) window.loot.luc_crown++;
            window.hasLuciferSword = true; localStorage.setItem("vGame_hasLuciferSword", "true"); if (!window.unlockedWeapons.includes("luciferSword")) window.unlockedWeapons.push("luciferSword");
            alert("Люцифер одолен!");
        }
        if (e.isBoss && window.currentRound === 10) { window.firstBossDefeated = true; localStorage.setItem("virusGame_boss1", "true"); }
        if (e.isBoss && window.currentRound === 100) { window.unlocked100Round = true; localStorage.setItem("vGame_r100_win", "true"); alert("🏆 100 раунд пройден!"); }
        
        if (!e.isZombie) window.score += n;
        saveAllData(); window.flyingViruses = window.flyingViruses.filter(i => i !== e); setTimeout(checkRoundEnd, 10);
    } else updateVirusText(e);
}

// Поставить стену Саурона на клавишу K
window.onkeydown = function(e) {
    const k = e.key;
    if (k.toLowerCase() === 'k' || k.toLowerCase() === 'л') {
        if (window.loot.sauron_wall <= 0) return; window.loot.sauron_wall--;
        const w = document.createElement("div"); w.className = "game-wall"; w.style.left = mouseX + "px"; w.style.top = (mouseY - 60) + "px"; arena.appendChild(w); window.gameWalls.push(w);
        setTimeout(() => { w.remove(); window.gameWalls = window.gameWalls.filter(item => item !== w); }, 8000); saveAllData();
    }
    if (k.toLowerCase() === 'q' || k.toLowerCase() === 'й') {
        if (window.bombsLeft <= 0) return; window.bombsLeft--; updateInterfaceText(); playSound('explosion');
        const b = document.createElement("div"); b.style = `position:absolute;left:${mouseX - 25}px;top:${mouseY - 25}px;width:50px;height:50px;border-radius:50%;background:red;border:3px solid white;color:white;text-align:center;line-height:50px;font-weight:bold;z-index:9998;`;
        let g = 3; b.textContent = g; arena.appendChild(b);
        const a = setInterval(() => { g--; b.textContent = g; if (g <= 0) { clearInterval(a); const rect = b.getBoundingClientRect(); const t = rect.left + 25; const z = rect.top + 25; b.remove(); window.flyingViruses.forEach(virusItem => { if (!virusItem.isZombie && Math.sqrt(Math.pow(virusItem.x - t, 2) + Math.pow(virusItem.y - z, 2)) <= 250) damageVirus(virusItem, 600); }); } }, 1000);
    }
    if (k.toLowerCase() === 'e' || k.toLowerCase() === 'у') {
        if (window.freezesLeft <= 0) return; window.freezesLeft--; updateInterfaceText(); playSound('god');
        window.flyingViruses.forEach(e => { e.isFrozen = true; e.element.style.borderColor = "#00ffff"; });
        setTimeout(() => { window.flyingViruses.forEach(e => { e.isFrozen = false; e.element.style.borderColor = e.type === 'lucifer' ? "#ff4500" : (e.isBoss ? "#8a2be2" : "#ff3333"); }); }, 5000);
    }
};

function checkRoundEnd() {
    if (window.spawnedThisRound >= getMaxViruses() && window.flyingViruses.length === 0) {
        if (window.currentRound === 20 && window.chosenAura === "none") {
            const e = confirm("Вы прошли 20 раунд! Выберите СВЕТЛУЮ ауру (Брелеры х2) - ОК, или ТЕМНУЮ (Сила х2) - Отмена"); window.chosenAura = e ? "light" : "dark"; localStorage.setItem("vGame_aura", window.chosenAura);
        }
        window.currentRound++; window.bombsLeft = 2; window.freezesLeft = 2; window.spawnedThisRound = 0; updateSpawnButtonText(); saveAllData(); updateInterfaceText(); alert(`Раунд пройден! Начинается раунд ${window.currentRound}`);
    }
}

function saveAllData() { localStorage.setItem("vGame_brelers", window.score); localStorage.setItem("vGame_round", window.currentRound); localStorage.setItem("vGame_weapons", JSON.stringify(window.unlockedWeapons)); localStorage.setItem("vGame_levels", JSON.stringify(window.weaponLevels)); localStorage.setItem("vGame_loot", JSON.stringify(window.loot)); localStorage.setItem("vGame_favorites", JSON.stringify(window.favoriteWeapons)); updateInterfaceText(); }
updateInterfaceText();
</script>
