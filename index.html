                playSound('zombie'); damageVirus(t, d); damageVirus(e, 100);
            }
        });
    });
}, 1000);

arena.onclick = function(e) {
    const t = e.target; let lvl = window.weaponLevels[window.currentWeapon] || 1;
    const isV = t && t.textContent && window.flyingViruses.some(v => v.element === t);
    
    if (window.currentWeapon === "hypnosis") {
        const targetVirus = window.flyingViruses.find(i => i.element === t || i.element === e.target);
        if (targetVirus && !targetVirus.isZombie && !targetVirus.isBoss && !targetVirus.isHorcrux) {
            e.stopPropagation(); targetVirus.isZombie = true; targetVirus.hp = window.sauronStatus ? window.zombieSettings.hp : 200 * lvl; targetVirus.maxHp = targetVirus.hp;
            targetVirus.element.style.border = "2px solid #00ff00"; targetVirus.element.style.color = "#00ff00"; updateVirusText(targetVirus); setTimeout(checkRoundEnd, 20); return;
        }
    }

    if (isV) {
        e.stopPropagation(); const a = window.flyingViruses.find(i => i.element === t); if (!a || a.isZombie) return;
        if (a.type === "sauron") { alert("Саурон уязвим только к Вулкану!"); return; }
        if (a.type === "voldemort" && window.flyingViruses.some(v => v.isHorcrux)) { alert("Волан-де-Морт защищен Крестражами!"); return; }
        
        if (a.isHorcrux) {
            a.hp--; if(a.hp <= 0) { let vold = window.flyingViruses.find(x => x.type === "voldemort"); if(vold) { vold.hp -= 1000; updateVirusText(vold); } a.element.remove(); window.flyingViruses = window.flyingViruses.filter(x => x !== a); }
            return;
        }

        let o = 100;
        if (window.currentWeapon === "laser") o = 100;
        else if (window.currentWeapon === "bomb_default") o = 200;
        else if (window.currentWeapon === "saber") o = 150;
        else if (window.currentWeapon === "human_gun") o = 600;
        else if (window.currentWeapon === "vader_saber") o = 800;
        else if (window.currentWeapon === "huggy_hand") o = 100;
        else if (window.currentWeapon === "mommy_hand") o = 200;
        else if (window.currentWeapon === "crab_claws") { o = 1000; a.isFrozen = true; setTimeout(()=>a.isFrozen=false, 2000); }
        
        o *= lvl;
        if (window.statusFat) { a.speedX = (a.x - mouseX)*0.8; a.speedY = (a.y - mouseY)*0.8; }
        if (window.currentWeapon === "bomb_default") {
            playSound('explosion'); window.flyingViruses.forEach(v => { if(!v.isZombie && !v.isHorcrux) damageVirus(v, o*getAuraMult()*getStatusMult("bomb_default")); });
        } else {
            playSound('laser'); damageVirus(a, o*getAuraMult()*getStatusMult(window.currentWeapon));
        }
    }
};

window.onkeydown = function(e) {
    const k = e.key.toLowerCase(); if (window.currentWeapon !== "magic_wand") return;
    if (k === 'a' || k === 'ф') {
        if(Date.now() < window.cooldowns.spellA) return; window.cooldowns.spellA = Date.now()+10000;
        window.flyingViruses.forEach(v => { if(!v.isZombie) { v.isFrozen = true; setTimeout(()=>v.isFrozen=false, 5000); } });
    }
    if (k === 'l' || k === 'д') {
        if(Date.now() < window.cooldowns.spellL) return; window.cooldowns.spellL = Date.now()+10000;
        window.flyingViruses.forEach(v => { if(!v.isZombie && !v.isHorcrux) { v.speedX = (v.x - mouseX)*1.5; v.speedY = (v.y - mouseY)*1.5; damageVirus(v, 250); } });
    }
    if (k === 'o' || k === 'щ') {
        if(Date.now() < window.cooldowns.spellO) return; window.cooldowns.spellO = Date.now()+30000;
        let target = window.flyingViruses.find(v => !v.isZombie && !v.isBoss && !v.isHorcrux);
        if(target) { target.isZombie = true; target.element.style.color = "#00ff00"; target.element.style.border = "2px solid #00ff00"; }
    }
    if (k === 'm' || k === 'ь') {
        if(Date.now() < window.cooldowns.spellM) return; window.cooldowns.spellM = Date.now()+60000;
        let helperInt = setInterval(() => { window.flyingViruses.forEach(v => { if(!v.isZombie && !v.isHorcrux && Math.random()<0.4) damageVirus(v, 150); }); }, 1000);
        setTimeout(() => clearInterval(helperInt), 10000);
    }
};

function updateVirusText(v) {
    if(v.isZombie) { v.element.textContent = window.hasOrcMutation ? `👹 ORC-MUTANT [${v.hp} HP]` : `🧟 ZOMBIE [${v.hp} HP]`; }
    else if(v.type === "mcdonald") { v.element.textContent = `🍔 McDONALD [${v.hp} HP | Щит: ${v.mcdShield}]`; }
    else { v.element.textContent = `[${v.type.toUpperCase()}] ${v.hp} HP`; }
}

function damageVirus(e, t) {
    if (e.mcdShield > 0) { e.mcdShield -= t; if(e.mcdShield < 0) { e.hp += e.mcdShield; e.mcdShield = 0; } updateVirusText(e); return; }
    e.hp -= t;
    if (e.hp <= 0) {
        let minions = window.flyingViruses.filter(v => ["luc_demon", "human_robot", "death_eater", "mcd_worker"].includes(v.type));
        if (["lucifer", "human", "voldemort"].includes(e.type) && minions.length > 0) {
            alert(`⚠️ Лут заблокирован! Сначала добейте оставшихся ${minions.length} слуг босса!`);
            e.element.remove(); window.flyingViruses = window.flyingViruses.filter(i => i !== e); setTimeout(checkRoundEnd, 10); return;
        }
        e.element.remove(); let reward = 100 * window.currentRound;
        if (e.type === "lucifer") { reward = 50000000; window.loot.luc_wings++; window.unlockedWeapons.push("luciferSword"); }
        else if (e.type === "human") { reward = 1000; window.loot.human_armor++; window.unlockedWeapons.push("human_gun"); }
        else if (e.type === "voldemort") { reward = 500000000000; if(Math.random()<0.5) window.unlockedWeapons.push("magic_wand"); }
        else if (e.type === "prototype_mini" || e.type === "prototype") { reward = 1000000; window.unlockedWeapons.push(Math.random()<0.5? "huggy_hand":"mommy_hand"); }
        else if (e.type === "mcdonald") { reward = 100000000; window.loot.mcd_building = 1; window.unlockedWeapons.push("mcd_tray"); }

        if (!e.isZombie) window.score += reward; saveAllData();
        window.flyingViruses = window.flyingViruses.filter(i => i !== e); setTimeout(checkRoundEnd, 10);
    } else updateVirusText(e);
}

function checkRoundEnd() {
    const normalVirusesLeft = window.flyingViruses.filter(v => !v.isZombie && !v.isHorcrux);
    if (window.spawnedThisRound >= getMaxViruses() && normalVirusesLeft.length === 0) {
        window.currentRound++; window.bombsLeft = 2; window.freezesLeft = 2; window.spawnedThisRound = 0; updateSpawnButtonText(); saveAllData(); updateInterfaceText();
    }
}

function saveAllData() { localStorage.setItem("vGame_brelers", window.score); localStorage.setItem("vGame_weapons", JSON.stringify(window.unlockedWeapons)); localStorage.setItem("vGame_levels", JSON.stringify(window.weaponLevels)); localStorage.setItem("vGame_loot", JSON.stringify(window.loot)); localStorage.setItem("vGame_favorites", JSON.stringify(window.favoriteWeapons)); localStorage.setItem("vGame_groups", JSON.stringify(window.weaponGroups)); localStorage.setItem("vGame_labLvl", window.labLevel); localStorage.setItem("vGame_labTubes", window.labTubes); updateInterfaceText(); }
updateInterfaceText();
</script>
