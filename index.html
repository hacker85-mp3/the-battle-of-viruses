    if (!window.labUnlocked) return;
    
    // Младшие лаборанты фармят броню людей
    if (window.labStaff.assistants > 0 && Math.random() < 0.1) {
        window.loot.human_armor += window.labStaff.assistants; saveAllData();
    }
    // Генетики клонируют ДНК Люцифера или маску Вейдера
    if (window.labStaff.biologists > 0 && Math.random() < 0.05) {
        for(let i=0; i < window.labStaff.biologists; i++) {
            if(Math.random() < 0.5) window.loot.luc_dna++; else window.loot.vader_mask++;
        }
        saveAllData();
    }
    // Учёные-ренегаты добывают чистую ДНК ниндзя

function playSound(type) {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination); const now = ctx.currentTime;
        if (type === 'laser') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
            gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15); osc.start(now); osc.stop(now + 0.15);
        } else if (type === 'explosion' || type === 'fire' || type === 'bass') {
            osc.type = type === 'bass' ? 'sawtooth' : 'triangle'; osc.frequency.setValueAtTime(type === 'bass' ? 60 : 120, now);
            if(type==='bass'){ osc.frequency.linearRampToValueAtTime(30, now+0.4); }
            gain.gain.setValueAtTime(0.6, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4); osc.start(now); osc.stop(now + 0.4);
        } else if (type === 'zombie') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(90, now); gain.gain.setValueAtTime(0.4, now); osc.start(now); osc.stop(now + 0.5);
        }
    } catch (e) {}
}

        if (Date.now() < window.cooldowns.shocker) { alert("Шокер КД!"); return; }
        window.cooldowns.shocker = Date.now() + 10000; playSound('laser');
        let a = [], o = 250; window.flyingViruses.forEach(v => { if (!v.isZombie && Math.sqrt(Math.pow(v.x - mouseX, 2) + Math.pow(v.y - mouseY, 2)) <= o) a.push(v); });
        let s = 50 * lvl * a.length; a.forEach(v => damageVirus(v, s * getStatusMult("shocker"))); return;
    }

    if (window.currentWeapon === "brick" || window.currentWeapon === "fire_brick") {
        let isFire = window.currentWeapon === "fire_brick"; playSound('explosion');
        window.flyingViruses.forEach(v => {
            const r = v.element.getBoundingClientRect(); if (mouseX >= r.left && mouseX <= r.right && mouseY >= r.top && mouseY <= r.bottom) {
                let d = (isFire ? 450 : 300) * lvl; if (Math.random() < 0.1) d *= 3;
                if (!v.isZombie) { damageVirus(v, d * getAuraMult() * getStatusMult(window.currentWeapon)); if(isFire && !v.isBurning) { v.isBurning = true; v.burnTicks = 4; } }
            }
        }); return;
    }

    if (n) {
        e.stopPropagation(); const a = window.flyingViruses.find(i => i.element === t); if (!a || a.isZombie) return;
        if (a.type === "sauron") { alert("Саурон неуязвим для оружия! Затолкните Кольцо в вулкан!"); return; }
        
        if (a.type === "neon_ninja" && !window.statusShadow && Math.random() < 0.4) {
            a.x = Math.random() * (window.innerWidth - 200); a.y = 100 + Math.random() * (window.innerHeight - 200);
            createVirusElement(5000, false, false, "ninja_shuriken");
            alert("🥷 Ниндзя уклонился от удара («Шаг Сквозь Тень») и выпустил сюрикен!"); return;
        }
        
        let dmg = 100;
        if (window.currentWeapon === "laser") dmg = 100;
        else if (window.currentWeapon === "bomb_default") dmg = 200;
        else if (window.currentWeapon === "saber") dmg = 1;
        else if (window.currentWeapon === "human_gun") dmg = 600;
        else if (window.currentWeapon === "human_axe") dmg = 400;
        else if (window.currentWeapon === "vader_saber") dmg = 800;
        else if (window.currentWeapon === "sauron_yatagan") dmg = 500;
        
        else if (window.currentWeapon === "wooden_hammer") { dmg = 150; if(Math.random() < 0.25) { a.isFrozen = true; a.element.style.borderColor = "#00ffff"; setTimeout(() => { a.isFrozen = false; a.element.style.borderColor = "red"; }, 2000); } }
        else if (window.currentWeapon === "rusty_axe") { dmg = 80; }
        else if (window.currentWeapon === "kitchen_knife") { dmg = 30; setInterval(() => { if(window.flyingViruses.includes(a) && a.hp > 0) { a.hp -= 10; if(a.hp <= 0) damageVirus(a, 0); else updateVirusText(a); } }, 1000); }
        else if (window.currentWeapon === "heavy_club") { dmg = 350; a.speedX = (Math.random() - 0.5) * 30; a.speedY = (Math.random() - 0.5) * 30; }
        else if (window.currentWeapon === "broken_pitchfork") { dmg = 70; window.flyingViruses.forEach(v => { if(!v.isZombie && Math.sqrt(Math.pow(v.x - a.x, 2) + Math.pow(v.y - a.y, 2)) <= 80) damageVirus(v, 70 * lvl); }); }
        else if (window.currentWeapon === "boomerang") { dmg = 80; let next = window.flyingViruses.find(v => v !== a && !v.isZombie); if(next) damageVirus(next, 50 * lvl); }
        else if (window.currentWeapon === "dart") { dmg = 120; }
        else if (window.currentWeapon === "coin") { dmg = Math.floor(Math.random() * 500) + 1; }
        else if (window.currentWeapon === "paper_plane") { dmg = 100; }
        else if (window.currentWeapon === "bowling_ball") { dmg = 200; }
        else if (window.currentWeapon === "water_gun") { dmg = 50; a.speedX *= 0.6; a.speedY *= 0.6; }
        else if (window.currentWeapon === "water_balloon") { dmg = 40; window.flyingViruses.forEach(v => { if(!v.isZombie && Math.sqrt(Math.pow(v.x - a.x, 2) + Math.pow(v.y - a.y, 2)) <= 150) { v.speedX *= 0.5; v.speedY *= 0.5; } }); }
        else if (window.currentWeapon === "glue_bottle") { dmg = 0; a.isFrozen = true; setTimeout(() => { a.isFrozen = false; }, 5000); }
        else if (window.currentWeapon === "fan") { dmg = 0; window.flyingViruses.forEach(v => { if(!v.isZombie) { v.speedX = (v.x - mouseX) * 0.5; v.speedY = (v.y - mouseY) * 0.5; } }); }
        else if (window.currentWeapon === "pepper_spray") { dmg = 50; a.speedX = (Math.random() - 0.5) * 25; a.speedY = (Math.random() - 0.5) * 25; }
        else if (window.currentWeapon === "magnet") { dmg = 10; window.score += Math.floor(a.hp * 0.05); saveAllData(); }
        else if (window.currentWeapon === "flash") {
            if(Date.now() < window.cooldowns.flash) return; window.cooldowns.flash = Date.now() + 8000;
            window.flyingViruses.forEach(v => { v.isFrozen = true; if(window.dnaGC && !v.isZombie) damageVirus(v, 5000); setTimeout(() => v.isFrozen = false, 2000); }); return;
        }
        else if (window.currentWeapon === "yoyo") { dmg = 200; }
        else if (window.currentWeapon === "bubbles") { dmg = 120; }
        else if (window.currentWeapon === "box_wall") { dmg = 0; const w = document.createElement("div"); w.className = "game-wall"; w.style.width = "30px"; w.style.height = "30px"; w.style.left = mouseX + "px"; w.style.top = mouseY + "px"; arena.appendChild(w); window.gameWalls.push(w); setTimeout(() => { w.remove(); window.gameWalls = window.gameWalls.filter(x => x !== w); }, 3000); }
        
        else if (window.currentWeapon === "huggy_hand") dmg = 100;
        else if (window.currentWeapon === "mommy_hand") { dmg = 200; const w = document.createElement("div"); w.className = "game-wall"; w.style.width = "40px"; w.style.height = "40px"; w.style.borderRadius = "50%"; w.style.left = mouseX + "px"; w.style.top = mouseY + "px"; arena.appendChild(w); window.gameWalls.push(w); setTimeout(() => { w.remove(); window.gameWalls = window.gameWalls.filter(x => x !== w); }, 4000); }
        else if (window.currentWeapon === "crab_claws") { dmg = 1000; a.isFrozen = true; setTimeout(() => { a.isFrozen = false; }, 2000); }
        else if (window.currentWeapon === "murasama_blade") dmg = 10000;

        dmg *= lvl;
        let critChance = window.currentWeapon === "rusty_axe" || window.currentWeapon === "crab_claws" ? 0.25 : 0.1;
        if(window.statusShadow) critChance += 0.50;
        
        const chanceWeapons = ["brick", "saber", "darkBlade", "luciferSword", "human_axe", "vader_saber", "sauron_yatagan", "fire_brick", "rusty_axe", "crab_claws", "murasama_blade"];
        if (chanceWeapons.includes(window.currentWeapon) && Math.random() < critChance) dmg *= 3;
        if (window.hasNoviceBracers) window.score += 5;
        if (window.statusFat) { a.speedX = (a.x - mouseX) * 0.4; a.speedY = (a.y - mouseY) * 0.4; }

        if (window.currentWeapon === "bomb_default") {
            playSound('explosion'); const rect = t.getBoundingClientRect(); window.flyingViruses.forEach(vItem => { if (!vItem.isZombie && Math.sqrt(Math.pow(vItem.x - rect.left, 2) + Math.pow(vItem.y - rect.top, 2)) <= 150) damageVirus(vItem, dmg * getAuraMult() * getStatusMult("bomb_default")); });
        } else {
            playSound('laser'); damageVirus(a, dmg * getAuraMult() * getStatusMult(window.currentWeapon));
        }
    }
};
window.onkeydown = function(e) {
    const k = e.key.toLowerCase();
    let lvl = window.weaponLevels.magic_wand || 1;

    // УПРАВЛЕНИЕ ЗАКЛИНАНИЯМИ ВОЛШЕБНОЙ ПАЛОЧКИ
    if (window.currentWeapon === "magic_wand") {
        if (k === 'a' || k === 'ф') {
            if (Date.now() < window.cooldowns.spellA) { alert("Заморозка на КД!"); return; }
            window.cooldowns.spellA = Date.now() + 10000; playSound('laser');
            window.flyingViruses.forEach(v => { if(!v.isZombie) { v.isFrozen = true; v.element.style.borderColor = "#00ffff"; setTimeout(() => { v.isFrozen = false; v.element.style.borderColor = "red"; }, 5000); } });
            alert("🪄 Заклинание А: Всё поле заморожено на 5 секунд!");
        }
        if (k === 'l' || k === 'д') {
            if (Date.now() < window.cooldowns.spellL) { alert("Отброс на КД!"); return; }
            window.cooldowns.spellL = Date.now() + 10000; playSound('explosion');
            window.flyingViruses.forEach(v => {
                if(!v.isZombie) { v.speedX = (v.x - mouseX) * 0.6; v.speedY = (v.y - mouseY) * 0.6; damageVirus(v, 250 * lvl); }
            });
            alert("🪄 Заклинание L: Волна отбросила врагов и нанесла 250 урона!");
        }
        if (k === 'o' || k === 'щ') {
            if (Date.now() < window.cooldowns.spellO) { alert("Массовый Гипноз на КД!"); return; }
            window.cooldowns.spellO = Date.now() + 30000; playSound('zombie');
            let count = 0;
            window.flyingViruses.forEach(v => {
                if(!v.isZombie && !v.isBoss && count < 3) {
                    v.isZombie = true; v.hp = 300 * lvl; v.maxHp = v.hp; v.element.style.border = "2px solid #00ff00"; v.element.style.color = "#00ff00"; updateVirusText(v); count++;
                }
            });
            alert(`🪄 Заклинание O: Загипнотизировано врагов: ${count}!`); setTimeout(checkRoundEnd, 20);
        }
        if (k === 'm' || k === 'ь') {
            if (Date.now() < window.cooldowns.spellM) { alert("Призыв магов на КД!"); return; }
            window.cooldowns.spellM = Date.now() + 60000; playSound('god');
            alert("🪄 Заклинание M: Призваны два волшебника-помощника!");
            for(let i=0; i<2; i++) {
                const helper = document.createElement("div"); helper.style = `position:absolute;left:${mouseX + (i===0?-80:80)}px;top:${mouseY + 50}px;padding:8px;background:purple;color:white;font-weight:bold;z-index:9996;border-radius:50%;`;
                arena.appendChild(helper);
                const shootInt = setInterval(() => {
                    if(!arena.contains(helper)) { clearInterval(shootInt); return; }
                    let target = window.flyingViruses.find(v => !v.isZombie);
                    if(target) { playSound('laser'); damageVirus(target, 150 * lvl); }
                }, 1500);
                setTimeout(() => { helper.remove(); clearInterval(shootInt); }, 15000);
            }
        }
    }

    if (k === 'k' || k === 'л') {
        if (!window.hasObiShield) { if (window.loot.sauron_wall <= 0) return; window.loot.sauron_wall--; }
        const n = document.createElement("div"); n.className = "game-wall";
        if (window.hasObiShield) { n.style.height = "220px"; n.style.boxShadow = "0 0 35px #00ffea"; n.style.background = "#00ffea"; }
        n.style.left = mouseX + "px"; n.style.top = mouseY + "px"; arena.appendChild(n); window.gameWalls.push(n);
        let standTime = window.hasObiShield ? 15000 : 8000;
        setTimeout(() => { n.remove(); window.gameWalls = window.gameWalls.filter(w => w !== n); }, standTime); saveAllData();
    }
    if (k === 'q' || k === 'й') {
        if (window.bombsLeft <= 0) return; window.bombsLeft--; updateInterfaceText(); playSound('explosion');
        const b = document.createElement("div"); b.style = `position:absolute;left:${mouseX - 25}px;top:${mouseY - 25}px;width:50px;height:50px;border-radius:50%;background:red;border:3px solid white;color:white;text-align:center;line-height:50px;font-weight:bold;z-index:9998;`;
        let g = 3; b.textContent = g; arena.appendChild(b);
        const a = setInterval(() => { g--; b.textContent = g; if (g <= 0) { clearInterval(a); const rect = b.getBoundingClientRect(); const t = rect.left + 25; const z = rect.top + 25; b.remove(); window.flyingViruses.forEach(virusItem => { if (!virusItem.isZombie && Math.sqrt(Math.pow(virusItem.x - t, 2) + Math.pow(virusItem.y - z, 2)) <= 250) damageVirus(virusItem, 600); }); } }, 1000);
    }
    if (k === 'e' || k === 'у') {
        if (window.freezesLeft <= 0) return; window.freezesLeft--; updateInterfaceText(); playSound('god');
        window.flyingViruses.forEach(e => { e.isFrozen = true; e.element.style.borderColor = "#00ffff"; });
        setTimeout(() => { window.flyingViruses.forEach(e => { e.isFrozen = false; e.element.style.borderColor = "red"; }); }, 5000);
    }
};

function checkRoundEnd() {
    const normalVirusesLeft = window.flyingViruses.filter(v => !v.isZombie);
    if (window.spawnedThisRound >= getMaxViruses() && normalVirusesLeft.length === 0) {
        if (window.currentRound === 20 && window.chosenAura === "none") {
            const e = confirm("Вы прошли 20 раунд! Выберите СВЕТЛУЮ ауру (Брелеры x2) - ОК, или ТЕМНУЮ (Сила x2) - Отмена"); window.chosenAura = e ? "light" : "dark"; localStorage.setItem("vGame_aura", window.chosenAura);
        }
        window.currentRound++; window.bombsLeft = 2; window.freezesLeft = 2; window.spawnedThisRound = 0; updateSpawnButtonText(); saveAllData(); updateInterfaceText(); alert(`Раунд пройден! Начинается раунд ${window.currentRound}`);
    }
}

function hasAliveMinions(bossType) {
    if (bossType === "human") return window.flyingViruses.some(v => v.type === "human_robot");
    if (bossType === "lucifer") return window.flyingViruses.some(v => v.type === "luc_demon");
    if (bossType === "voldemort") return window.flyingViruses.some(v => v.type === "death_eater") || document.getElementsByClassName("voldemort-horcrux").length > 0;
    if (bossType === "neon_ninja") return window.flyingViruses.some(v => v.type === "ninja_shuriken");
    return false;
}

function updateVirusText(v) {
    if(v.isZombie) { v.element.textContent = window.hasOrcMutation ? `👹 ORC-MUTANT [${v.hp} HP]` : `尊 ZOMBIE [${v.hp} HP]`; }
    else { v.element.textContent = `[${v.type.toUpperCase()}] ${v.hp} HP`; }
}

function damageVirus(e, t) {
    if (e.type === "prototype" && e.hp > 0 && e.hp - t <= e.maxHp / 2 && !e.hasSplit) {
        e.hasSplit = true; e.element.remove(); window.flyingViruses = window.flyingViruses.filter(i => i !== e);
        alert("🤖 Прототип 1006 разделился на два сверхбыстрых клона!");
        for(let i=0; i<2; i++) {
            const cloneHp = Math.floor(e.maxHp / 4);
            const a = document.createElement("div"); a.style = `position:absolute;background:#111;border:3px solid #0000ff;padding:15px;font-size:14px;color:white;font-weight:bold;z-index:9995;left:${e.x + (i===0?-50:50)}px;top:${e.y}px;`;
            a.textContent = `🤖 КЛОН 1006 [${cloneHp.toLocaleString()} HP]`; arena.appendChild(a);
            window.flyingViruses.push({ element: a, x: e.x + (i===0?-50:50), y: e.y, speedX: (Math.random()-0.5)*40, speedY: (Math.random()-0.5)*40, hp: cloneHp, maxHp: cloneHp, isBoss: false, isLucifer: false, type: "prototype_clone", isFrozen: false, isZombie: false, isBurning: false, burnTicks: 0, isGigachad: false });
        }
        return;
    }

    e.hp -= t; if (e.type === "mutant" && e.hp <= 100 && e.hp + t > 100 && !e.isZombie) { createVirusElement(100, false, false, Math.random() < 0.5 ? "doctor" : "spy"); }
    if (e.hp <= 0) {
        if(e.type === "sigma" && e.bassInterval) clearInterval(e.bassInterval);
        if (hasAliveMinions(e.type)) {
            e.element.remove(); window.flyingViruses = window.flyingViruses.filter(i => i !== e);
            alert(`⚠️ Босс повержен, но его свита или крестражи всё ещё активны! Убейте их всех, чтобы забрать лут!`);
            setTimeout(checkRoundEnd, 10); return;
        }

        e.element.remove(); let reward = 100 * window.currentRound;
        if (e.type === "lucifer") reward = 50000000;
        else if (e.type === "human") reward = 1000;
        else if (e.type === "sigma") reward = 100000000;
        else if (e.type === "vader") reward = 10500000;
        else if (e.type === "sauron") reward = 1000000;
        else if (e.type === "gazan") reward = 1000000;
        else if (e.type === "voldemort") reward = 500000000000;
        else if (e.type === "prototype_clone" || e.type === "prototype") reward = 1000000;
        else if (e.type === "mcdonald") reward = 50000000;
        else if (e.type === "neon_ninja") reward = 500000000;
        else if (e.isBoss) reward = (10000 * Math.pow(10, (window.currentRound / 10) - 1));

        const g = getDiffStats(); reward *= g.cash; if (window.chosenAura === "light") reward *= 2;
        
        if (e.type === "human") {
            let roll = Math.random(); if (roll < 0.5 && !window.unlockedWeapons.includes("human_gun")) window.unlockedWeapons.push("human_gun");
            if (roll < 0.5) window.loot.human_armor++; if (Math.random() < 0.4025 && !window.unlockedWeapons.includes("human_axe")) window.unlockedWeapons.push("human_axe");
            alert("Человек повержен!");
        }
        if (e.type === "sigma") { window.sigmaStatus = true; localStorage.setItem("vGame_sigmaStatus", "true"); alert("Вы Сигма! Урон x6!"); }
        if (e.type === "vader") {
            let roll = Math.random(); if (roll < 0.5) window.loot.vader_mask++; if (roll < 0.5 && !window.unlockedWeapons.includes("vader_saber")) window.unlockedWeapons.push("vader_saber");
            if (Math.random() < 0.40) window.loot.vader_cloak++; alert("Вейдер повержен!");
        }
        if (e.type === "sauron") {
            let roll = Math.random(); if (roll < 0.5 && !window.unlockedWeapons.includes("sauron_yatagan")) window.unlockedWeapons.push("sauron_yatagan");
            if (roll < 0.1) { window.sauronStatus = true; localStorage.setItem("vGame_sauronStatus", "true"); }
            if (Math.random() < 0.40) window.loot.sauron_wall++; alert("Саурон низвергнут!");
        }
        if (e.type === "lucifer") {
            let a = Math.random(); if (a < 0.5) window.loot.luc_wings++; if (a < 0.1) window.loot.luc_dna++; if(Math.random()<0.05) window.loot.luc_crown++; window.unlockedWeapons.push("luciferSword");
        }
        if (e.type === "voldemort") {
            if (Math.random() < 0.50 && !window.unlockedWeapons.includes("magic_wand")) window.unlockedWeapons.push("magic_wand");
            alert("🔮 Волан-Де-Морт окончательно уничтожен! Мир магии спасен!");
        }
        if (e.type === "prototype_clone") {
            let roll = Math.random();
            if (roll < 0.60) { window.loot.huggy_hand_item++; if(!window.unlockedWeapons.includes("huggy_hand")) window.unlockedWeapons.push("huggy_hand"); alert("Выпал лут: Рука Хагги Вагги!"); }
            else if (roll < 0.90) { window.loot.mommy_hand_item++; if(!window.unlockedWeapons.includes("mommy_hand")) window.unlockedWeapons.push("mommy_hand"); alert("Выпал лут: Рука Мамочки!"); }
            else { window.loot.claws_item++; if(!window.unlockedWeapons.includes("crab_claws")) window.unlockedWeapons.push("crab_claws"); alert("🔥 РЕДКИЙ ЛУТ: Клешни Прототипа!"); }
        }
        if (e.type === "mcdonald") {
            let roll = Math.random();
            if (roll < 0.60) { window.loot.mcd_tray_item++; if(!window.unlockedWeapons.includes("mcd_tray")) window.unlockedWeapons.push("mcd_tray"); alert("Выпал лут: Поднос Макдоналдс!"); }
            else if (roll < 0.90) { window.statusFat = true; localStorage.setItem("vGame_statusFat", "true"); alert("Вы получили статус: ЖИРНЫЙ!"); }
            else { window.loot.mcd_building++; document.getElementById("mcdRestaurantEl").style.display = "block"; alert("🏢 УЛЬТРА-ЛУТ: Построен Макдоналдс!"); }
        }
        if (e.type === "neon_ninja") {
            let roll = Math.random();
            if (roll < 0.30) { window.loot.ninja_pure_dna++; alert("Выпал лут: Образец Чистой ДНК!"); }
            else if (roll < 0.80) { if(!window.unlockedWeapons.includes("murasama_blade")) window.unlockedWeapons.push("murasama_blade"); alert("Выпал лут: Клинок Мурасама!"); }
            else { window.statusShadow = true; localStorage.setItem("vGame_statusShadow", "true"); alert("🥷 УЛЬТРА-СТАТУС: Вы Тень!"); }
        }

        if (!e.isZombie) window.score += reward; saveAllData();
        window.flyingViruses = window.flyingViruses.filter(i => i !== e); setTimeout(checkRoundEnd, 10);
    } else updateVirusText(e);
}

function saveAllData() { localStorage.setItem("vGame_brelers", window.score); localStorage.setItem("vGame_weapons", JSON.stringify(window.unlockedWeapons)); localStorage.setItem("vGame_levels", JSON.stringify(window.weaponLevels)); localStorage.setItem("vGame_loot", JSON.stringify(window.loot)); localStorage.setItem("vGame_favorites", JSON.stringify(window.favoriteWeapons)); localStorage.setItem("vGame_groups", JSON.stringify(window.weaponGroups)); localStorage.setItem("vGame_labUnlocked", window.labUnlocked); localStorage.setItem("vGame_labFurniture", JSON.stringify(window.labFurniture)); localStorage.setItem("vGame_labStaff", JSON.stringify(window.labStaff)); updateInterfaceText(); }
updateInterfaceText();
if(window.loot.mcd_building >= 1) document.getElementById("mcdRestaurantEl").style.display = "block";
</script>
