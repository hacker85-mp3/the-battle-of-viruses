function createWeaponShopRow(item, isEx) {

    const left = document.createElement("div"); left.innerHTML = `<span style="color:${item.color};font-weight:bold;">${item.name} [Ур. ${lvl}]</span><br><span style="font-size:11px;color:#aaa;">${item.desc}</span>`;
    const right = document.createElement("div"); right.style.display = "flex"; right.style.gap = "6px";
    
    const buyBtn = document.createElement("button"); buyBtn.style.padding = "5px 8px";
    if (isUn) { buyBtn.textContent = "РАЗБЛОКИРОВАНО"; buyBtn.style = "background:#222;color:#555;border:1px solid #555;"; }
    else if (item.isDropOnly) { buyBtn.textContent = "ЛУТ / КРАФТ"; buyBtn.style = "background:#200;color:#ff3333;border:1px solid #ff3333;"; }
    else { buyBtn.textContent = `КУПИТЬ (${item.cost})`; buyBtn.style = "background:black;color:#00ff00;border:1px solid #00ff00;cursor:pointer;"; buyBtn.onclick = () => { if (window.score >= item.cost) { window.score -= item.cost; window.unlockedWeapons.push(item.id); saveAllData(); switchTab(isEx ? "shop_exclusive" : "shop_normal"); } }; }
    
    const upCost = item.upgradeCost * lvl; const upBtn = document.createElement("button"); upBtn.style = "padding:5px 8px;cursor:pointer;";
    upBtn.textContent = lvl >= 10 ? "МАКС" : `УЛУЧШИТЬ (+${upCost})`; upBtn.disabled = !isUn || lvl >= 10;
    upBtn.onclick = () => { if (window.score >= upCost) { window.score -= upCost; window.weaponLevels[item.id]++; saveAllData(); switchTab(isEx ? "shop_exclusive" : "shop_normal"); } };
    
    right.appendChild(buyBtn); right.appendChild(upBtn); row.appendChild(left); row.appendChild(right); tabContainer.appendChild(row);
}

function spawnGazan() { window.spawnedThisRound = 1; createVirusElement(1000000, true, false, "gazan"); }
function spawnSauronFight() { document.getElementById("volcanoEl").style.display = "block"; window.spawnedThisRound = 1; createVirusElement(99999999, true, false, "sauron"); const r = document.createElement("div"); r.id = "sauronRing"; r.style = "position:absolute;left:100px;top:200px;width:40px;height:40px;border-radius:50%;background:gold;box-shadow:0 0 20px gold;cursor:grab;z-index:9996;text-align:center;line-height:40px;font-weight:bold;color:red;"; r.textContent = "💍"; arena.appendChild(r); }

// НОВЫЙ СЕТОЧНЫЙ RPG-ИНВЕНТАРЬ И ЦИТАДЕЛЬ ТЮРЬМЫ
function renderInventory() {
    // 1. Панель Саурона (Если статус активен)
    if (window.sauronStatus) {
        const sBox = document.createElement("div"); sBox.style = "border:2px solid #4b0082;padding:10px;margin-bottom:15px;background:#110022;";
        sBox.innerHTML = `<b style="color:#ba55d3;">👁️ ЦИТАДЕЛЬ САУРОНА И РАБОВЛАДЕЛЬЧЕСКИЙ БЛОК ШАХТ</b><br>
        Активно добывающих Шахт: <b>${window.loot.mine_count} шт.</b> | Пленников под землей: <b>${window.loot.prisoner_count} человек</b><br>
        <span style="color:#aaa;font-size:11px;">[Шахты приносят пассивно: ${(window.loot.prisoner_count * 1000).toLocaleString()} бр/мин и имеют шанс выкопать Кристаллы 💎]</span>`;
        tabContainer.appendChild(sBox);
    }

    // 2. Красивая RPG плиточная сетка Арсенала Оружия
    const h = document.createElement("h3"); h.textContent = "🎒 ОРУЖЕЙНЫЕ СЛОТЫ РЮКЗАКА (КЛИК ДЛЯ ВЫБОРА)"; tabContainer.appendChild(h);
    const grid = document.createElement("div"); grid.className = "inv-grid";
    
    const names = { laser: "Лазер", bomb_default: "Бомба", brick: "Кирпич", poison: "Отрава", darkBlade: "Меч Тьмы", gandalfStaff: "Посох Гэндальфа", hypnosis: "Гипноз", luciferSword: "Меч Люцифера", saber: "Сабля", human_gun: "Пушка", vader_saber: "Меч Вейдера", sauron_yatagan: "Ятаган Саурона", magic_wand: "Палочка 🪄", ninja_shuriken: "Сюрикены 🥷", ninja_katana: "Катана ⚔️", king_crown: "Корона 👑", catcher_net: "Сетка ЛОВЦА 🕸️" };
    
    window.unlockedWeapons.forEach(wId => {
        const slot = document.createElement("div"); slot.className = "inv-slot";
        if(window.currentWeapon === wId) slot.style.borderColor = "#fff";
        slot.innerHTML = `<b>${names[wId] || wId}</b><br><span style="font-size:10px;color:#aaa;">Ур.${window.weaponLevels[wId]||1}</span>`;
        slot.style.cursor = "pointer";
        slot.onclick = () => { window.currentWeapon = wId; updateInterfaceText(); renderInventory(); };
        grid.appendChild(slot);
    });
    tabContainer.appendChild(grid);

    // 3. Склад ресурсов и лута
    const lh = document.createElement("h3"); lh.textContent = "💎 СКЛАД МАТЕРИАЛОВ"; tabContainer.appendChild(lh);

    lDiv.innerHTML = `🟢 Обычные ДНК: <b>${window.loot.dna_normal} шт.</b> | 🟣 Шпионские ДНК: <b>${window.loot.dna_spy} шт.</b><br>🟡 Докторские ДНК: <b>${window.loot.dna_doctor} шт.</b> | 🔴 Мутантные ДНК: <b>${window.loot.dna_mutant} шт.</b>`;

// ФУНКЦИЯ ДЕГРАДАЦИИ ЗДОРОВЬЯ И ЛУТА (СПАВНЕР РАБОТАЕТ ЧЕТКО!)
function createVirusElement(hp, isB, isL, type) {
    const a = document.createElement("div"); a.style = "position:absolute;background:black;font-family:monospace;font-weight:bold;cursor:crosshair;z-index:9995;padding:8px;border:1px solid red;color:red;";
    if (type === "lucifer") { a.style = "position:absolute;border:6px solid #ff4500;padding:40px;fontSize:26px;color:#fff;background:linear-gradient(45deg,#ff4500,#ff8c00);left:40%;top:40%;"; a.textContent = "😈 ЛЮЦИФЕР"; }
    else if (type === "gazan") { a.style = "position:absolute;border:5px dashed #00ffff;padding:30px;fontSize:22px;color:#00ffff;left:40%;top:40%;"; a.textContent = "🎵 ГАЗАН"; }
    else if (type === "sauron") { a.style = "position:absolute;border:5px solid #4b0082;padding:35px;fontSize:24px;color:#fff;left:40%;top:40%;"; a.textContent = "👁️ САУРОН [INF HP]"; }
    else {
        if (type === "spy") { a.style.borderColor = "#ff00ff"; a.style.color = "#ff00ff"; a.textContent = `🕵️ ШПИОН [${hp}]`; }
        else if (type === "doctor") { a.style.borderColor = "#00ff00"; a.style.color = "#00ff00"; a.textContent = `🩺 ДОКТОР [${hp}]`; }
        else if (type === "mutant") { a.style.borderColor = "#ff3300"; a.style.color = "#ff3300"; a.textContent = `🧬 МУТАНТ [${hp}]`; }
        else { a.textContent = `🦠 ВИРУС [${hp}]`; }
        a.style.left = Math.random() * (window.innerWidth - 150) + "px"; a.style.top = 100 + Math.random() * (window.innerHeight - 200) + "px";
    }
    arena.appendChild(a); const o = getDiffStats();
    let s = (isL || ["gazan","sauron"].includes(type)) ? 18 : (isB ? 12 : 5) * o.speed * (1 + window.currentRound * 0.05);
    let vObj = { element: a, x: parseFloat(a.style.left) || 200, y: parseFloat(a.style.top) || 200, speedX: (Math.random() - 0.5) * s, speedY: (Math.random() - 0.5) * s, hp: hp, maxHp: hp, isBoss: isB, type: type, isFrozen: false, isZombie: false };
    window.flyingViruses.push(vObj);
    if(type === "gazan") { vObj.gInt = setInterval(() => { if (window.flyingViruses.includes(vObj)) { vObj.x = Math.random()*(window.innerWidth-180); vObj.y = 100+Math.random()*(window.innerHeight-180); } else clearInterval(vObj.gInt); }, 2000); }
}

function handleMouseTraces() {}
function updateVirusText(v) { if(v.element) v.element.textContent = v.isZombie ? `🧟 ZOMBIE [${v.hp}]` : `[${v.type.toUpperCase()}] ${v.hp} HP`; }

function damageVirus(e, t) {
    if (e.isCaptured) return; e.hp -= t;
    if (e.hp <= 0) {
        if (e.type === "normal") window.loot.dna_normal++;
        if (e.type === "spy") window.loot.dna_spy++;
        if (e.type === "doctor") window.loot.dna_doctor++;
        if (e.type === "mutant") window.loot.dna_mutant++;
        e.element.remove(); window.score += 100 * window.currentRound; saveAllData();
        window.flyingViruses = window.flyingViruses.filter(i => i !== e); setTimeout(checkRoundEnd, 10);
    } else updateVirusText(e);
}
// ХОТКЕИ КЛАВИШ Q, E, K И ПРОВЕРКА КОНЦА РАУНДА
window.onkeydown = function(e) {
    const k = e.key.toLowerCase();
    
    // Клавиша Q - Супер-Бомба
    if (k === 'q' || k === 'й') {
        window.flyingViruses.forEach(v => { if(!v.isZombie) damageVirus(v, 1500); });
        const wave = document.createElement("div"); wave.className = "sound-wave"; wave.style = `left:${realMouseX-100}px;top:${realMouseY-100}px;width:200px;height:200px;`; arena.appendChild(wave); setTimeout(()=>wave.remove(), 800);
    }
    // Клавиша E - Заморозка
    if (k === 'e' || k === 'у') {
        window.flyingViruses.forEach(v => { v.isFrozen = true; setTimeout(()=>v.isFrozen=false, 4000); });
    }
    // Клавиша K - Вечные Стены Саурона (ставятся четко под курсором!)
    if (k === 'k' || k === 'л') {
        const w = document.createElement("div"); w.className = "game-wall"; w.style = `left:${realMouseX-10}px;top:${realMouseY-70}px;`; w.textContent = "👁️ САУРОН"; arena.appendChild(w); window.gameWalls.push(w);
    }
};

function checkRoundEnd() {
    const normalVirusesLeft = window.flyingViruses.filter(v => !v.isZombie && !v.isCaptured);
    if (window.spawnedThisRound >= getMaxViruses() && normalVirusesLeft.length === 0) {
        window.currentRound++; window.spawnedThisRound = 0; updateSpawnButtonText(); saveAllData(); updateInterfaceText();
    }
}

function saveAllData() { 
    localStorage.setItem("vGame_brelers", window.score); 
    localStorage.setItem("vGame_dollars", window.dollars); 
    localStorage.setItem("vGame_weapons", JSON.stringify(window.unlockedWeapons)); 
    localStorage.setItem("vGame_levels", JSON.stringify(window.weaponLevels)); 
    localStorage.setItem("vGame_loot", JSON.stringify(window.loot)); 
    localStorage.setItem("vGame_favorites", JSON.stringify(window.favoriteWeapons)); 
    localStorage.setItem("vGame_groups", JSON.stringify(window.weaponGroups)); 
    localStorage.setItem("vGame_labLvl", window.labLevel); 
    localStorage.setItem("vGame_labTubes", window.labTubes); 
    localStorage.setItem("vGame_dnaRegen", window.dnaRegenActive); 
    localStorage.setItem("vGame_dnaInvis", window.dnaInvisActive); 
    localStorage.setItem("vGame_dnaSplit", window.dnaSplitActive); 
    localStorage.setItem("vGame_dnaTaxes", window.dnaTaxesActive); 
    localStorage.setItem("vGame_creature", window.creatureUnlocked); 
    updateInterfaceText(); 
}

// Стартовый запуск интерфейса
updateInterfaceText();
spawnBtn.onclick = function(e) {
    e.stopPropagation(); if (window.spawnedThisRound >= getMaxViruses()) return;
    window.spawnedThisRound++; updateSpawnButtonText();
    const isB = window.currentRound % 10 === 0; const bi = window.currentRound / 10; const ds = getDiffStats();
    let hp = isB ? (10000 * Math.pow(10, bi - 1)) : (100 * window.currentRound); hp *= ds.hp;
    let type = "normal";
    if (!isB) { let r = Math.random(); if (r < 0.2) type = "spy"; else if (r < 0.4) type = "doctor"; else if (r < 0.5) type = "mutant"; }
    createVirusElement(hp, isB, false, type);
};
