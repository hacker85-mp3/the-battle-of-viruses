<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Арена Вирусов: Эволюция</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; user-select: none; }
        .lucifer-fire { position: absolute; background: radial-gradient(circle, #ff4500 0%, transparent 70%); pointer-events: none; z-index: 9991; animation: burn 0.5s infinite alternate; }
        .sound-wave { position: absolute; border: 4px double #00ffff; border-radius: 50%; pointer-events: none; z-index: 9992; animation: wave 0.8s linear forwards; }
        @keyframes burn { from { transform: scale(1); opacity: 0.6; } to { transform: scale(1.2); opacity: 0.9; } }
        @keyframes wave { from { transform: scale(0.1); opacity: 1; } to { transform: scale(3); opacity: 0; } }
        /* Кастомный красивый скроллбар для консольных окон */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.5); }
        ::-webkit-scrollbar-thumb { background: #00ff00; border-radius: 3px; }
    </style>
</head>
<body>
<script>
// ==========================================
// 1. ИГРОВЫЕ СТРУКТУРЫ И АВТОСОХРАНЕНИЕ
// ==========================================
const arena = document.createElement("div");
arena.style.position = "fixed"; arena.style.top = "0"; arena.style.left = "0";
arena.style.width = "100vw"; arena.style.height = "100vh";
arena.style.backgroundColor = "black"; arena.style.zIndex = "9990";
arena.style.overflow = "hidden"; document.body.appendChild(arena);

// Переименовано в брелеры (Валюта)
window.score = parseInt(localStorage.getItem("vGame_brelers")) || 0;
window.currentRound = parseInt(localStorage.getItem("vGame_round")) || 1;
window.gameDifficulty = localStorage.getItem("vGame_diff") || "easy"; // easy, medium, hard, extreme
window.chosenAura = localStorage.getItem("vGame_aura") || "none"; // none, light, dark
window.musicianStatus = localStorage.getItem("vGame_musician") === "true";
window.unlocked100Round = localStorage.getItem("vGame_r100_win") === "true";

// Инвентарь оружия и лута
window.unlockedWeapons = JSON.parse(localStorage.getItem("vGame_weapons")) || ["laser", "bomb_default"];
window.weaponLevels = JSON.parse(localStorage.getItem("vGame_levels")) || { laser:1, bomb_default:1, brick:1, poison:1, darkBlade:1, gandalfStaff:1, hypnosis:1, godLight:1, luciferSword:1, saber:1, flyingMechSword:1, callLuciferPet:1, shocker:1 };
window.loot = JSON.parse(localStorage.getItem("vGame_loot")) || { dna_default:0, core_default:0, luc_wings:0, luc_dna:0, luc_crown:0 };

window.currentWeapon = "laser"; window.flyingViruses = [];
window.bombsLeft = 2; window.freezesLeft = 2; window.spawnedThisRound = 0;
window.cooldowns = { staff: 0, lightOfGod: 0, hypnosis: 0, shocker: 0, flyingSword: 0, callPet: 0 };
window.cursorSpeedMultiplier = 1;

let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
let realMouseX = mouseX, realMouseY = mouseY;
arena.onmousemove = (e) => { realMouseX = e.clientX; realMouseY = e.clientY; handleMouseTraces(); };

setInterval(() => {
    mouseX += (realMouseX - mouseX) * (0.2 * window.cursorSpeedMultiplier);
    mouseY += (realMouseY - mouseY) * (0.2 * window.cursorSpeedMultiplier);
}, 16);

// Коэффициенты сложности
function getDiffStats() {
    if (window.gameDifficulty === "medium") return { speed: 1.5, hp: 1.5, cash: 1.5 };
    if (window.gameDifficulty === "hard") return { speed: 2, hp: 2, cash: 2 };
    if (window.gameDifficulty === "extreme") return { speed: 5, hp: 4, cash: 4 };
    return { speed: 1, hp: 1, cash: 1 };
}

// ==========================================
// 2. ИНТЕРФЕЙС И ВЕРХНЯЯ ПАНЕЛЬ С КНОПКАМИ РЕЖИМОВ
// ==========================================
const topBar = document.createElement("div");
topBar.style.position = "absolute"; topBar.style.top = "15px"; topBar.style.left = "20px"; topBar.style.display = "flex"; topBar.style.gap = "8px"; topBar.style.zIndex = "9999"; arena.appendChild(topBar);

const spawnBtn = document.createElement("button");
spawnBtn.style.padding = "8px 12px"; spawnBtn.style.background = "black"; spawnBtn.style.color = "#00ff00"; spawnBtn.style.border = "2px solid #00ff00"; spawnBtn.style.fontFamily = "monospace"; spawnBtn.style.cursor = "pointer"; spawnBtn.style.fontWeight = "bold"; topBar.appendChild(spawnBtn);

function getMaxViruses() { return window.currentRound % 10 === 0 ? 1 : window.currentRound; }
function updateSpawnButtonText() {
    if (window.currentRound % 10 === 0) spawnBtn.textContent = "ПРИЗВАТЬ БОССА РАУНДА";
    else spawnBtn.textContent = `СПАВН ВИРУСА (${window.spawnedThisRound}/${getMaxViruses()})`;
}
updateSpawnButtonText();

const menuBtn = spawnBtn.cloneNode(true); menuBtn.textContent = "МЕНЮ / ИНВЕНТАРЬ / ИНДЕКС"; topBar.appendChild(menuBtn);

// Селектор сложностей
const diffSelect = document.createElement("select");
diffSelect.style.background = "black"; diffSelect.style.color = "#00ff00"; diffSelect.style.border = "2px solid #00ff00"; diffSelect.style.fontFamily = "monospace"; diffSelect.style.fontWeight = "bold"; diffSelect.style.padding = "6px";
const modes = { easy: "Легкий (x1)", medium: "Средний (x1.5)", hard: "Сложный (x2)", extreme: "Экстремальный (x5)" };
for (let m in modes) {
    const opt = document.createElement("option"); opt.value = m; opt.textContent = modes[m]; if(m === window.gameDifficulty) opt.selected = true; diffSelect.appendChild(opt);
}
diffSelect.onchange = () => { window.gameDifficulty = diffSelect.value; localStorage.setItem("vGame_diff", window.gameDifficulty); updateInterfaceText(); };
topBar.appendChild(diffSelect);

const scoreBoard = document.createElement("div"); scoreBoard.style.position = "absolute"; scoreBoard.style.top = "20px"; scoreBoard.style.right = "20px"; scoreBoard.style.color = "#00ff00"; scoreBoard.style.fontFamily = "monospace"; scoreBoard.style.fontSize = "22px"; scoreBoard.style.fontWeight = "bold"; scoreBoard.style.zIndex = "9999"; arena.appendChild(scoreBoard);
const roundBoard = scoreBoard.cloneNode(true); roundBoard.style.right = "320px"; arena.appendChild(roundBoard);

const infoBox = document.createElement("div"); infoBox.style.position = "absolute"; infoBox.style.bottom = "20px"; infoBox.style.left = "20px"; infoBox.style.width = "480px"; infoBox.style.backgroundColor = "rgba(0,0,0,0.9)"; infoBox.style.border = "1px solid #00ff00"; infoBox.style.zIndex = "9999"; infoBox.style.display = "flex"; infoBox.style.flexDirection = "column"; arena.appendChild(infoBox);
const infoHeader = document.createElement("div"); infoHeader.style.padding = "10px 15px"; infoHeader.style.borderBottom = "1px solid #00ff00"; infoHeader.style.display = "flex"; infoHeader.style.justifyContent = "space-between"; infoHeader.style.alignItems = "center"; infoHeader.style.fontFamily = "monospace"; infoHeader.style.fontWeight = "bold"; infoHeader.style.color = "#00ff00"; infoHeader.style.cursor = "pointer"; infoBox.appendChild(infoHeader);
const infoTitle = document.createElement("span"); infoHeader.appendChild(infoTitle);
const toggleBtn = document.createElement("button"); toggleBtn.textContent = "[-] СВЕРНУТЬ"; toggleBtn.style.background = "transparent"; toggleBtn.style.border = "none"; toggleBtn.style.color = "#00ff00"; toggleBtn.style.fontFamily = "monospace"; toggleBtn.style.cursor = "pointer"; toggleBtn.style.fontWeight = "bold"; infoHeader.appendChild(toggleBtn);
const infoContent = document.createElement("div"); infoContent.style.padding = "15px"; infoContent.style.color = "#00ff00"; infoContent.style.fontFamily = "monospace"; infoContent.style.fontSize = "13px"; infoContent.style.lineHeight = "1.4"; infoContent.style.whiteSpace = "pre-line"; infoBox.appendChild(infoContent);

let isInfoCollapsed = false;
function toggleInfo() { infoContent.style.display = isInfoCollapsed ? "block" : "none"; infoHeader.style.borderBottom = isInfoCollapsed ? "1px solid #00ff00" : "none"; toggleBtn.textContent = isInfoCollapsed ? "[-] СВЕРНУТЬ" : "[+] РАЗВЕРНУТЬ"; isInfoCollapsed = !isInfoCollapsed; }
toggleBtn.onclick = (e) => { e.stopPropagation(); toggleInfo(); }; infoHeader.onclick = toggleInfo;

function updateInterfaceText() {
    scoreBoard.textContent = "БРЕЛЕРЫ: " + window.score.toLocaleString();
    roundBoard.textContent = "РАУНД: " + window.currentRound;
    infoTitle.textContent = `=== ОБУЧЕНИЕ И БОНУСЫ ===`;
    
    let auraStr = window.chosenAura === "light" ? "Светлая (Брелеры x2)" : (window.chosenAura === "dark" ? "Тёмная (Сила x2)" : "Нет (Разблокировка на 20 раунде)");
    let statusStr = window.musicianStatus ? "Да (Музыкальные волны 46.5%)" : "Нет";
    
    const weaponsMap = { laser: "Лазер", bomb_default: "Бомба", brick: "Кирпич", poison: "Отрава", darkBlade: "Меч Тьмы", gandalfStaff: "Посох Гэндальфа", hypnosis: "Гипноз", godLight: "Свет Бога", luciferSword: "Меч Люцифера", saber: "Сабля", flyingMechSword: "Летающий меч", callLuciferPet: "Призыв Люцифера", shocker: "Электрошокер" };
    
    infoContent.textContent = `Выбрано оружие: ${weaponsMap[window.currentWeapon]} [Ур. ${window.weaponLevels[window.currentWeapon]||1}]
Текущая Аура: ${auraStr} | Статус Музыканта: ${statusStr}

КАК ИГРАТЬ: Нажмите кнопку МЕНЮ, чтобы выбрать пушку, скрафтить вещи, продать лут или посмотреть Индекс Вирусов.
'Q' - Сбросить бесплатную бомбу под курсор.
'E' - Бесплатная заморозка врагов на 5 секунд.
'F' - Лужа огня (только для Меча Люцифера).
'R' - Бросок клинка вперед (только для Меча Люцифера).`;
}

// ==========================================
// 3. МЕГА-ОКНО УПРАВЛЕНИЯ (МАГАЗИН, КУЗНИЦА, ИНВЕНТАРЬ, ИНДЕКС)
// ==========================================
const megaWindow = document.createElement("div");
megaWindow.style.position = "absolute"; megaWindow.style.top = "70px"; megaWindow.style.left = "20px"; megaWindow.style.width = "calc(100vw - 40px)"; megaWindow.style.height = "calc(100vh - 180px)"; megaWindow.style.background = "rgba(0,0,0,0.98)"; megaWindow.style.border = "2px solid #00ff00"; megaWindow.style.zIndex = "10000"; megaWindow.style.display = "none"; megaWindow.style.flexDirection = "column"; megaWindow.style.fontFamily = "monospace"; megaWindow.style.color = "#00ff00"; megaWindow.style.padding = "15px"; megaWindow.style.boxSizing = "border-box"; arena.appendChild(megaWindow);

menuBtn.onclick = (e) => { e.stopPropagation(); if (megaWindow.style.display === "none") { megaWindow.style.display = "flex"; switchTab("shop_normal"); } else { megaWindow.style.display = "none"; } };

// Навигационная панель вкладок мега-окна
const navTabs = document.createElement("div"); navTabs.style.display = "flex"; navTabs.style.gap = "6px"; navTabs.style.flexWrap = "wrap"; navTabs.style.borderBottom = "1px solid #00ff00"; navTabs.style.paddingBottom = "10px"; megaWindow.appendChild(navTabs);

const tabContainer = document.createElement("div"); tabContainer.style.flex = "1"; tabContainer.style.overflowY = "auto"; tabContainer.style.marginTop = "15px"; tabContainer.style.paddingRight = "5px"; megaWindow.appendChild(tabContainer);

const tabsConfig = [
    { id: "shop_normal", name: "Обычный Магазин" },
    { id: "shop_exclusive", name: "Эксклюзивное Оружие" },
    { id: "shop_bonuses", name: "Магазин Бонусов" },
    { id: "forge", name: "Кузница Крафта" },
    { id: "inventory", name: "Инвентарь и Лут" },
    { id: "virus_index", name: "Индекс Вирусов" }
];

tabsConfig.forEach(t => {
    const btn = document.createElement("button"); btn.textContent = t.name; btn.style.background = "black"; btn.style.color = "#00ff00"; btn.style.border = "1px solid #00ff00"; btn.style.padding = "6px 10px"; btn.style.cursor = "pointer"; btn.style.fontWeight = "bold";
    btn.onclick = () => switchTab(t.id); navTabs.appendChild(btn);
});

function switchTab(tabId) {
    tabContainer.innerHTML = "";
    if (tabId === "shop_normal") renderNormalShop();
    if (tabId === "shop_exclusive") renderExclusiveShop();
    if (tabId === "shop_bonuses") renderBonusesShop();
    if (tabId === "forge") renderForge();
    if (tabId === "inventory") renderInventory();
    if (tabId === "virus_index") renderVirusIndex();
}

// ----------------- ВКЛАДКА 1: ОБЫЧНЫЙ МАГАЗИН -----------------
const normalWeapons = [
    { id: "bomb_default", name: "Бомба", cost: 200, upgradeCost: 300, desc: "Взрывной урон кликом.", color: "#ffff00" },
    { id: "brick", name: "Кирпич", cost: 500, upgradeCost: 500, desc: "Одиночный бросок (300 урона). Шанс крита х3.", color: "#cd853f" },
    { id: "poison", name: "Отрава", cost: 1000, upgradeCost: 1000, desc: "Лужа яда, бьющая каждую секунду.", color: "#00ff00" },
    { id: "saber", name: "Сабля", cost: 100, upgradeCost: 200, desc: "1 урон на 1 ур., 10 урона на 10 ур. Шанс крита х3.", color: "#aaa" }
];

function renderNormalShop() {
    normalWeapons.forEach(item => {
        createWeaponShopRow(item, false);
    });
}

// ----------------- ВКЛАДКА 2: ЭКСКЛЮЗИВНОЕ ОРУЖИЕ -----------------
const exclusiveWeapons = [
    { id: "darkBlade", name: "Меч Тьмы", cost: 100000, upgradeCost: 50000, desc: "Наносит урон ведением мыши по площади. Шанс крита х3.", color: "#8a2be2" },
    { id: "gandalfStaff", name: "Посох Гэндальфа", cost: 100000, upgradeCost: 80000, desc: "Взрыв на 600 урона. КД 10 сек.", color: "#00ffff" },
    { id: "hypnosis", name: "Гипноз", cost: 100000000, upgradeCost: 50000000, desc: "Обращает вирус в зомби-союзника. КД 10 сек.", color: "#00ffaa" },
    { id: "godLight", name: "Свет Бога", cost: 10000000000, upgradeCost: 5000000000, desc: "Дезинтеграция обычных врагов в области. КД 10 сек.", color: "#fff" },
    { id: "luciferSword", name: "Меч Люцифера", cost: 0, upgradeCost: 100000000, desc: "Трофей Сверх-Босса. КД огня. Шанс крита х3.", color: "#ff4500", isDropOnly: true },
    { id: "flyingMechSword", name: "Летающий меч", cost: 0, upgradeCost: 200000000, desc: "Крафт пушка. Летает и рикошетит от стен.", color: "#ff8c00", isDropOnly: true },
    { id: "callLuciferPet", name: "Призыв Люцифера", cost: 0, upgradeCost: 500000000, desc: "Крафт пушка. Вызывает Люцифера на вашу сторону.", color: "#ff3300", isDropOnly: true },
    { id: "shocker", name: "Электрошокер", cost: 0, upgradeCost: 10000000, desc: "Цепной разряд. Больше врагов - больше урона. КД 10с.", color: "#ffd700", isDropOnly: true }
];

function renderExclusiveShop() {
    // Проверка 100 раунда: открывает вообще все пушки
    if (window.unlocked100Round) {
        const notice = document.createElement("div"); notice.style.color = "#00ffff"; notice.style.fontWeight = "bold"; notice.style.marginBottom = "10px"; notice.textContent = "🏆 Вы прошли 100 раунд! Все пушки и эксклюзивное оружие доступны без ограничений!"; tabContainer.appendChild(notice);
    }
    exclusiveWeapons.forEach(item => {
        createWeaponShopRow(item, true);
    });
}

function createWeaponShopRow(item, isExclusive) {
    const row = document.createElement("div"); row.style.border = "1px solid #00ff00"; row.style.padding = "10px"; row.style.marginBottom = "8px"; row.style.display = "flex"; row.style.justifyContent = "space-between"; row.style.alignItems = "center";
    
    const lvl = window.weaponLevels[item.id] || 1;
    const isUnlocked = window.unlockedWeapons.includes(item.id) || item.id === "laser" || window.unlocked100Round;
    
    const left = document.createElement("div"); left.style.display = "flex"; left.style.flexDirection = "column"; left.style.gap = "4px";
    const name = document.createElement("span"); name.style.color = item.color; name.style.fontWeight = "bold"; name.textContent = `${item.name} [Ур. ${lvl}${lvl >= 10 ? " МАКС" : ""}]`;
    const desc = document.createElement("span"); desc.style.fontSize = "11px"; desc.style.color = "#aaa"; desc.textContent = item.desc;
    left.appendChild(name); left.appendChild(desc);
    
    const right = document.createElement("div"); right.style.display = "flex"; right.style.gap = "6px";
    
    // Кнопка покупки
    const buyBtn = document.createElement("button"); buyBtn.style.padding = "5px 8px"; buyBtn.style.cursor = "pointer";
    if (isUnlocked) {
        buyBtn.textContent = "РАЗБЛОКИРОВАНО"; buyBtn.style.background = "#222"; buyBtn.style.color = "#555"; buyBtn.style.border = "1px solid #555";
    } else if (item.isDropOnly) {
        buyBtn.textContent = "ТОЛЬКО КРАФТ / ЛУТ"; buyBtn.style.background = "#200"; buyBtn.style.color = "#ff3333"; buyBtn.style.border = "1px solid #ff3333";
    } else {
        buyBtn.textContent = `КУПИТЬ (${item.cost.toLocaleString()})`; buyBtn.style.background = "black"; buyBtn.style.color = "#00ff00"; buyBtn.style.border = "1px solid #00ff00";
        buyBtn.onclick = () => {
            if (window.score >= item.cost) {
                window.score -= item.cost; window.unlockedWeapons.push(item.id); if(item.id === "darkBlade") window.hasDarkBlade = true; saveAllData(); switchTab(isExclusive ? "shop_exclusive" : "shop_normal"); updateInterfaceText();
            } else alert("Недостаточно брелеров!");
        };
    }
    
    // Кнопка улучшения уровня
    const costToUpgrade = item.upgradeCost * lvl;
    const upBtn = document.createElement("button"); upBtn.style.padding = "5px 8px"; upBtn.style.cursor = "pointer";
    if (lvl >= 10) {
        upBtn.textContent = "МАКС"; upBtn.style.background = "#222"; upBtn.style.color = "#555"; upBtn.style.border = "1px solid #555";
    } else {
        upBtn.textContent = `УЛУЧШИТЬ (+${costToUpgrade.toLocaleString()})`; upBtn.style.background = "black"; upBtn.style.color = "#00ffff"; upBtn.style.border = "1px solid #00ffff";
        upBtn.disabled = !isUnlocked; if(!isUnlocked) { upBtn.style.color = "#333"; upBtn.style.borderColor = "#333"; }
        upBtn.onclick = () => {
            if (window.score >= costToUpgrade) {
                window.score -= costToUpgrade; window.weaponLevels[item.id]++; saveAllData(); switchTab(isExclusive ? "shop_exclusive" : "shop_normal"); updateInterfaceText();
            } else alert("Недостаточно брелеров!");
        };
    }
    
    // Кнопка ломбарда (продажа)
    const sellBtn = document.createElement("button"); sellBtn.style.padding = "5px 8px"; sellBtn.style.background = "#300"; sellBtn.style.color = "red"; sellBtn.style.border = "1px solid red"; sellBtn.style.cursor = "pointer";
    sellBtn.textContent = `ЛОМБАРД (+${(item.cost/2).toLocaleString()})`;
    sellBtn.style.display = isUnlocked && item.id !== "laser" && !item.isDropOnly ? "block" : "none";
    sellBtn.onclick = () => {
        if(window.currentWeapon === item.id) window.currentWeapon = "laser";
        window.score += item.cost / 2; window.unlockedWeapons = window.unlockedWeapons.filter(id => id !== item.id); if(item.id === "darkBlade") window.hasDarkBlade = false; saveAllData(); switchTab(isExclusive ? "shop_exclusive" : "shop_normal"); updateInterfaceText();
    };
    
    right.appendChild(buyBtn); right.appendChild(upBtn); right.appendChild(sellBtn);
    row.appendChild(left); row.appendChild(right); tabContainer.appendChild(row);
}
// ----------------- ВКЛАДКА 3: МАГАЗИН БОНУСОВ И РЕЖИМЫ / АУРЫ -----------------
function renderBonusesShop() {
    const box = document.createElement("div"); box.style.display = "flex"; box.style.flexDirection = "column"; box.style.gap = "15px";
    
    // Блок Аур (Доступен после 20 раунда)
    const auraTitle = document.createElement("h3"); auraTitle.textContent = "✨ СИСТЕМА АУР (Разблокируется после 20 раунда)"; box.appendChild(auraTitle);
    const auraContainer = document.createElement("div"); auraContainer.style.display = "flex"; auraContainer.style.gap = "10px";
    
    const bLight = document.createElement("button"); bLight.textContent = "СВЕТЛАЯ АУРА (Брелеры x2)"; bLight.style.cssText = "padding:10px;background:#220;color:#ffff00;border:1px solid #ffff00;cursor:pointer;font-weight:bold;";
    const bDark = document.createElement("button"); bDark.textContent = "ТЁМНАЯ АУРА (Сила x2)"; bDark.style.cssText = "padding:10px;background:#002;color:#8a2be2;border:1px solid #8a2be2;cursor:pointer;font-weight:bold;";
    
    if (window.currentRound <= 20) {
        bLight.disabled = true; bDark.disabled = true; bLight.style.opacity = "0.3"; bDark.style.opacity = "0.3";
    }
    
    bLight.onclick = () => { window.chosenAura = "light"; localStorage.setItem("vGame_aura", "light"); updateInterfaceText(); alert("Вы активировали Светлую Ауру! Награда в брелерах удвоена."); };
    bDark.onclick = () => { window.chosenAura = "dark"; localStorage.setItem("vGame_aura", "dark"); updateInterfaceText(); alert("Вы активировали Тёмную Ауру! Сила вашего оружия удвоена."); };
    
    auraContainer.appendChild(bLight); auraContainer.appendChild(bDark); box.appendChild(auraContainer);
    
    // Покупка Электрошокера и призыва Газана
    const shopExTitle = document.createElement("h3"); shopExTitle.textContent = "⭐ ЭКСКЛЮЗИВНЫЕ ПРЕДЛОЖЕНИЯ"; box.appendChild(shopExTitle);
    
    const shockRow = document.createElement("div"); shockRow.style.cssText = "border:1px dashed #ffd700;padding:10px;display:flex;justify-content:space-between;align-items:center;";
    shockRow.innerHTML = "<div><b style='color:#ffd700'>Электрошокер</b><br><span style='font-size:11px;color:#aaa;'>Бьет цепным током. Больше врагов в куче — сильнее урон.</span></div>";
    const shockBtn = document.createElement("button"); shockBtn.style.cssText = "padding:6px;cursor:pointer;";
    if(window.unlockedWeapons.includes("shocker")) { shockBtn.textContent = "КУПЛЕНО"; } else {
        shockBtn.textContent = "КУПИТЬ (10,000,000 брелеров)";
        shockBtn.onclick = () => { if(window.score >= 10000000) { window.score -= 10000000; window.unlockedWeapons.push("shocker"); saveAllData(); renderBonusesShop(); updateInterfaceText(); } else alert("Не хватает брелеров!"); };
    }
    shockRow.appendChild(shockBtn); box.appendChild(shockRow);

// 4. ДВИЖОК СЕРВЕРА СПАВНА И ВИРУСЫ
// ==========================================
function spawnGazan() {
    window.spawnedThisRound = 1;
    createVirusUnit(1000000, false, false, "gazan");
}

function spawnLucifer() {
    window.spawnedThisRound = 1;
    createVirusUnit(100000000, true, true, "lucifer");
}

function rollRoundViruses() {
    if (window.spawnedThisRound >= getMaxViruses() || (window.currentRound % 10 === 0 && window.flyingViruses.length > 0)) return;
    window.spawnedThisRound++; updateSpawnButtonText();
    
    const isB = window.currentRound % 10 === 0;
    if (isB) {
        createVirusUnit(10000 * Math.pow(10, (window.currentRound/10)-1), true, false, "boss");
    } else {
        // Рандомный тип вируса (Обычный, Шпион, Доктор, Мутант)
        let r = Math.random();
        let type = "normal";
        let hp = 100 * window.currentRound;
        
        if (r > 0.85) { type = "mutant"; hp = 5000 * (1 + window.currentRound*0.1); }
        else if (r > 0.65) { type = "spy"; hp = 1000 * (1 + window.currentRound*0.1); }
        else if (r > 0.45) { type = "doctor"; hp = 100 * window.currentRound; }
        
        createVirusUnit(hp, false, false, type);
    }
}
spawnBtn.onclick = (e) => { e.stopPropagation(); rollRoundViruses(); };

function createVirusUnit(hp, isB, isL, type) {
    const diff = getDiffStats();
    let finalHp = Math.floor(hp * diff.hp);
    
    const el = document.createElement("div"); el.style.position = "absolute"; el.style.backgroundColor = "black"; el.style.fontFamily = "monospace"; el.style.fontWeight = "bold"; el.style.cursor = "crosshair"; el.style.zIndex = "9995";

        el.style.border = "6px solid #ff4500"; el.style.padding = "40px 60px"; el.style.fontSize = "30px"; el.style.color = "#fff"; el.style.background = "linear-gradient(45deg, #ff4500, #ff8c00)"; el.style.boxShadow = "0 0 50px #ff4500";
        el.style.left = "40vw"; el.style.top = "40vh"; el.textContent = `😈 ЛЮЦИФЕР [${finalHp}/${finalHp} HP]`;
    } else if (type === "gazan") {
        el.style.border = "5px dashed #ff00ff"; el.style.padding = "30px"; el.style.fontSize = "22px"; el.style.color = "#ff00ff"; el.style.left = "45vw"; el.style.top = "45vh"; el.textContent = `🎵 ГАЗАН [${finalHp}/${finalHp} HP]`;
    } else if (isB) {
        el.style.border = "4px solid #8a2be2"; el.style.padding = "25px 40px"; el.style.fontSize = "24px"; el.style.color = "#fff"; el.style.boxShadow = "0 0 30px #ff3333"; el.style.left = "40vw"; el.style.top = "40vh"; el.textContent = `👑 БОСС [${finalHp}/${finalHp} HP]`;
    } else {
        el.style.border = "1px solid #ff3333"; el.style.padding = "8px"; el.style.color = "#ff3333"; el.style.left = Math.random()*(window.innerWidth-180)+"px"; el.style.top = 100+Math.random()*(window.innerHeight-220)+"px";
        if (type === "spy") { el.style.borderColor = "#00ffff"; el.style.color = "#00ffff"; el.textContent = `🕵️ ШПИОН [${finalHp}/${finalHp} HP]`; }
        else if (type === "doctor") { el.style.borderColor = "#00ff00"; el.style.color = "#00ff00"; el.textContent = `🩺 ДОКТОР [${finalHp}/${finalHp} HP]`; }
        else if (type === "mutant") { el.style.borderColor = "#ff8c00"; el.style.color = "#ff8c00"; el.style.borderWidth = "2px"; el.textContent = `🧬 МУТАНТ [${finalHp}/${finalHp} HP]`; }
        else { el.textContent = `🦠 TARGET_${window.spawnedThisRound} [${finalHp}/${finalHp} HP]`; }
    }
    
    arena.appendChild(el);
    let baseSpeed = type === "lucifer" ? 22 : (type === "gazan" ? 18 : (isB ? 12 : 5));
    // Прогрессивное увеличение скорости от раунда
    let finalSpeed = baseSpeed * (1 + window.currentRound * 0.05) * diff.speed;
    
    window.flyingViruses.push({
        element: el, x: parseFloat(el.style.left)||window.innerWidth/2, y: parseFloat(el.style.top)||window.innerHeight/2,
        speedX: (Math.random()-0.5)*finalSpeed, speedY: (Math.random()-0.5)*finalSpeed, hp: finalHp, maxHp: finalHp,
        isBoss: isB, isLucifer: isL, type: type, isFrozen: false, isZombie: false, isBurning: false, burnTicks: 0
    });
}

// Поведение способностей вирусов (лечение доктора, маскировка шпиона, телепорт Газана)
setInterval(() => {
    window.flyingViruses.forEach(v => {
        if (v.isFrozen) return;
        // 1. Шпион меняет цвет под фон (черный)
        if (v.type === "spy" && Math.random() > 0.5) {
            v.element.style.color = v.element.style.color === "black" ? "#00ffff" : "black";
            v.element.style.borderColor = v.element.style.color;
        }
        // 2. Доктор лечит случайного раненого союзника
        if (v.type === "doctor") {
            let target = window.flyingViruses.find(other => other !== v && other.hp < other.maxHp);
            if (target) {
                target.hp = Math.min(target.maxHp, target.hp + 100);
                playSound('poison'); createFlashEffect(target.x+30, target.y+20, 30, "#00ff00");
            }
        }
        // 3. Газан телепортируется
        if (v.type === "gazan" && Math.random() > 0.6) {
            v.x = Math.random() * (window.innerWidth - 250); v.y = 100 + Math.random() * (window.innerHeight - 300);
            createFlashEffect(v.x+80, v.y+30, 60, "#ff00ff");
        }
    });
}, 1200);

// Движок физики движения
function moveEngine() {
    window.flyingViruses.forEach(item => {
        if (!item.isFrozen) {
            const rect = item.element.getBoundingClientRect();
            item.x += item.speedX; item.y += item.speedY;
            if (item.x <= 0 || item.x + rect.width >= window.innerWidth) item.speedX *= -1;
            if (item.y <= 0 || item.y + rect.height >= window.innerHeight) item.speedY *= -1;
            item.element.style.left = item.x + "px"; item.element.style.top = item.y + "px";
        }
    });
    // Логика полета Летающего Меча (Скрафченная пушка)
    const flySword = document.getElementById("active_flying_sword");
    if (flySword) {
        let sx = parseFloat(flySword.getAttribute("sx")), sy = parseFloat(flySword.getAttribute("sy"));
        let px = parseFloat(flySword.style.left), py = parseFloat(flySword.style.top);
        px += sx; py += sy;
        if (px <= 0 || px >= window.innerWidth - 40) { sx *= -1; flySword.setAttribute("sx", sx); }
        if (py <= 0 || py >= window.innerHeight - 40) { sy *= -1; flySword.setAttribute("sy", sy); }
        flySword.style.left = px + "px"; flySword.style.top = py + "px";
        
        // Нанесение урона при коллизии летающего меча
        window.flyingViruses.forEach(v => {
            const vR = v.element.getBoundingClientRect();
            if (px >= vR.left && px <= vR.right && py >= vR.top && py <= vR.bottom) {
                const lvl = window.weaponLevels.flyingMechSword || 1;
                damageVirus(v, 400 * lvl);
            }
        });
    }
    requestAnimationFrame(moveEngine);
}
moveEngine();

// ==========================================
// 5. ОБРАБОТКА ДАМАГА, КРИТОВ И ШАНСОВ
// ==========================================
function damageVirus(item, baseDmg) {
    let finalDmg = baseDmg;
    
    // Аура Тьмы удваивает всю атакующую мощь
    if (window.chosenAura === "dark") finalDmg *= 2;
    
    // Крит шанс 10% на х3 урон для Кирпича, Сабли, Клинка Тьмы и Меча Люцифера
    const critWeapons = ["brick", "saber", "darkBlade", "luciferSword"];
    if (critWeapons.includes(window.currentWeapon) && Math.random() <= 0.10) {
        finalDmg *= 3; createFlashEffect(item.x + 30, item.y + 20, 50, "red");
    }
    
    // Иммунитеты Мутанта
    if (item.type === "mutant" && (window.currentWeapon === "poison" || window.currentWeapon === "luciferSword" || window.currentWeapon === "fireStorm" || window.currentWeapon === "godLight")) {
        finalDmg = 0; // Полный иммунитет
    }

    item.hp -= finalDmg;
    
    // Механика Мутанта при HP < 100 призывает подмогу
    if (item.type === "mutant" && item.hp <= 100 && item.hp > 0 && !item.hasSummonedHelp) {
        item.hasSummonedHelp = true;
        createVirusUnit(200, false, false, Math.random() > 0.5 ? "doctor" : "spy");
    }

    if (item.hp <= 0) {
        item.element.remove();
        let diff = getDiffStats();
        let reward = 100 * window.currentRound * diff.cash;
        if (item.type === "lucifer") reward = 50000000;
        if (item.type === "gazan") reward = 1000000;
        
        // Аура Света удваивает награду брелеров
        if (window.chosenAura === "light") reward *= 2;
        
        // Расчет лута (Дроп-система Люцифера)
        if (item.type === "lucifer") {
            let roll = Math.random() * 100;
            if (roll <= 1) { window.loot.luc_crown++; alert("👑 ЛУТ ВЕКА! Вы выбили Корону Ада (Шанс 1%)!"); }
            else if (roll <= 11) { window.loot.luc_dna++; alert("🧪 РЕДКИЙ ДРОП! Вы выбили ДНК Люцифера (Шанс 10%)!"); }
            else if (roll <= 61) { window.loot.luc_wings++; alert("🪶 ТРОФЕЙ! Вы выбили Крылья Люцифера (Шанс 50%)!"); }
        }
        
        if (item.type === "gazan") {
            window.musicianStatus = true; localStorage.setItem("vGame_musician", "true");
            alert("🎵 Поздравляем! Вы получили статус Музыканта! Теперь клики лазера вызывают разрушительные звуковые волны с шансом 46.5%!");
        }

        if (!item.isZombie) { window.score += Math.floor(reward); saveAllData(); }
        window.flyingViruses = window.flyingViruses.filter(v => v !== item);
        setTimeout(checkRoundEnd, 10);
    } else {
        const textMaps = { zombie: "🧟 ZOMBIE", lucifer: "😈 ЛЮЦИФЕР", gazan: "🎵 ГАЗАН", boss: "👑 БОСС", spy: "🕵️ ШПИОН", doctor: "🩺 ДОКТОР", mutant: "🧬 МУТАНТ", normal: "🦠 TARGET" };
        let prefix = textMaps[item.isZombie ? "zombie" : (item.type || "normal")] || "🦠 TARGET";
        item.element.textContent = `${prefix} [${item.hp}/${item.maxHp} HP]`;
    }
}

// Периодический урон поджигания меча Люцифера
setInterval(() => {
    window.flyingViruses.forEach(item => {
        if (item.isBurning && item.burnTicks > 0) {
            item.burnTicks--;
            const lvl = window.weaponLevels.luciferSword || 1;
            damageVirus(item, 600 * lvl);
            if (item.burnTicks <= 0) { item.isBurning = false; item.element.style.backgroundColor = "black"; }
        }
    });
}, 1000);

    if(isV && window.musicianStatus && Math.random()<0.465){
        const w=document.createElement("div");w.className="sound-wave";w.style.left=mouseX+"px";w.style.top=mouseY+"px";arena.appendChild(w);setTimeout(() => w.remove(),800);
        window.flyingViruses.forEach(v=>{if(Math.sqrt(Math.pow(v.x-mouseX,2)+Math.pow(v.y-mouseY,2))<=300){v.isFrozen=true;v.element.style.borderColor="#00ffff";setTimeout(()=>{v.isFrozen=false;v.element.style.borderColor="#ff3333"},3000);damageVirus(v,100)}});
    }

    if(window.currentWeapon==="shocker"){
        if(Date.now()<window.cooldowns.shocker){alert("Шокер перезаряжается!");return}
        window.cooldowns.shocker=Date.now()+10000;playSound('laser');
        let hit=[],rM=250;window.flyingViruses.forEach(v=>{if(Math.sqrt(Math.pow(v.x-mouseX,2)+Math.pow(v.y-mouseY,2))<=rM)hit.push(v)});
        let d=50*lvl*hit.length;hit.forEach(v=>damageVirus(v,d));return;
    }
    if(window.currentWeapon==="brick"){playSound('glass');createFlashEffect(mouseX,mouseY,40,"#cd853f");window.flyingViruses.forEach(v=>{const r=v.element.getBoundingClientRect();if(mouseX>=r.left&&mouseX<=r.right&&mouseY>=r.top&&mouseY<=r.bottom){let d=300*lvl;if(Math.random()<0.1)d*=3;damageVirus(v,d*getAuraMult())}});return}
    if(window.currentWeapon==="gandalfStaff"){if(Date.now()<window.cooldowns.staff){alert("Посох КД!");return}window.cooldowns.staff=Date.now()+10000;playSound('explosion');createFlashEffect(mouseX,mouseY,250,"#00ffff");window.flyingViruses.forEach(v=>{if(!v.isZombie&&Math.sqrt(Math.pow(v.x-mouseX,2)+Math.pow(v.y-mouseY,2))<=250)damageVirus(v,600*lvl*getAuraMult())});return}
    if(window.currentWeapon==="godLight"){if(Date.now()<window.cooldowns.lightOfGod){alert("Свет Бога КД!");return}window.cooldowns.lightOfGod=Date.now()+10000;playSound('god');createFlashEffect(mouseX,mouseY,200,"#fff");window.flyingViruses.forEach(v=>{if(!v.isZombie&&v.type!=="mutant"&&v.type!=="lucifer"&&Math.sqrt(Math.pow(v.x-mouseX,2)+Math.pow(v.y-mouseY,2))<=200)damageVirus(v,v.maxHp)});return}
    if(window.currentWeapon==="hypnosis"&&isV){if(Date.now()<window.cooldowns.hypnosis){alert("Гипноз КД!");return}const v=window.flyingViruses.find(i=>i.element===t);if(v&&v.type!=="mutant"&&v.type!=="lucifer"){window.cooldowns.hypnosis=Date.now()+10000;playSound('zombie');v.isZombie=true;t.style.color="#00ffaa";t.textContent=`🧟 ZOMBIE [${v.hp} HP]`};return}
    
    if(isV){
        e.stopPropagation();const v=window.flyingViruses.find(i=>i.element===t);if(!v||v.isZombie)return;
        let d=window.currentWeapon==="laser"?100:200;d*=lvl;if(window.currentWeapon==="saber"){d=lvl;if(Math.random()<0.1)d*=3}
        if(window.currentWeapon==="laser"||window.currentWeapon==="bomb_default"||window.currentWeapon==="saber"){
            if(window.currentWeapon==="bomb_default"){playSound('explosion');const bR=t.getBoundingClientRect();window.flyingViruses.forEach(o=>{if(Math.sqrt(Math.pow(o.x-bR.left,2)+Math.pow(o.y-bR.top,2))<=150)damageVirus(o,d*getAuraMult())})}
            else{playSound('laser');damageVirus(v,d*getAuraMult())}
        }
    }
};

function updateVirusText(v){
    if(v.isZombie)v.element.textContent=`🧟 ZOMBIE [${v.hp} HP]`;
    else if(v.type==="lucifer")v.element.textContent=`😈 ЛЮЦИФЕР [${v.hp} HP]`;
    else if(v.type==="gazan")v.element.textContent=`🎵 ГАЗАН [${v.hp} HP]`;
    else if(v.isBoss)v.element.textContent=`👑 БОСС [${v.hp} HP]`;
    else v.element.textContent=`${v.type==='spy'?'🕵️ ШПИОН':(v.type==='doctor'?'#🩺 ДОКТОР':(v.type==='mutant'?'🧬 МУТАНТ':'🦠 TARGET'))} [${v.hp} HP]`;
}

function damageVirus(v,dmg){
    v.hp-=dmg;if(v.type==="mutant"&&v.hp<=100&&v.hp+dmg>100){createVirusElement(100,false,false,Math.random()<0.5?"doctor":"spy")}
    if(v.hp<=0){
        v.element.remove();let r=v.type==="lucifer"?50000000:(v.type==="gazan"?1000000:(v.isBoss?(10000*Math.pow(10,(window.currentRound/10)-1)):100*window.currentRound));
        const ds=getDiffStats();r*=ds.cash;if(window.chosenAura==="light")r*=2;
        if(v.type==="lucifer"){
            let roll=Math.random();if(roll<0.5)window.loot.luc_wings++;if(roll<0.1)window.loot.luc_dna++;if(roll<0.01)window.loot.luc_crown++;
            window.hasLuciferSword=true;localStorage.setItem("virusGame_hasLuciferSword","true");if(!window.unlockedWeapons.includes("luciferSword"))window.unlockedWeapons.push("luciferSword");alert("Вы одолели Люцифера! Меч разблокирован. Проверьте лут в инвентаре!");
        }
        if(v.type==="gazan"){window.musicianStatus=true;localStorage.setItem("vGame_musician","true");alert("Газан побежден! Получен статус Музыканта!")}
        if(v.isBoss&&window.currentRound===10){window.firstBossDefeated=true;localStorage.setItem("virusGame_boss1","true")}
        if(v.isBoss&&window.currentRound===100){window.unlocked100Round=true;localStorage.setItem("vGame_r100_win","true");alert("🏆 Вы прошли 100 раунд! Все пушки открыты!")}
        if(!v.isZombie)window.score+=r;saveAllData();window.flyingViruses=window.flyingViruses.filter(i=>i!==v);setTimeout(checkRoundEnd,10);
    }else updateVirusText(v);
}
function createFlashEffect(x,y,r,c){const f=document.createElement("div");f.style=`position:absolute;left:${x-r}px;top:${y-r}px;width:${r*2}px;height:${r*2}px;border-radius:50%;background:radial-gradient(circle,${c} 0%,transparent 70%);pointer-events:none;z-index:9997;`;arena.appendChild(f);setTimeout(()=>f.remove(),400)}

// ==========================================
// 9. ГОРЯЧИЕ КЛАВИШИ И СПОСОБНОСТИ
// ==========================================
window.onkeydown=function(e){
    const k=e.key;if(k.toLowerCase()==='q'||k.toLowerCase()==='й'){
        if(window.bombsLeft<=0)return;window.bombsLeft--;updateInterfaceText();playSound('explosion');
        const b=document.createElement("div");b.style=`position:absolute;left:${mouseX-25}px;top:${mouseY-25}px;width:50px;height:50px;border-radius:50%;background:red;border:3px solid white;color:white;text-align:center;line-height:50px;font-weight:bold;z-index:9998;`;
        let tl=3;b.textContent=tl;arena.appendChild(b);
        const ti=setInterval(()=>{tl--;b.textContent=tl;if(tl<=0){clearInterval(ti);const bR=b.getBoundingClientRect(),bX=bR.left+25,bY=bR.top+25;b.remove();createFlashEffect(bX,bY,250,"orange");window.flyingViruses.forEach(i=>{if(!i.isZombie&&Math.sqrt(Math.pow(i.x-bX,2)+Math.pow(i.y-bY,2))<=250)damageVirus(i,600)})}},1000);
    }
    if(k.toLowerCase()==='e'||k.toLowerCase()==='у'){
        if(window.freezesLeft<=0)return;window.freezesLeft--;updateInterfaceText();playSound('god');
        window.flyingViruses.forEach(v=>{v.isFrozen=true;v.element.style.borderColor="#00ffff"});
        setTimeout(()=>{window.flyingViruses.forEach(v=>{v.isFrozen=false;v.element.style.borderColor=v.type==='lucifer'?"#ff4500":(v.isBoss?"#8a2be2":"#ff3333")})},5000);
    }
};

function checkRoundEnd(){
    if(window.spawnedThisRound>=getMaxViruses()&&window.flyingViruses.length===0){
        if(window.currentRound===20&&window.chosenAura==="none"){
            const a=confirm("Вы прошли 20 раунд! Нажмите ОК для выбора СВЕТЛОЙ ауры (очки х2), или Отмена для ТЁМНОЙ ауры (сила х2)");
            window.chosenAura=a?"light":"dark";localStorage.setItem("vGame_aura",window.chosenAura);
        }
        window.currentRound++;window.bombsLeft=2;window.freezesLeft=2;window.spawnedThisRound=0;
        updateSpawnButtonText();saveAllData();updateInterfaceText();alert(`Раунд пройден! Начинается раунд ${window.currentRound}`);
    }
}
function saveAllData(){localStorage.setItem("vGame_brelers",window.score);localStorage.setItem("vGame_round",window.currentRound);localStorage.setItem("vGame_weapons",JSON.stringify(window.unlockedWeapons));localStorage.setItem("vGame_levels",JSON.stringify(window.weaponLevels));localStorage.setItem("vGame_loot",JSON.stringify(window.loot));updateInterfaceText()}
updateInterfaceText();
</script>
