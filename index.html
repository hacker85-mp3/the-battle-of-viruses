<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Viruses: Глобальный RPG Релиз v7.1</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; user-select: none; font-family: monospace; }
        .arena-bg { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 9988; transition: background 1s ease; }
        .arena-matrix { background: radial-gradient(circle, #001100 0%, #000000 100%); }
        .arena-hell { background: radial-gradient(circle, #220500 0%, #000000 100%); }
        .arena-space { background: radial-gradient(circle, #000522 0%, #000000 100%); }
        .arena-castle { background: radial-gradient(circle, #1a1a00 0%, #000000 100%); }
        .sound-wave { position: absolute; border: 4px double #00ffff; border-radius: 50%; pointer-events: none; z-index: 9992; animation: wave 0.8s linear forwards; }
        .volcano { position: absolute; bottom: 20px; right: 20px; width: 120px; height: 100px; background: linear-gradient(to top, #333, #555); clip-path: polygon(20% 100%, 40% 30%, 60% 30%, 80% 100%); border-top: 15px solid red; z-index: 9991; display: none; text-align: center; color: white; font-weight: bold; line-height: 140px; box-shadow: 0 0 30px red; }
        .game-wall { position: absolute; width: 20px; height: 140px; background: linear-gradient(to bottom, #00ffea, #4b0082); border: 2px solid #fff; box-shadow: 0 0 20px #00ffea; z-index: 9993; color: white; font-size: 10px; font-weight: bold; text-align: center; display: flex; align-items: center; justify-content: center; writing-mode: vertical-rl; }
        .mcd-restaurant { position: absolute; bottom: 20px; left: 520px; width: 150px; height: 110px; background: #DA291C; border: 4px solid #FFC72C; border-radius: 10px; z-index: 9991; display: none; text-align: center; color: white; font-weight: bold; font-size: 11px; box-shadow: 0 0 20px #FFC72C; }
        .king-castle { position: absolute; border: 5px double #ffd700; background: #444; color: #fff; font-weight: bold; text-align: center; z-index: 9992; box-shadow: 0 0 25px #ffd700; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; }
        .king-throne { position: absolute; width: 40px; height: 40px; background: #ffd700; border: 2px solid #fff; border-radius: 4px; box-shadow: 0 0 15px #ffd700; z-index: 9991; text-align: center; line-height: 40px; font-size: 20px; cursor: pointer; }
        .king-mine { position: absolute; width: 50px; height: 50px; background: #222; border: 3px dashed #cd853f; box-shadow: 0 0 10px #cd853f; z-index: 9991; text-align: center; line-height: 50px; font-size: 18px; color: #fff; }
        .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 10px; }
        .inv-slot { background: #0d0d0d; border: 2px solid #00ff00; border-radius: 4px; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; text-align: center; min-height: 95px; color: #00ff00; font-size: 12px; }
        .inv-slot:hover { border-color: #00ffff; color: #00ffff; box-shadow: 0 0 10px #00ffff; }
        /* НЕОНОВЫЙ ФИКС: Выбранная плитка теперь ярко светится белым! */
        .inv-slot-active { border-color: #ffffff !important; color: #ffffff !important; box-shadow: 0 0 15px #ffffff !important; background: #1c1c1c !important; }
        @keyframes wave { from { transform: scale(0.1); opacity: 1; } to { transform: scale(3); opacity: 0; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #00ff00; border-radius: 3px; }
    </style>
</head>
<body>
<div id="arenaBg" class="arena-bg arena-matrix"></div>
<div id="volcanoEl" class="volcano">ВУЛКАН</div>
<div id="mcdRestaurantEl" class="mcd-restaurant"><br>🍟 Макдоналдс 🍔<br><span id="mcdClients" style="font-size:10px;color:#FFC72C">Клиентов: 0</span><br><span style="font-size:9px;color:#aaa">Лечит зомби</span></div>
<script>
const arena = document.createElement("div"); arena.style.position = "fixed"; arena.style.top = "0"; arena.style.left = "0"; arena.style.width = "100vw"; arena.style.height = "100vh"; arena.style.zIndex = "9990"; arena.style.overflow = "hidden"; document.body.appendChild(arena);

window.audioCtx = null;
function initAudio() { if(!window.audioCtx) window.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playSynthSound(freq, type, duration) {
    try { initAudio(); if(!window.audioCtx) return; let osc = window.audioCtx.createOscillator(); let gain = window.audioCtx.createGain(); osc.type = type; osc.frequency.value = freq; gain.gain.setValueAtTime(0.05, window.audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.00001, window.audioCtx.currentTime + duration); osc.connect(gain); gain.connect(window.audioCtx.destination); osc.start(); osc.stop(window.audioCtx.currentTime + duration); } catch(e) {}
}
function playSound(action) { if(action === 'click') playSynthSound(600, 'sine', 0.1); if(action === 'bomb') playSynthSound(130, 'sawtooth', 0.4); if(action === 'freeze') playSynthSound(750, 'triangle', 0.3); }

// Системная память ресурсов
window.currentRound = 1; window.score = parseInt(localStorage.getItem("vGame_brelers")) || 0; window.dollars = parseInt(localStorage.getItem("vGame_dollars")) || 0; window.gameDifficulty = localStorage.getItem("vGame_diff") || "easy"; window.chosenAura = localStorage.getItem("vGame_aura") || "none";
window.musicianStatus = localStorage.getItem("vGame_musician") === "true"; window.sigmaStatus = localStorage.getItem("vGame_sigmaStatus") === "true"; window.obiWanStatus = localStorage.getItem("vGame_obiWanStatus") === "true"; window.sauronStatus = localStorage.getItem("vGame_sauronStatus") === "true"; window.statusFat = localStorage.getItem("vGame_statusFat") === "true"; window.ninjaStatus = localStorage.getItem("vGame_ninjaStatus") === "true"; window.netRadiusMultiplier = parseInt(localStorage.getItem("vGame_netMult")) || 1;
window.dnaRegenActive = localStorage.getItem("vGame_dnaRegen") === "true"; window.creatureUnlocked = localStorage.getItem("vGame_creature") === "true";
window.labLevel = parseInt(localStorage.getItem("vGame_labLvl")) || 1; window.labTubes = parseInt(localStorage.getItem("vGame_labTubes")) || 0;
window.zombieSettings = JSON.parse(localStorage.getItem("vGame_zombieSettings")) || { hp: 100, speed: 5 }; window.favoriteWeapons = JSON.parse(localStorage.getItem("vGame_favorites")) || []; window.unlockedWeapons = JSON.parse(localStorage.getItem("vGame_weapons")) || ["laser", "bomb_default", "catcher_net"]; window.weaponGroups = JSON.parse(localStorage.getItem("vGame_groups")) || {}; window.upgradesHelpers = JSON.parse(localStorage.getItem("vGame_upgradesHelpers")) || { zombie_armor: 0, ninja_damage: 0, guard_damage: 0 }; window.weaponLevels = JSON.parse(localStorage.getItem("vGame_levels")) || { laser:1, bomb_default:1, brick:1, poison:1, darkBlade:1, gandalfStaff:1, hypnosis:1, luciferSword:1, saber:1, human_gun:1, vader_saber:1, sauron_yatagan:1, magic_wand:1, ninja_shuriken:1, ninja_katana:1, king_crown:1, catcher_net:1 };

window.loot = JSON.parse(localStorage.getItem("vGame_loot")) || {};
const defaultLootList = { luc_wings:0, luc_dna:0, luc_crown:0, human_armor:0, vader_mask:0, vader_cloak:0, sauron_wall:1, mcd_building:0, crown_loot:0, castle_loot:0, throne_loot:0, mine_count:0, prisoner_count:0, dna_normal:0, dna_spy:0, dna_doctor:0, dna_mutant:0, captured_viruses:0, vaccine_br1:0, crystals:0 };
for (let key in defaultLootList) { if (window.loot[key] === undefined || window.loot[key] === null) { window.loot[key] = defaultLootList[key]; } }

window.currentWeapon = "laser"; window.flyingViruses = []; window.gameWalls = []; window.kingThrones = []; window.scouts = []; window.spawnedThisRound = 0;
let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2, realMouseX = mouseX, realMouseY = mouseY;
window.onmousemove = (e) => { realMouseX = e.clientX; realMouseY = e.clientY; if(typeof handleMouseTraces === 'function') handleMouseTraces(); };

function getDiffStats() { if (window.gameDifficulty === "medium") return { speed: 1.5, hp: 1.5 }; if (window.gameDifficulty === "hard") return { speed: 2, hp: 2 }; if (window.gameDifficulty === "extreme") return { speed: 5, hp: 4 }; return { speed: 1, hp: 1 }; }

// Отрисовка Баров
const topBar = document.createElement("div"); topBar.style = "position:absolute;top:15px;left:20px;display:flex;gap:8px;z-index:9999;"; arena.appendChild(topBar);
const spawnBtn = document.createElement("button"); spawnBtn.style = "padding:8px 16px;min-width:180px;background:black;color:#00ff00;border:2px solid #00ff00;font-family:monospace;cursor:pointer;font-weight:bold;"; topBar.appendChild(spawnBtn);
const menuBtn = document.createElement("button"); menuBtn.textContent = "💻 RPG ПАНЕЛЬ УПРАВЛЕНИЯ"; menuBtn.style = "padding:8px 16px;background:black;color:#00ff00;border:2px solid #00ff00;font-family:monospace;cursor:pointer;font-weight:bold;"; topBar.appendChild(menuBtn);

const musicBtn = document.createElement("button"); musicBtn.textContent = "🎵 ВКЛ ЗВУКОВОЙ ЧИП"; musicBtn.style = "padding:8px;background:black;color:#00ffff;border:2px solid #00ffff;font-family:monospace;cursor:pointer;font-weight:bold;";
musicBtn.onclick = () => { initAudio(); musicBtn.textContent = "🎵 ЧИП АКТИВЕН"; playSynthSound(440, 'sine', 0.15); }; topBar.appendChild(musicBtn);

const diffSelect = document.createElement("select"); diffSelect.style.background = "black"; diffSelect.style.color = "#00ff00"; diffSelect.style.border = "2px solid #00ff00"; diffSelect.style.fontFamily = "monospace"; diffSelect.style.fontWeight = "bold"; diffSelect.style.padding = "6px";
const modes = { easy: "Легкий (x1)", medium: "Средний (x1.5)", hard: "Сложный (x2)", extreme: "Экстремальный (x5)" };
for (let m in modes) { const opt = document.createElement("option"); opt.value = m; opt.textContent = modes[m]; if(m === window.gameDifficulty) opt.selected = true; diffSelect.appendChild(opt); }
diffSelect.onchange = () => { window.gameDifficulty = diffSelect.value; localStorage.setItem("vGame_diff", window.gameDifficulty); updateInterfaceText(); };
topBar.appendChild(diffSelect);

// ВЁРСТКА ФИКС: Счёт сдвинут на top: 60px, текст больше никогда не наложится!
const infoDisplayTable = document.createElement("div"); infoDisplayTable.style = "position:absolute;top:60px;left:20px;display:flex;gap:20px;color:#00ff00;font-family:monospace;font-size:18px;font-weight:bold;z-index:9999;background:rgba(0,0,0,0.8);padding:6px 15px;border:1px solid #333;border-radius:4px;"; arena.appendChild(infoDisplayTable);
const roundBoard = document.createElement("div"); infoDisplayTable.appendChild(roundBoard);
const scoreBoard = document.createElement("div"); infoDisplayTable.appendChild(scoreBoard);

const infoBox = document.createElement("div"); infoBox.style = "position:absolute;bottom:20px;left:20px;width:480px;background:rgba(0,0,0,0.9);border:1px solid #00ff00;z-index:9999;display:flex;flex-direction:column;"; arena.appendChild(infoBox);
const infoHeader = document.createElement("div"); infoHeader.style = "padding:10px;color:#00ff00;font-weight:bold;cursor:pointer;display:flex;justify-content:space-between;"; infoBox.appendChild(infoHeader);
const infoTitle = document.createElement("span"); infoHeader.appendChild(infoTitle);
const infoContent = document.createElement("div"); infoContent.style = "padding:15px;color:#00ff00;font-size:13px;white-space:pre-line;"; infoBox.appendChild(infoContent);

function updateInterfaceText() {
    scoreBoard.textContent = "БРЕЛЕРЫ: " + window.score.toLocaleString() + " | 💵 DOLLARS: " + window.dollars.toLocaleString() + " | 💎 КРИСТАЛЛЫ: " + (window.loot.crystals || 0); roundBoard.textContent = "РАУНД: " + window.currentRound; infoTitle.textContent = `=== ИГРОВЫЕ СТАТУСЫ ===`;
    infoContent.textContent = `Выбрано оружие: ${window.currentWeapon.toUpperCase()} [Ур. ${window.weaponLevels[window.currentWeapon]||1}]\n'Q' - Бомба | 'E' - Заморозка | 'K' - Стены Саурона\nПоймано вирусов: ${window.loot.captured_viruses} 🕸️ | Вакцины БР-1: ${window.loot.vaccine_br1} шт.`;
    const bg = document.getElementById("arenaBg"); bg.className = "arena-bg";
    if (window.currentRound <= 10) bg.classList.add("arena-matrix"); else if (window.currentRound <= 20) bg.classList.add("arena-hell"); else if (window.currentRound <= 30) bg.classList.add("arena-space"); else bg.classList.add("arena-castle");
}
function updateSpawnButtonText() { spawnBtn.textContent = window.currentRound % 10 === 0 ? "ПРИЗВАТЬ БОССА РАУНДА" : `СПАВН ВИРУСА (${window.spawnedThisRound}/${window.currentRound})`; }

// Пассивные механики v7
setInterval(() => {
    if (window.labTubes > 0 && window.flyingViruses.length > 0) {
        if (window.flyingViruses.filter(v => !v.isZombie).length > 0) { window.score += window.labTubes * 50 * window.labLevel; saveAllData(); }
    }
}, 1000);

setInterval(() => {
    if (window.flyingViruses.length > 0) {
        let throneOccupied = window.flyingViruses.some(v => v.isZombie && v.isKingOnThrone);
        if (throneOccupied) { window.score += 1000; window.dollars += 100; saveAllData(); }
        if (window.loot.prisoner_count > 0 && window.loot.mine_count > 0) {
            let totalWorkers = Math.min(window.loot.prisoner_count, window.loot.mine_count * 3); window.score += totalWorkers * 1000;
            if(Math.random() < 0.05 * totalWorkers) { window.loot.crystals++; alert("💎 Твои рабочие в шахтах откопали Кристалл!"); }
            saveAllData();
        }
    }
}, 60000);

function spawnTraderJava() {
    if (document.getElementById("traderJavaEl")) return;
    const s = document.createElement("div"); s.id = "traderJavaEl";
    s.style = "position:absolute;padding:12px;background:#1a0f00;border:3px double #d2691e;color:#ffd700;font-weight:bold;z-index:9996;cursor:pointer;box-shadow:0 0 20px #d2691e;";
    s.innerHTML = "🧙‍♂️ ТОРГОВЕЦ ДЖАВА<br><span style='font-size:10px;color:#aaa;'>[Кликни меня!]</span>";
    s.style.left = Math.random() * (window.innerWidth - 180) + "px"; s.style.top = 120 + Math.random() * (window.innerHeight - 200) + "px";
    arena.appendChild(s); s.onclick = (e) => { e.stopPropagation(); openTraderMenu(); };
    setTimeout(() => { if (s) s.remove(); }, 40000);
}
setInterval(() => { if (window.currentRound % 5 === 0 && window.flyingViruses.length > 0) spawnTraderJava(); }, 30000);

function openTraderMenu() {
    megaWindow.style.display = "flex";
    tabContainer.innerHTML = `<div style="border:2px solid #d2691e;padding:15px;background:#110a00;display:flex;flex-direction:column;gap:12px;color:#ffd700;">
        <h2 style="color:#ffd700;margin:0;">🧙‍♂️ КОНТРАБАНДНАЯ ЛАВКА ДЖАВЫ</h2>
        <b style="color:#00ffea;">Кристаллы: ${window.loot.crystals || 0} 💎 | Доллары: ${window.dollars} 💵</b>
        <div style="border-bottom:1px dashed #d2691e;padding-bottom:10px;"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;border:1px solid #333;padding:8px;background:black;">
            <div><b>⏱️ Часы Сетха</b><br><span style="color:#aaa;font-size:11px;">Радиус ловли Сетки х2!</span></div>
            <button id="buyArtifact1" style="background:black;color:#ffd700;border:1px solid #ffd700;padding:6px;cursor:pointer;"></button>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;border:1px solid #333;padding:8px;background:black;margin-top:5px;">
            <div><b>🧬 Чёрный рынок ДНК</b><br><span style="color:#aaa;font-size:11px;">20 Обычных ДНК 🟢 на 1 Мутантное ДНК 🔴</span></div>
            <button id="tradeDnaBtn" style="background:black;color:#00ff00;border:1px solid #00ff00;padding:6px;cursor:pointer;">ОБМЕНЯТЬ</button>
        </div>
    </div>`;
    const b1 = document.getElementById("buyArtifact1");
    if(window.netRadiusMultiplier > 1) { b1.textContent = "КУПЛЕНО"; b1.disabled = true; b1.style.color = "#555"; b1.style.borderColor = "#555"; }
    else { b1.textContent = "КУПИТЬ (2,000 💵)"; b1.onclick = () => { if(window.dollars >= 2000) { window.dollars -= 2000; window.netRadiusMultiplier = 2; localStorage.setItem("vGame_netMult", 2); saveAllData(); openTraderMenu(); alert("⏱️ Радиус сетки увеличен!"); } else alert("Не хватает Долларов!"); }; }
    document.getElementById("tradeDnaBtn").onclick = () => { if(window.loot.dna_normal >= 20) { window.loot.dna_normal -= 20; window.loot.dna_mutant += 1; saveAllData(); openTraderMenu(); alert("🧬 Обмен завершен!"); } else alert("Нужно 20 Обычных ДНК!"); };
}
// Навигация и инициализация окон управления
const megaWindow = document.createElement("div"); megaWindow.style = "position:absolute;top:70px;left:20px;width:calc(100vw - 40px);height:calc(100vh - 180px);background:#000000;border:2px solid #00ff00;z-index:10000;display:none;flex-direction:column;padding:15px;box-sizing:border-box;"; arena.appendChild(megaWindow);
menuBtn.onclick = (e) => { e.stopPropagation(); megaWindow.style.display = megaWindow.style.display === "none" ? "flex" : "none"; if(megaWindow.style.display === "flex") switchTab("shop_normal"); };

const navTabs = document.createElement("div"); navTabs.style = "display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid #00ff00;padding-bottom:10px;"; megaWindow.appendChild(navTabs);
const tabContainer = document.createElement("div"); tabContainer.style = "flex:1;overflow-y:auto;margin-top:15px;"; megaWindow.appendChild(tabContainer);

const tabsConfig = [
    { id: "shop_normal", name: "Обычный Магазин" }, 
    { id: "shop_exclusive", name: "Эксклюзивное Оружие" }, 
    { id: "shop_bonuses", name: "Магазин Бонусов" }, 
    { id: "forge", name: "Кузница Крафта" }, 
    { id: "lab", name: "🧪 Секретная Лаборатория" }, 
    { id: "inventory", name: "🎒 RPG Инвентарь и Тюрьма" },
    { id: "helpers_upgrades", name: "👥 Прокачка Помощников" },
    { id: "boss_index", name: "🦠 Индекс Боссов" }
];
tabsConfig.forEach(t => { const btn = document.createElement("button"); btn.textContent = t.name; btn.style = "background:black;color:#00ff00;border:1px solid #00ff00;padding:6px 10px;cursor:pointer;font-weight:bold;"; btn.onclick = () => switchTab(t.id); navTabs.appendChild(btn); });

function switchTab(tabId) { 
    tabContainer.innerHTML = ""; 
    if (tabId === "shop_normal") renderNormalShop(); 
    if (tabId === "shop_exclusive") renderExclusiveShop(); 
    if (tabId === "shop_bonuses") renderBonusesShop(); 
    if (tabId === "forge") renderForge(); 
    if (tabId === "lab") renderLab(); 
    if (tabId === "inventory") renderInventory(); 
    if (tabId === "helpers_upgrades") renderHelpersUpgrades();
    if (tabId === "boss_index") renderBossIndex();
}

// База данных всего доступного вооружения
const normalWeapons = [
    { id: "bomb_default", name: "Бомба", cost: 200, upgradeCost: 300, desc: "Взрывы кликом по площади.", color: "#ffff00" },
    { id: "brick", name: "Кирпич", cost: 500, upgradeCost: 500, desc: "Бросок тяжелого кирпича. Шанс крита.", color: "#cd853f" },
    { id: "poison", name: "Отрава", cost: 1000, upgradeCost: 1000, desc: "Ядовитая лужа периодического урона.", color: "#00ff00" },
    { id: "saber", name: "Сабля", cost: 100, upgradeCost: 200, desc: "Базовый клинок. Крит х3.", color: "#aaa" },
    { id: "wooden_hammer", name: "🔨 Молот", cost: 150, upgradeCost: 150, desc: "Шанс 25% оглушить врага на 2 секунды.", color: "#8b5a2b" },
    { id: "catcher_net", name: "🕸️ Сетка Ловца", cost: 0, upgradeCost: 100, desc: "Ловит обычные вирусы в клетки для Лаборатории.", color: "#00ffaa" }
];
function renderNormalShop() { normalWeapons.forEach(item => { createWeaponShopRow(item, false); }); }

const exclusiveWeapons = [
    { id: "darkBlade", name: "Меч Тьмы 🌌", cost: 100000, upgradeCost: 50000, desc: "Урон ведением мыши по экрану. Крит х3.", color: "#8a2be2" }, 
    { id: "gandalfStaff", name: "Посох Гэндальфа 🧙‍♂️", cost: 100000, upgradeCost: 80000, desc: "Взрывы по площади.", color: "#00ffff" }, 
    { id: "hypnosis", name: "Гипноз 🌀", cost: 100000000, upgradeCost: 50000000, desc: "Обращает вирус в зомби-союзника.", color: "#00ffaa" }, 
    { id: "luciferSword", name: "Меч Люцифера 🔥", cost: 200000, upgradeCost: 100000, desc: "Трофей Люцифера. Крит и поджог врагов ведением мыши.", color: "#ff4500", isDropOnly: true }, 
    { id: "vader_saber", name: "Меч Вейдера 🌌", cost: 20000000, upgradeCost: 10000000, desc: "800 базового урона.", color: "#ff0000", isDropOnly: true },
    { id: "ninja_katana", name: "⚔️ Катана Самурая", cost: 4000000, upgradeCost: 2000000, desc: "Урон ведением мыши по вирусам.", color: "#4682b4", isDropOnly: true }
];
function renderExclusiveShop() { exclusiveWeapons.forEach(item => { createWeaponShopRow(item, true); }); }

function createWeaponShopRow(item, isEx) {
    const row = document.createElement("div"); row.style = "border:1px solid #00ff00;padding:10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;";
    const lvl = window.weaponLevels[item.id] || 1; const isUn = window.unlockedWeapons.includes(item.id) || item.id === "laser";
    const left = document.createElement("div"); left.innerHTML = `<span style="color:${item.color};font-weight:bold;">${item.name} [Ур. ${lvl}]</span><br><span style="font-size:11px;color:#aaa;">${item.desc}</span>`;
    const right = document.createElement("div"); right.style.display = "flex"; right.style.gap = "6px";
    
    const buyBtn = document.createElement("button"); buyBtn.style.padding = "5px 8px";
    if (isUn) { buyBtn.textContent = "РАЗБЛОКИРОВАНО"; buyBtn.style = "background:#222;color:#555;border:1px solid #555;"; }

// Новая плиточная RPG-сетка инвентаря (ФИКС: Теперь выбранная пушка горит белым неоном!)

        Активно добывающих Шахт: <b>${window.loot.mine_count} шт.</b> | Пленников под землей: <b>${window.loot.prisoner_count} человек</b><br>
        <span style="color:#aaa;font-size:11px;">[Шахты приносят пассивно: ${(window.loot.prisoner_count * 1000).toLocaleString()} бр/мин и имеют шанс выкопать Кристаллы 💎]</span>`;

    }

    const grid = document.createElement("div"); grid.className = "inv-grid";
    const names = { laser: "Лазер", bomb_default: "Бомба", brick: "Кирпич", poison: "Отрава", darkBlade: "Меч Тьмы 🌌", gandalfStaff: "Посох Гэндальфа 🧙‍♂️", hypnosis: "Гипноз 🌀", luciferSword: "Меч Люцифера 🔥", saber: "Сабля", human_gun: "Пушка", vader_saber: "Меч Вейдера", sauron_yatagan: "Ятаган Саурона", magic_wand: "Палочка 🪄", ninja_shuriken: "Сюрикены 🥷", ninja_katana: "Катана ⚔️", king_crown: "Корона 👑", catcher_net: "Сетка ЛОВЦА 🕸️" };
    
    window.unlockedWeapons.forEach(wId => {
        const slot = document.createElement("div"); slot.className = "inv-slot"; 
        // НЕОНОВЫЙ ФИКС: Если пушка выбрана, вешаем класс яркого белого свечения
        if(window.currentWeapon === wId) { slot.classList.add("inv-slot-active"); }
        slot.innerHTML = `<b>${names[wId] || wId}</b><br><span style="font-size:10px;color:#aaa;">Ур.${window.weaponLevels[wId]||1}</span>`;

    });
    tabContainer.appendChild(grid);

    const lh = document.createElement("h3"); lh.textContent = "💎 СКЛАД МАТЕРИАЛОВ И ШТАММОВ ДНК"; tabContainer.appendChild(lh);
    const lDiv = document.createElement("div"); lDiv.style = "border:1px dashed #333;padding:8px;";
    lDiv.innerHTML = `🟢 Обычные ДНК: <b>${window.loot.dna_normal} шт.</b> | 🟣 Шпионские ДНК: <b>${window.loot.dna_spy} шт.</b><br>🟡 Докторские ДНК: <b>${window.loot.dna_doctor} шт.</b> | 🔴 Мутантные ДНК: <b>${window.loot.dna_mutant} шт.</b>`;

function createVirusElement(hp, isB, isL, type) {
    const a = document.createElement("div"); a.style = "position:absolute;background:black;font-family:monospace;font-weight:bold;cursor:crosshair;z-index:9995;padding:8px;border:1px solid red;color:red;";
    if (type === "lucifer") { a.style = "position:absolute;border:6px solid #ff4500;padding:40px;fontSize:26px;color:#fff;background:linear-gradient(45deg,#ff4500,#ff8c00);left:40%;top:40%;"; a.textContent = "😈 ЛЮЦИФЕР"; }
    else if (type === "gazan") { a.style = "position:absolute;border:5px dashed #00ffff;padding:30px;fontSize:22px;color:#00ffff;left:40%;top:40%;"; a.textContent = "🎵 ГАЗАН"; }
    else if (type === "sauron") { a.style = "position:absolute;border:5px solid #4b0082;padding:35px;fontSize:24px;color:#fff;left:40%;top:40%;"; a.textContent = "👁️ САУРОН [INF HP]"; }
    else {
        if (type === "spy") { a.style.borderColor = "#ff00ff"; a.style.color = "#ff00ff"; a.textContent = `🕵️ ШПИОН [${hp}]`; }
        else if (type === "doctor") { a.style.borderColor = "#00ff00"; a.style.color = "#00ff00"; a.textContent = `🩺 ДОКТОР [${hp}]`; }
        else if (type === "mutant") { a.style.borderColor = "#ff3300"; a.style.color = "#ff3300"; a.textContent = `🧬 МУТАНТ [${hp}]`; }
        else { a.textContent = `🦠 ВИРУС [${hp}]`; }
        a.style.left = Math.random() * (window.innerWidth - 150) + "px"; a.style.top = 100 + Math.random() * (window.innerHeight - 200) + "px";
    }
    arena.appendChild(a); const o = getDiffStats();
    let s = (isL || ["gazan","sauron"].includes(type)) ? 18 : (isB ? 12 : 5) * o.speed * (1 + window.currentRound * 0.05);
    let vObj = { element: a, x: parseFloat(a.style.left) || 200, y: parseFloat(a.style.top) || 200, speedX: (Math.random() - 0.5) * s, speedY: (Math.random() - 0.5) * s, hp: hp, maxHp: hp, isBoss: isB, type: type, isFrozen: false, isZombie: false };
    window.flyingViruses.push(vObj);
    if(type === "gazan") { vObj.gInt = setInterval(() => { if (window.flyingViruses.includes(vObj)) { vObj.x = Math.random()*(window.innerWidth-180); vObj.y = 100+Math.random()*(window.innerHeight-180); } else clearInterval(vObj.gInt); }, 2000); }
}

function moveEngine() {
    window.flyingViruses.forEach(v => {
        if (!v.isFrozen && v.element) {
            const t = v.element.getBoundingClientRect(); v.x += v.speedX; v.y += v.speedY;
            if (v.x <= 0 || v.x + t.width >= window.innerWidth) v.speedX *= -1; if (v.y <= 0 || v.y + t.height >= window.innerHeight) v.speedY *= -1;
            window.gameWalls.forEach(w => { const wR = w.getBoundingClientRect(); if (v.x + t.width >= wR.left && v.x <= wR.right && v.y + t.height >= wR.top && v.y <= wR.bottom) { v.speedX *= -1; v.speedY *= -1; } });
            v.element.style.left = v.x + "px"; v.element.style.top = v.y + "px";
        }
    });
    requestAnimationFrame(moveEngine);
}
moveEngine();

setInterval(() => {
    window.flyingViruses.forEach(v => {
        if(v.isZombie || v.isFrozen) return;
        if (v.type === "lucifer" && Math.random() < 0.25) createVirusElement(10000, false, false, "luc_demon");
        if (v.type === "king" && window.flyingViruses.filter(x => x.type === "king_guard").length < 20 && Math.random() < 0.4) {
            createVirusElement(1000, false, false, "king_guard"); v.hp = Math.min(v.maxHp, v.hp + 500); updateVirusText(v);
        }
    });
}, 2500);

// ИСПРАВЛЕННОЕ ВЕДЕНИЕ МЫШИ (handleMouseTraces теперь режет Мечом Тьмы, Катаной и Люцифером!)
function handleMouseTraces() {
    window.flyingViruses.forEach(v => {
        if (!v.element || v.isZombie || v.isCaptured) return;
        const r = v.element.getBoundingClientRect();
        if (realMouseX >= r.left && realMouseX <= r.right && realMouseY >= r.top && realMouseY <= r.bottom) {
            if (window.currentWeapon === "darkBlade") { damageVirus(v, 25 * (window.weaponLevels.darkBlade || 1)); }
            if (window.currentWeapon === "ninja_katana") { damageVirus(v, 1500 * (window.weaponLevels.ninja_katana || 1)); }
            if (window.currentWeapon === "luciferSword") { damageVirus(v, 50 * (window.weaponLevels.luciferSword || 1)); }
        }
    });
}

setInterval(() => {
    const z = window.flyingViruses.filter(e => e.isZombie); const n = window.flyingViruses.filter(e => !e.isZombie);
    let capturedOnMap = window.flyingViruses.filter(v => v.isCaptured && v.isFrozen);
    if (capturedOnMap.length > 0 && Math.random() < 0.017) { window.dollars += capturedOnMap.length * 2; saveAllData(); }
    z.forEach(e => {
        if (!e.element) return; const rectZ = e.element.getBoundingClientRect(); const g = rectZ.left + rectZ.width/2; const a = rectZ.top + rectZ.height/2;
        n.forEach(t => {
            if (t.isCaptured) return; const rectN = t.element.getBoundingClientRect();
            if (Math.sqrt(Math.pow((rectN.left + rectN.width/2) - g, 2) + Math.pow((rectN.top + rectN.height/2) - a, 2)) <= 150) { damageVirus(t, 100); damageVirus(e, 10); }
        });
    });
    window.scouts.forEach(s => {
        n.forEach(v => {
            if (Math.sqrt(Math.pow(v.x - s.x, 2) + Math.pow(v.y - s.y, 2)) <= 120 && !v.isCaptured && !v.isBoss) {
                v.isCaptured = true; v.isFrozen = true; v.speedX = 0; v.speedY = 0;
                v.element.style.border = "3px dashed gold"; v.element.style.backgroundColor = "rgba(212, 175, 55, 0.3)"; v.element.style.color = "#ffd700";
                v.element.textContent = `⛓️ ПЛЕННИК (${v.type.toUpperCase()})`; alert(`🥷 Разведчики схватили миньона! Зайдите в инвентарь или нажмите на него на арене для отправки в Шахту.`); saveAllData();
            }
        });
    });
}, 1000);

arena.onclick = function(e) {
    const t = e.target; const isV = t && t.textContent && window.flyingViruses.some(v => v.element === t);
    if (isV) {
        e.stopPropagation(); const clickedVirus = window.flyingViruses.find(i => i.element === t);
        if (clickedVirus && clickedVirus.isCaptured && clickedVirus.isFrozen) {
            let action = confirm(`⛓️ Отправить пленника в ШАХТУ для авто-дохода Брелеров?`);
            if (action) { window.loot.prisoner_count++; clickedVirus.element.remove(); window.flyingViruses = window.flyingViruses.filter(i => i !== clickedVirus); saveAllData(); setTimeout(checkRoundEnd, 10); } return;
        }
        if (window.currentWeapon === "catcher_net") { window.loot.captured_viruses++; clickedVirus.element.remove(); window.flyingViruses = window.flyingViruses.filter(i => i !== clickedVirus); saveAllData(); alert("🕸️ Вирус успешно пойман в сетку!"); setTimeout(checkRoundEnd, 10); return; }
        let o = window.currentWeapon === "bomb_default" ? 300 : 100; o *= (window.weaponLevels[window.currentWeapon] || 1);
        if (window.currentWeapon === "bomb_default") { window.flyingViruses.forEach(v => { if(!v.isZombie) damageVirus(v, o); }); } else { damageVirus(clickedVirus, o); }
    }
    if (window.currentWeapon === "king_crown" && !isV) {
        let typeChoice = prompt("Кого призвать?\n1 - Страж-Доктор\n3 - Разведчик\n5 - Шахтёр");
        if(typeChoice === "3") { window.scouts.push({ x: realMouseX, y: realMouseY }); const h = document.createElement("div"); h.style = `position:absolute;left:${realMouseX}px;top:${realMouseY}px;padding:6px;background:black;border:2px dotted #fff;color:#fff;z-index:9994;`; h.textContent = "🕵️ РАЗВЕДЧИК"; arena.appendChild(h); }
        if(typeChoice === "5") { window.loot.mine_count++; const m = document.createElement("div"); m.className = "king-mine"; m.style = `left:${realMouseX}px;top:${realMouseY-30}px;`; m.textContent = "⚒️"; arena.appendChild(m); saveAllData(); }
    }
};

function damageVirus(e, t) {
    let auraMult = window.chosenAura === "dark" ? 2 : 1; let sigmaMult = window.sigmaStatus ? 6 : 1; e.hp -= (t * auraMult * sigmaMult);
    if (e.hp <= 0) {
        if (e.type === "normal") window.loot.dna_normal++; if (e.type === "spy") window.loot.dna_spy++; if (e.type === "doctor") window.loot.dna_doctor++; if (e.type === "mutant") window.loot.dna_mutant++;
        e.element.remove(); window.score += 100 * window.currentRound; saveAllData(); window.flyingViruses = window.flyingViruses.filter(i => i !== e); setTimeout(checkRoundEnd, 10);
    } else { updateVirusText(e); }
}

function updateVirusText(v) { if(v.element) v.element.textContent = v.isZombie ? `🧟 ZOMBIE [${v.hp}]` : `[${v.type.toUpperCase()}] ${v.hp} HP`; }

spawnBtn.onclick = function(e) {
    e.stopPropagation(); let max = window.currentRound % 10 === 0 ? 1 : window.currentRound; if (window.spawnedThisRound >= max) return;
    window.spawnedThisRound++; updateSpawnButtonText();
    let isB = window.currentRound % 10 === 0; const ds = getDiffStats(); let hp = isB ? (5000 * (window.currentRound/10)) : (100 * window.currentRound); hp *= ds.hp;
    let type = "normal"; if (!isB) { let r = Math.random(); if (r < 0.2) type = "spy"; else if (r < 0.4) type = "doctor"; else if (r < 0.5) type = "mutant"; }
    createVirusElement(hp, isB, false, type);
};

// ХОТКЕИ ФИКС: Стены Саурона ложатся ровно под кончик курсора!
window.onkeydown = function(e) {
    const k = e.key.toLowerCase();
    if (k === 'q' || k === 'й') { window.flyingViruses.forEach(v => { if(!v.isZombie) damageVirus(v, 1500); }); const wave = document.createElement("div"); wave.className = "sound-wave"; wave.style = `left:${realMouseX-100}px;top:${realMouseY-100}px;width:200px;height:200px;`; arena.appendChild(wave); setTimeout(()=>wave.remove(), 800); }
    if (k === 'e' || k === 'у') { window.flyingViruses.forEach(v => { v.isFrozen = true; setTimeout(()=>v.isFrozen=false, 4000); }); }
    if (k === 'k' || k === 'л') { const w = document.createElement("div"); w.className = "game-wall"; w.style = `left:${realMouseX-10}px;top:${realMouseY-70}px;`; w.textContent = "👁️ САУРОН"; arena.appendChild(w); window.gameWalls.push(w); }
};

function checkRoundEnd() {
    let max = window.currentRound % 10 === 0 ? 1 : window.currentRound;
    if (window.spawnedThisRound >= max && window.flyingViruses.filter(v=>!v.isZombie).length === 0) { window.currentRound++; window.spawnedThisRound = 0; updateSpawnButtonText(); saveAllData(); }
}
function saveAllData() { localStorage.setItem("vGame_brelers", window.score); localStorage.setItem("vGame_dollars", window.dollars); localStorage.setItem("vGame_weapons", JSON.stringify(window.unlockedWeapons)); localStorage.setItem("vGame_levels", JSON.stringify(window.weaponLevels)); localStorage.setItem("vGame_loot", JSON.stringify(window.loot)); updateInterfaceText(); }

updateInterfaceText(); updateSpawnButtonText();
</script>
