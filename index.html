function renderVirusIndex(){const e=document.createElement("div");e.style="display:flex;flex-direction:column;gap:10px;";[{name:"🦠 TARGET",desc:"Обычный вирус."},{name:"🕵️ ШПИОН",desc:"Маскируется под цвет фона. 1000 HP."},{name:"🩺 ДОКТОР",desc:"Лечит вирусы на +100 HP."},{name:"🧬 МУТАНТ",desc:"Иммунитет ко всему. При 100 HP призывает подмогу."}].forEach(item=>{const n=document.createElement("div");n.style="border-left:4px solid #00ff00;padding-left:10px;";n.innerHTML=`<b>${item.name}</b><br><span style='font-size:12px;color:#ccc;'>${item.desc}</span>`;e.appendChild(n)});tabContainer.appendChild(e)}
function playSound(type){try{const ctx=new(window.AudioContext||window.webkitAudioContext)(),osc=ctx.createOscillator(),gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);const now=ctx.currentTime;if(type==='laser'){osc.type='sawtooth';osc.frequency.setValueAtTime(800,now);osc.frequency.exponentialRampToValueAtTime(40,now+0.15);gain.gain.setValueAtTime(0.3,now);gain.gain.exponentialRampToValueAtTime(0.01,now+0.15);osc.start(now);osc.stop(now+0.15)}else if(type==='explosion'||type==='fire'){osc.type='triangle';osc.frequency.setValueAtTime(type==='fire'?180:120,now);gain.gain.setValueAtTime(0.6,now);gain.gain.exponentialRampToValueAtTime(0.01,now+0.4);osc.start(now);osc.stop(now+0.4)}else if(type==='zombie'){osc.type='sawtooth';osc.frequency.setValueAtTime(90,now);gain.gain.setValueAtTime(0.4,now);osc.start(now);osc.stop(now+0.5)}}catch(c){}}
spawnBtn.onclick=function(e){e.stopPropagation();if(window.spawnedThisRound>=getMaxViruses()||(window.currentRound%10===0&&window.flyingViruses.length>0))return;window.spawnedThisRound++;updateSpawnButtonText();const t=window.currentRound%10===0,n=window.currentRound/10,g=getDiffStats();let a=t?(1e4*Math.pow(10,n-1)):(100*window.currentRound);a*=g.hp;let o="normal";if(!t){let s=Math.random();if(s<0.2)o="spy";else if(s<0.4)o="doctor";else if(s<0.5)o="mutant"}createVirusElement(a,t,false,o)};
function spawnLucifer(){window.spawnedThisRound=1;createVirusElement(1e8,true,true,"lucifer");window.lucFireInt=setInterval(()=>{const l=window.flyingViruses.find(item=>item.isLucifer);if(!l){clearInterval(window.lucFireInt);return}const t=document.createElement("div");t.className="lucifer-fire";t.style.left=(l.x+30)+"px";t.style.top=(l.y+30)+"px";t.style.width="180px";t.style.height="180px";arena.appendChild(t);playSound('fire');const n=setInterval(()=>{if(!arena.contains(t)){clearInterval(n);return}const nR=t.getBoundingClientRect(),g=Math.sqrt(Math.pow((nR.left+90)-mouseX,2)+Math.pow((nR.top+90)-mouseY,2));window.cursorSpeedMultiplier=g<=90?0.2:1},100);setTimeout(()=>{clearInterval(n);window.cursorSpeedMultiplier=1;t.remove()},4000)},1500)}
function spawnGazan(){window.spawnedThisRound=1;createVirusElement(1e6,true,false,"gazan");const g=window.flyingViruses.find(item=>item.type==="gazan");g.gInt=setInterval(()=>{if(!window.flyingViruses.includes(g)){clearInterval(g.gInt);return}g.x=Math.random()*(window.innerWidth-200);g.y=100+Math.random()*(window.innerHeight-200)},2000)}
function createVirusElement(hp,isB,isL,type){const a=document.createElement("div");a.style.position="absolute";a.style.backgroundColor="black";a.style.fontFamily="monospace";a.style.fontWeight="bold";a.style.cursor="crosshair";a.style.zIndex="9995";if(type==="lucifer"){a.style.border="6px solid #ff4500";a.style.padding="40px";a.style.fontSize="26px";a.style.color="#fff";a.style.background="linear-gradient(45deg,#ff4500,#ff8c00)";a.style.left="40%";a.style.top="40%";a.textContent="😈 ЛЮЦИФЕР [100М HP]"}else if(type==="gazan"){a.style.border="5px dashed #00ffff";a.style.padding="30px";a.style.fontSize="22px";a.style.color="#00ffff";a.style.left="40%";a.style.top="40%";a.textContent="🎵 ГАЗАН [1М HP]"}else if(isB){a.style.border="4px solid #8a2be2";a.style.padding="25px";a.style.fontSize="20px";a.style.color="#fff";a.style.left="40%";a.style.top="40%";a.textContent=`👑 БОСС [${hp} HP]`}else{a.style.padding="8px";if(type==="spy"){a.style.border="1px solid #ff00ff";a.style.color="#ff00ff";hp=1e3;a.textContent=`🕵️ ШПИОН [${hp} HP]`}else if(type==="doctor"){a.style.border="1px solid #00ff00";a.style.color="#00ff00";hp=100;a.textContent=`🩺 ДОКТОР [${hp} HP]`}else if(type==="mutant"){a.style.border="2px solid #ff3300";a.style.color="#ff3300";hp=5e3;a.textContent=`🧬 МУТАНТ [${hp} HP]`}else{a.style.border="1px solid #ff3333";a.style.color="#ff3333";a.textContent=`🦠 TARGET [${hp} HP]`}a.style.left=Math.random()*(window.innerWidth-150)+"px";a.style.top=100+Math.random()*(window.innerHeight-200)+"px"}arena.appendChild(a);const o=getDiffStats(),s=(isL||type==="gazan")?20:(isB?14:5)*o.speed*(1+window.currentRound*0.05);window.flyingViruses.push({element:a,x:parseFloat(a.style.left)||window.innerWidth/2,y:parseFloat(a.style.top)||window.innerWidth/2,speedX:(Math.random()-0.5)*s,speedY:(Math.random()-0.5)*s,hp:hp,maxHp:hp,isBoss:isB,isLucifer:isL,type:type,isFrozen:false,isZombie:false,isBurning:false,burnTicks:0})}
function moveEngine(){window.flyingViruses.forEach(v=>{if(!v.isFrozen){const t=v.element.getBoundingClientRect();v.x+=v.speedX;v.y+=v.speedY;if(v.x<=0||v.x+t.width>=window.innerWidth)v.speedX*=-1;if(v.y<=0||v.y+t.height>=window.innerHeight)v.speedY*=-1;v.element.style.left=v.x+"px";v.element.style.top=v.y+"px"}});requestAnimationFrame(moveEngine)}moveEngine();
setInterval(()=>{window.flyingViruses.forEach(v=>{if(v.type==="spy"&&!v.isFrozen)v.element.style.color=v.element.style.color==="black"?"#ff00ff":"black";if(v.type==="doctor"&&!v.isFrozen){window.flyingViruses.forEach(t=>{if(t!==v&&Math.sqrt(Math.pow(t.x-v.x,2)+Math.pow(t.y-v.y,2))<=200){t.hp=Math.min(t.maxHp,t.hp+100);updateVirusText(t)}})}})},1e3);
function handleMouseTraces(){window.flyingViruses.forEach(v=>{const t=v.element.getBoundingClientRect();if(mouseX>=t.left&&mouseX<=t.right&&mouseY>=t.top&&mouseY<=t.bottom){if(window.currentWeapon==="darkBlade"){playSound('laser');let n=15*(window.weaponLevels.darkBlade||1);if(Math.random()<0.1)n*=3;if(v.type!=="mutant")damageVirus(v,n*getAuraMult())}if(window.currentWeapon==="luciferSword"&&v.type!=="mutant"&&!v.isBurning){v.isBurning=true;v.burnTicks=5}}})}
function getAuraMult(){return window.chosenAura==="dark"?2:1}
setInterval(()=>{window.flyingViruses.forEach(v=>{if(v.isBurning&&v.burnTicks>0){v.burnTicks--;v.element.style.backgroundColor="#ff4500";let t=600*(window.weaponLevels.luciferSword||1);if(Math.random()<0.1)t*=3;damageVirus(v,t);if(v.burnTicks<=0){v.isBurning=false;v.element.style.backgroundColor="black"}}})},1e3);
setInterval(()=>{const e=window.flyingViruses.filter(item=>item.isZombie),t=window.flyingViruses.filter(item=>!item.isZombie);e.forEach(item=>{const n=item.element.getBoundingClientRect(),g=n.left+n.width/2,a=n.top+n.height/2;t.forEach(targetItem=>{const n=targetItem.element.getBoundingClientRect(),o=Math.sqrt(Math.pow((n.left+n.width/2)-g,2)+Math.pow((n.top+n.height/2)-a,2));const s=window.weaponLevels.hypnosis||1;if(o<=150){playSound('zombie');damageVirus(targetItem,100*s);damageVirus(item,100*s)}})})},1e3);
arena.onclick=(e)=>{const t=e.target,n=t&&t.textContent&&(t.textContent.includes("TARGET")||t.textContent.includes("БОСС")||t.textContent.includes("ZOMBIE")||t.textContent.includes("ЛЮЦИФЕР")||t.textContent.includes("ШПИОН")||t.textContent.includes("ДОКТОР")||t.textContent.includes("МУТАНТ")||t.textContent.includes("ГАЗАН"));let g=window.weaponLevels[window.currentWeapon]||1;if(n&&window.musicianStatus&&Math.random()<0.465){const w=document.createElement("div");w.className="sound-wave";w.style.left=mouseX+"px";w.style.top=mouseY+"px";arena.appendChild(w);setTimeout(()=>w.remove(),800);window.flyingViruses.forEach(item=>{if(Math.sqrt(Math.pow(item.x-mouseX,2)+Math.pow(item.y-mouseY,2))<=300){item.isFrozen=true;item.element.style.borderColor="#00ffff";setTimeout(()=>{item.isFrozen=false;item.element.style.borderColor="#ff3333"},3e3);damageVirus(item,100)}})}if(window.currentWeapon==="shocker"){if(Date.now()<window.cooldowns.shocker){alert("Шокер КД!");return}window.cooldowns.shocker=Date.now()+1e4;playSound('laser');let a=[],o=250;window.flyingViruses.forEach(v=>{if(Math.sqrt(Math.pow(v.x-mouseX,2)+Math.pow(v.y-mouseY,2))<=o)a.push(v)});let s=50*g*a.length;a.forEach(v=>damageVirus(v,s));return}if(window.currentWeapon==="brick"){playSound('explosion');window.flyingViruses.forEach(v=>{const r=v.element.getBoundingClientRect();if(mouseX>=r.left&&mouseX<=r.right&&mouseY>=r.top&&mouseY<=r.bottom){let n=300*g;if(Math.random()<0.1)n*=3;damageVirus(v,n*getAuraMult())}});return}if(n){e.stopPropagation();const a=window.flyingViruses.find(item=>item.element===t);if(!a||a.isZombie)return;let o=window.currentWeapon==="laser"?100:200;o*=g;if(window.currentWeapon==="saber"){o=g;if(Math.random()<0.1)o*=3}if(window.currentWeapon==="laser"||window.currentWeapon==="bomb_default"||window.currentWeapon==="saber"){if(window.currentWeapon==="bomb_default"){playSound('explosion');const n=t.getBoundingClientRect();window.flyingViruses.forEach(item=>{if(Math.sqrt(Math.pow(item.x-n.left,2)+Math.pow(item.y-n.top,2))<=150)damageVirus(item,o*getAuraMult())})}else{playSound('laser');damageVirus(a,o*getAuraMult())}}}};
function updateVirusText(e){if(e.isZombie)e.element.textContent=`🧟 ZOMBIE [${e.hp} HP]`;else if(e.type==="lucifer")e.element.textContent=`😈 ЛЮЦИФЕР [${e.hp} HP]`;else if(e.type==="gazan")e.element.textContent=`🎵 ГАЗАН [${e.hp} HP]`;else if(e.isBoss)e.element.textContent=`👑 БОСС [${e.hp} HP]`;else e.element.textContent=`${e.type==='spy'?'🕵️ ШПИОН':(e.type==='doctor'?'🩺 ДОКТОР':(e.type==='mutant'?'🧬 МУТАНТ':'...'))} [${e.hp} HP]`}
function damageVirus(e,t){e.hp-=t;if(e.type==="mutant"&&e.hp<=100&&e.hp+t>100){createVirusElement(100,false,false,Math.random()<0.5?"doctor":"spy")}if(e.hp<=0){e.element.remove();let n=e.type==="lucifer"?5e7:(e.type==="gazan"?1e6:(e.isBoss?(1e4*Math.pow(10,(window.currentRound/10)-1)):100*window.currentRound));const g=getDiffStats();n*=g.cash;if(window.chosenAura==="light")n*=2;if(e.type==="lucifer"){let a=Math.random();if(a<0.5)window.loot.luc_wings++;if(a<0.1)window.loot.luc_dna++;if(a<0.01)window.loot.luc_crown++;window.hasLuciferSword=true;localStorage.setItem("vGame_hasLuciferSword","true");if(!window.unlockedWeapons.includes("luciferSword"))window.unlockedWeapons.push("luciferSword");alert("Вы одолели Люцифера! Меч Люцифера разблокирован!")}if(e.type==="gazan"){window.musicianStatus=true;localStorage.setItem("vGame_musician","true");alert("Газан побежден! Получен статус Музыканта!")}if(e.isBoss&&window.currentRound===10){window.firstBossDefeated=true;localStorage.setItem("virusGame_boss1","true")}if(e.isBoss&&window.currentRound===100){window.unlocked100Round=true;localStorage.setItem("vGame_r100_win","true");alert("🏆 100 раунд пройден! Все пушки открыты!")}if(!e.isZombie)window.score+=n;saveAllData();window.flyingViruses=window.flyingViruses.filter(item=>item !== e);setTimeout(checkRoundEnd,10)}else updateVirusText(e)}
window.onkeydown=function(e){const t=e.key;if(t.toLowerCase()==='q'||t.toLowerCase()==='й'){if(window.bombsLeft<=0)return;window.bombsLeft--;updateInterfaceText();playSound('explosion');const n=document.createElement("div");n.style=`position:absolute;left:${mouseX-25}px;top:${mouseY-25}px;width:50px;height:50px;border-radius:50%;background:red;border:3px solid white;color:white;text-align:center;line-height:50px;font-weight:bold;z-index:9998;`;let g=3;n.textContent=g;arena.appendChild(n);const a=setInterval(()=>{g--;n.textContent=g;if(g<=0){clearInterval(a);const rect=n.getBoundingClientRect(),t=rect.left+25,g=rect.top+25;n.remove();window.flyingViruses.forEach(item=>{if(!item.isZombie&&Math.sqrt(Math.pow(item.x-t,2)+Math.pow(item.y-g,2))<=250)damageVirus(item,600)})}},1e3)}if(t.toLowerCase()==='e'||t.toLowerCase()==='у'){if(window.freezesLeft <= 0)return;window.freezesLeft--;updateInterfaceText();playSound('god');window.flyingViruses.forEach(item => {item.isFrozen=true;item.element.style.borderColor="#00ffff"});setTimeout(()=>{window.flyingViruses.forEach(item=>{item.isFrozen=false;item.element.style.borderColor=item.type==='lucifer'?"#ff4500":(item.isBoss?"#8a2be2":"#ff3333")})},5e3)}};
function checkRoundEnd(){if(window.spawnedThisRound>=getMaxViruses()&&window.flyingViruses.length===0){if(window.currentRound===20&&window.chosenAura==="none"){const e=confirm("Вы прошли 20 раунд! Выберите СВЕТЛУЮ ауру (Брелеры х2) - ОК, или ТЕМНУЮ (Сила х2) - Отмена");window.chosenAura=e?"light":"dark";localStorage.setItem("vGame_aura",window.chosenAura)}window.currentRound++;window.bombsLeft=2;window.freezesLeft=2;window.spawnedThisRound=0;updateSpawnButtonText();saveAllData();updateInterfaceText();alert(`Раунд пройден! Начинается раунд ${window.currentRound}`)}}
function saveAllData(){localStorage.setItem("vGame_brelers",window.score);localStorage.setItem("vGame_round",window.currentRound);localStorage.setItem("vGame_weapons",JSON.stringify(window.unlockedWeapons));localStorage.setItem("vGame_levels",JSON.stringify(window.weaponLevels));localStorage.setItem("vGame_loot",JSON.stringify(window.loot));updateInterfaceText()}updateInterfaceText();
</script>
