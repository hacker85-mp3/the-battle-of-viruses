    window.flyingViruses.forEach(v => {
        if (!v.isFrozen && v.element) {
            if (v.type === "sigma" && v.hp <= 200000 && !v.isGigachad) {
                v.isGigachad = true; v.speedX *= 3; v.speedY *= 3; v.element.style.animation = "gigachad-pulse 0.4s infinite alternate"; v.element.style.background = "#ff0000"; v.element.style.color = "white"; v.element.textContent = "🗿 ГИГАЧАД СИГМА [АКТИВАЦИЯ БАСОВ!]";
                v.bassInterval = setInterval(() => { if(window.flyingViruses.includes(v)) playSound('bass'); else clearInterval(v.bassInterval); }, 400);
            }
            if (v.type === "prototype" && v.hp <= 500000000 && !v.hasSplit) {
                v.hasSplit = true; v.hp = 0; v.element.remove();
                createVirusElement(250000000, true, false, "prototype_mini"); createVirusElement(250000000, true, false, "prototype_mini"); return;
            }
            const t = v.element.getBoundingClientRect(); v.x += v.speedX; v.y += v.speedY;
            if (v.x <= 0 || v.x + t.width >= window.innerWidth) v.speedX *= -1; if (v.y <= 0 || v.y + t.height >= window.innerHeight) v.speedY *= -1;
            
            // Фикс отскока вирусов от стен Саурона (клавиша K)
            window.gameWalls.forEach(w => {
                const wR = w.getBoundingClientRect(); if (v.x + t.width >= wR.left && v.x <= wR.right && v.y + t.height >= wR.top && v.y <= wR.bottom) { v.speedX *= -1; v.speedY *= -1; }
            });
            v.element.style.left = v.x + "px"; v.element.style.top = v.y + "px";
        }
    });
    requestAnimationFrame(moveEngine);
}

            const tRect = throne.getBoundingClientRect();
            if (e.x + 20 >= tRect.left && e.x <= tRect.right && e.y + 20 >= tRect.top && e.y <= tRect.bottom) {
                if(!e.isKingOnThrone) { e.isKingOnThrone = true; e.element.style.background = "gold"; e.element.style.color = "black"; e.element.textContent = "👑 ЗОМБИ-КОРОЛЬ"; alert("👑 Помощник сел на Трон!"); }
            }
        });
    });

    // РАЗВЕДЧИКИ: Ловят только миньонов, морозят в золотые клетки, боссов не трогают!
    window.scouts.forEach(s => {
        n.forEach(v => {
            if (Math.sqrt(Math.pow(v.x - s.x, 2) + Math.pow(v.y - s.y, 2)) <= 120 && !v.isCaptured && !v.isBoss && !v.isHorcrux && !["lucifer", "gazan", "sigma", "vader", "sauron", "voldemort", "prototype", "mcdonald", "ninja_boss", "king", "creature_644448684"].includes(v.type)) {
                v.isCaptured = true; v.isFrozen = true; v.speedX = 0; v.speedY = 0;
                v.element.style.border = "3px dashed gold"; v.element.style.backgroundColor = "rgba(212, 175, 55, 0.3)"; v.element.style.color = "#ffd700";
                v.element.textContent = `⛓️ ПЛЕННИК (${v.type.toUpperCase()}) [+2💵/мин]`;
                alert(`🥷 Разведчики схватили миньона [${v.type.toUpperCase()}]! Кликните на него на арене для отправки в Шахту.`);
                saveAllData(); setTimeout(checkRoundEnd, 10);
            }
        });
    });
}, 1000);

// ИСПРАВЛЕННАЯ ЛОГИКА АТАКИ ПРИ КЛИКАХ И УПРАВЛЕНИЯ ПЛЕННИКАМИ
arena.onclick = function(e) {
    const t = e.target; let lvl = window.weaponLevels[window.currentWeapon] || 1;
    const isV = t && t.textContent && window.flyingViruses.some(v => v.element === t);
    
    // Клик по пойманному миньону — выбор Шахты
    if (isV) {
        const clickedVirus = window.flyingViruses.find(i => i.element === t);
        if (clickedVirus && clickedVirus.isCaptured && clickedVirus.isFrozen) {
            e.stopPropagation();
            let action = confirm(`⛓️ Управление пленником:\nНажмите ОК, чтобы отправить его в ШАХТУ добывать Брелеры (+1000 бр/мин).\nНажмите Отмена, чтобы оставить его на арене платить Доллары (+2 💵/мин).`);
            if (action) {
                window.loot.prisoner_count++; clickedVirus.element.remove();
                window.flyingViruses = window.flyingViruses.filter(i => i !== clickedVirus);
                saveAllData(); alert("⚒️ Пленник успешно отправлен в шахты!"); setTimeout(checkRoundEnd, 10);
            }
            return;
        }
    }

    if (window.currentWeapon === "king_crown" && !isV) {
        let typeChoice = prompt("Кого призвать?\n1 - Страж-Доктор\n2 - Боевой Стражник\n3 - Разведчик\n5 - Шахтёр");
        let x = realMouseX, y = realMouseY;
        if(typeChoice === "1") {
            const h = document.createElement("div"); h.style = `position:absolute;left:${x}px;top:${y}px;padding:8px;background:black;border:2px solid #00ff00;color:#00ff00;font-weight:bold;z-index:9994;`; h.textContent = "🩺 СТРАЖ-ДОКТОР"; arena.appendChild(h);
            window.flyingViruses.push({ element: h, x: x, y: y, speedX: 4, speedY: 4, hp: 100, maxHp: 100, isZombie: true, type: "guard_doc", isFrozen: false });
        } else if(typeChoice === "2") {
            const h = document.createElement("div"); h.style = `position:absolute;left:${x}px;top:${y}px;padding:8px;background:black;border:2px solid #ffd700;color:#fff;font-weight:bold;z-index:9994;`; h.textContent = "⚔️ СТРАЖНИК"; arena.appendChild(h);
            window.flyingViruses.push({ element: h, x: x, y: y, speedX: 5, speedY: 5, hp: 500, maxHp: 500, isZombie: true, type: "king_guard", isFrozen: false });
        } else if(typeChoice === "3") {
            const h = document.createElement("div"); h.style = `position:absolute;left:${x}px;top:${y}px;padding:8px;background:black;border:2px dotted #fff;color:#fff;z-index:9994;`; h.textContent = "🕵️ РАЗВЕДЧИК"; arena.appendChild(h);
            window.scouts.push({ x: x, y: y });
        } else if(typeChoice === "5") {
            window.loot.mine_count++; const m = document.createElement("div"); m.className = "king-mine"; m.style = `left:${x}px;top:${y}px;`; m.textContent = "⚒️"; arena.appendChild(m); saveAllData();
        }
        return;
    }

    if (window.currentWeapon === "king_throne_item" && !isV) {
        const th = document.createElement("div"); th.className = "king-throne"; th.style = `left:${realMouseX-20}px;top:${realMouseY-20}px;`; th.textContent = "🪑"; arena.appendChild(th); window.kingThrones.push(th); return;
    }

    if (window.currentWeapon === "hypnosis") {
        const targetVirus = window.flyingViruses.find(i => i.element === t);
        if (targetVirus && !targetVirus.isZombie && !targetVirus.isBoss && !targetVirus.isHorcrux) {
            e.stopPropagation(); targetVirus.isZombie = true; targetVirus.hp = window.sauronStatus ? window.zombieSettings.hp : 200 * lvl; targetVirus.maxHp = targetVirus.hp;
            targetVirus.element.style.border = "2px solid #00ff00"; targetVirus.element.style.color = "#00ff00"; updateVirusText(targetVirus); setTimeout(checkRoundEnd, 20); return;
        }
    }

    if (isV && window.currentWeapon === "catcher_net") {
        e.stopPropagation(); const a = window.flyingViruses.find(i => i.element === t);
        if (a && !a.isZombie && !a.isBoss && !a.isHorcrux) {
            window.loot.captured_viruses++; a.element.remove(); window.flyingViruses = window.flyingViruses.filter(i => i !== a); saveAllData(); alert("🕸️ ВИРУС УСПЕШНО ПОЙМАН В СЕТКУ!"); setTimeout(checkRoundEnd, 10); return;
        }
    }

    if (isV) {
        e.stopPropagation(); const a = window.flyingViruses.find(i => i.element === t); if (!a || a.isZombie) return;
        if (a.type === "sauron") { alert("Саурон уязвим только к Вулкану!"); return; }
        if (a.type === "voldemort" && window.flyingViruses.some(v => v.isHorcrux)) { alert("Волан-де-Морт защищен Крестражами!"); return; }
        if (a.isHorcrux) { a.hp--; if(a.hp <= 0) { let vold = window.flyingViruses.find(x => x.type === "voldemort"); if(vold) { vold.hp -= 1000; updateVirusText(vold); } a.element.remove(); window.flyingViruses = window.flyingViruses.filter(x => x !== a); } return; }

        let o = 100;
        if (window.currentWeapon === "laser") o = 100;
        else if (window.currentWeapon === "bomb_default") o = 200;
        else if (window.currentWeapon === "saber") o = 150;
        else if (window.currentWeapon === "human_gun") o = 600;
        else if (window.currentWeapon === "vader_saber") o = 800;
        else if (window.currentWeapon === "ninja_shuriken") o = 400;
        
        o *= lvl;
        if (window.statusFat) { a.speedX = (a.x - realMouseX)*0.8; a.speedY = (a.y - realMouseY)*0.8; }
        if (window.currentWeapon === "bomb_default") {
            window.flyingViruses.forEach(v => { if(!v.isZombie && !v.isHorcrux) damageVirus(v, o*getAuraMult()*getStatusMult("bomb_default")); });
        } else { damageVirus(a, o*getAuraMult()*getStatusMult(window.currentWeapon)); }
    }
};

// ХАКЕРСКИЕ КЛАВИШИ Q, E, K И ИСПРАВЛЕННЫЕ КООРДИНАТЫ МЫШИ
window.onkeydown = function(e) {
    const k = e.key.toLowerCase();
    
    // Клавиша Q - Бомба наводится четко под realMouse
    if (k === 'q' || k === 'й') {
        window.flyingViruses.forEach(v => { if(!v.isZombie && !v.isHorcrux) damageVirus(v, 1500); });
        const wave = document.createElement("div"); wave.className = "sound-wave"; wave.style = `left:${realMouseX-100}px;top:${realMouseY-100}px;width:200px;height:200px;`; arena.appendChild(wave); setTimeout(()=>wave.remove(), 800);
    }
    // Клавиша E - Заморозка
    if (k === 'e' || k === 'у') {
        window.flyingViruses.forEach(v => { v.isFrozen = true; setTimeout(()=>v.isFrozen=false, 4000); });
    }
    // Клавиша K - Вечные Стены Саурона ставятся четко перед курсором мыши
    if (k === 'k' || k === 'л') {
        const w = document.createElement("div"); w.className = "game-wall"; w.style = `left:${realMouseX-10}px;top:${realMouseY-70}px;`; w.textContent = "👁️ САУРОН"; arena.appendChild(w); window.gameWalls.push(w);
    }
};

function checkRoundEnd() {
    const normalVirusesLeft = window.flyingViruses.filter(v => !v.isZombie && !v.isHorcrux && !v.isCaptured);
    if (window.spawnedThisRound >= getMaxViruses() && normalVirusesLeft.length === 0) {
        window.currentRound++; window.bombsLeft = 2; window.freezesLeft = 2; window.spawnedThisRound = 0; updateSpawnButtonText(); saveAllData(); updateInterfaceText();
    }
}

function saveAllData() { localStorage.setItem("vGame_brelers", window.score); localStorage.setItem("vGame_dollars", window.dollars); localStorage.setItem("vGame_weapons", JSON.stringify(window.unlockedWeapons)); localStorage.setItem("vGame_levels", JSON.stringify(window.weaponLevels)); localStorage.setItem("vGame_loot", JSON.stringify(window.loot)); localStorage.setItem("vGame_favorites", JSON.stringify(window.favoriteWeapons)); localStorage.setItem("vGame_groups", JSON.stringify(window.weaponGroups)); localStorage.setItem("vGame_labLvl", window.labLevel); localStorage.setItem("vGame_labTubes", window.labTubes); localStorage.setItem("vGame_dnaRegen", window.dnaRegenActive); localStorage.setItem("vGame_dnaInvis", window.dnaInvisActive); localStorage.setItem("vGame_dnaSplit", window.dnaSplitActive); localStorage.setItem("vGame_dnaTaxes", window.dnaTaxesActive); localStorage.setItem("vGame_creature", window.creatureUnlocked); updateInterfaceText(); }
updateInterfaceText();
</script>
