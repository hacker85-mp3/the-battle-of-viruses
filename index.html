window.favoriteWeapons = JSON.parse(localStorage.getItem("vGame_favorites")) || [];
window.unlockedWeapons = JSON.parse(localStorage.getItem("vGame_weapons")) || ["laser", "bomb_default"];

    if (window.gameDifficulty === "medium") return { speed: 1.5, hp: 1.5, cash: 1.5 };
    if (window.gameDifficulty === "hard") return { speed: 2, hp: 2, cash: 2 };
    if (window.gameDifficulty === "extreme") return { speed: 5, hp: 4, cash: 4 };
    return { speed: 1, hp: 1, cash: 1 };
}

setInterval(() => {
    if (window.labTubes > 0 && window.flyingViruses.length > 0) {
        if (window.flyingViruses.filter(v => !v.isZombie).length > 0) {
            window.score += window.labTubes * 50 * window.labLevel;
            saveAllData();
        }
    }
}, 1000);

// Логика Трона и Шахт Короля (Ежеминутные начисления брелеров и долларов)
setInterval(() => {
    if (window.flyingViruses.length > 0) {
        // Доход от Трона, если его занял твой помощник
        let throneOccupied = window.flyingViruses.some(v => v.isZombie && v.isKingOnThrone);
        if (throneOccupied) {
            window.score += 1000;
            window.dollars += 100;
            saveAllData();
        }
        // Доход от Шахт за каждого пленного вируса
        if (window.loot.prisoner_count > 0 && window.loot.mine_count > 0) {
            let totalWorkers = Math.min(window.loot.prisoner_count, window.loot.mine_count * 3); // макс 3 пленных на шахту
            window.score += totalWorkers * 1000;
            saveAllData();
        }
    }
}, 60000);

setInterval(() => {
    if (window.hasMagCollector && window.flyingViruses.length > 0) {
        if (window.flyingViruses.filter(v => !v.isZombie).length > 0) { window.score += 15; saveAllData(); }
    }
}, 5000);

    if (window.hasAmuletHell && window.flyingViruses.length > 0) {
        let rv = window.flyingViruses[Math.floor(Math.random() * window.flyingViruses.length)];
        if (rv && !rv.isZombie && rv.hp > 0) {
            let tax = Math.ceil(rv.maxHp * 0.10); rv.hp -= tax; window.score += Math.ceil(tax * 0.5); saveAllData();
            if (rv.hp <= 0) { damageVirus(rv, 0); } else { updateVirusText(rv); }
        }
    }

const menuBtn = document.createElement("button"); menuBtn.textContent = "МАГАЗИН / КУЗНИЦА / ИНВЕНТАРЬ"; menuBtn.style.padding = "8px 16px"; menuBtn.style.background = "black"; menuBtn.style.color = "#00ff00"; menuBtn.style.border = "2px solid #00ff00"; menuBtn.style.fontFamily = "monospace"; menuBtn.style.cursor = "pointer"; menuBtn.style.fontWeight = "bold"; topBar.appendChild(menuBtn);

diffSelect.onchange = () => { window.gameDifficulty = diffSelect.value; localStorage.setItem("vGame_diff", window.gameDifficulty); updateInterfaceText(); };

const scoreBoard = document.createElement("div"); scoreBoard.style.position = "absolute"; scoreBoard.style.top = "20px"; scoreBoard.style.right = "20px"; scoreBoard.style.color = "#00ff00"; scoreBoard.style.fontFamily = "monospace"; scoreBoard.style.fontSize = "22px"; scoreBoard.style.fontWeight = "bold"; scoreBoard.style.zIndex = "9999"; arena.appendChild(scoreBoard);

const infoBox = document.createElement("div"); infoBox.style.position = "absolute"; infoBox.style.bottom = "20px"; infoBox.style.left = "20px"; infoBox.style.width = "480px"; infoBox.style.backgroundColor = "rgba(0,0,0,0.9)"; infoBox.style.border = "1px solid #00ff00"; infoBox.style.zIndex = "9999"; infoBox.style.display = "flex"; infoBox.style.flexDirection = "column"; arena.appendChild(infoBox);

const toggleBtn = document.createElement("button"); toggleBtn.textContent = "[-] СВЕРНУТЬ"; toggleBtn.style.background = "transparent"; toggleBtn.style.border = "none"; toggleBtn.style.color = "#00ff00"; toggleBtn.style.fontFamily = "monospace"; toggleBtn.style.cursor = "pointer"; toggleBtn.style.fontWeight = "bold"; infoHeader.appendChild(toggleBtn);

function toggleInfo() { infoContent.style.display = isInfoCollapsed ? "block" : "none"; infoHeader.style.borderBottom = isInfoCollapsed ? "1px solid #00ff00" : "none"; toggleBtn.textContent = isInfoCollapsed ? "[-] СВЕРНУТЬ" : "[+] РАЗВЕРНУТЬ"; isInfoCollapsed = !isInfoCollapsed; }
toggleBtn.onclick = (e) => { e.stopPropagation(); toggleInfo(); }; infoHeader.onclick = toggleInfo;

    scoreBoard.textContent = "БРЕЛЕРЫ: " + window.score.toLocaleString() + " | 💵 DOLLARS: " + window.dollars.toLocaleString(); roundBoard.textContent = "РАУНД: " + window.currentRound; infoTitle.textContent = `=== ИГРОВЫЕ СТАТУСЫ ===`;

}

updateSpawnButtonText();
const megaWindow = document.createElement("div"); megaWindow.style = "position:absolute;top:70px;left:20px;width:calc(100vw - 40px);height:calc(100vh - 180px);background:rgba(0,15,0,0.96);border:2px solid #00ff00;z-index:10000;display:none;flex-direction:column;font-family:monospace;color:#00ff00;padding:15px;box-sizing:border-box;"; arena.appendChild(megaWindow);
menuBtn.onclick = (e) => { e.stopPropagation(); if (megaWindow.style.display === "none") { megaWindow.style.display = "flex"; switchTab("shop_normal"); } else { megaWindow.style.display = "none"; } };

const tabContainer = document.createElement("div"); tabContainer.style = "flex:1;overflow-y:auto;margin-top:15px;padding-right:5px;"; megaWindow.appendChild(tabContainer);

const tabsConfig = [
    { id: "shop_normal", name: "Обычный Магазин" }, 
    { id: "shop_exclusive", name: "Эксклюзивное Оружие" }, 
    { id: "shop_bonuses", name: "Магазин Бонусов" },

    }

    e.hp -= t;
    if (e.hp <= 0) {
        if (e.type === "king_guard") {
            let kingBoss = window.flyingViruses.find(x => x.type === "king");
            if(kingBoss) { kingBoss.kingShield += 8000; kingBoss.hp = Math.min(kingBoss.maxHp, kingBoss.hp + 1000); updateVirusText(kingBoss); }
        }

        let minions = window.flyingViruses.filter(v => ["luc_demon", "human_robot", "death_eater", "mcd_worker", "king_guard"].includes(v.type));
        if (["lucifer", "human", "voldemort", "king"].includes(e.type) && minions.length > 0) {
            alert(`⚠️ Лут заблокирован! Сначала добейте оставшихся ${minions.length} слуг босса!`);
            e.element.remove(); window.flyingViruses = window.flyingViruses.filter(i => i !== e); setTimeout(checkRoundEnd, 10); return;
        }
        
        e.element.remove(); let reward = 100 * window.currentRound;
        if (e.type === "lucifer") { reward = 50000000; window.loot.luc_wings++; window.unlockedWeapons.push("luciferSword"); }
        else if (e.type === "human") { reward = 1000; window.loot.human_armor++; window.unlockedWeapons.push("human_gun"); }
        else if (e.type === "voldemort") { reward = 500000000000; if(Math.random()<0.5) window.unlockedWeapons.push("magic_wand"); }
        else if (e.type === "prototype_mini" || e.type === "prototype") { reward = 1000000; window.unlockedWeapons.push(Math.random()<0.3?"crab_claws":(Math.random()<0.5?"mommy_hand":"huggy_hand")); }
        else if (e.type === "mcdonald") { reward = 100000000; window.loot.mcd_building = 1; window.unlockedWeapons.push("mcd_tray"); }
        else if (e.type === "ninja_boss") { reward = 10000000; window.unlockedWeapons.push("ninja_shuriken"); if(Math.random()<0.3) window.unlockedWeapons.push("ninja_katana"); if(Math.random()<0.1) { window.ninjaStatus = true; localStorage.setItem("vGame_ninjaStatus","true"); } }
        else if (e.type === "king") { reward = 10000; window.dollars += 1000; if(Math.random()<0.05) window.unlockedWeapons.push("king_crown"); if(Math.random()<0.05) window.unlockedWeapons.push("king_castle_item"); if(Math.random()<0.4) window.unlockedWeapons.push("king_throne_item"); }

        if (!e.isZombie) window.score += reward; saveAllData();
        window.flyingViruses = window.flyingViruses.filter(i => i !== e); setTimeout(checkRoundEnd, 10);
    } else updateVirusText(e);
}

function checkRoundEnd() {
    const normalVirusesLeft = window.flyingViruses.filter(v => !v.isZombie && !v.isHorcrux);
    if (window.spawnedThisRound >= getMaxViruses() && normalVirusesLeft.length === 0) {
        window.currentRound++; window.bombsLeft = 2; window.freezesLeft = 2; window.spawnedThisRound = 0; updateSpawnButtonText(); saveAllData(); updateInterfaceText();
    }
}

function saveAllData() { localStorage.setItem("vGame_brelers", window.score); localStorage.setItem("vGame_dollars", window.dollars); localStorage.setItem("vGame_weapons", JSON.stringify(window.unlockedWeapons)); localStorage.setItem("vGame_levels", JSON.stringify(window.weaponLevels)); localStorage.setItem("vGame_loot", JSON.stringify(window.loot)); localStorage.setItem("vGame_favorites", JSON.stringify(window.favoriteWeapons)); localStorage.setItem("vGame_groups", JSON.stringify(window.weaponGroups)); localStorage.setItem("vGame_labLvl", window.labLevel); localStorage.setItem("vGame_labTubes", window.labTubes); updateInterfaceText(); }
updateInterfaceText();
</script>
