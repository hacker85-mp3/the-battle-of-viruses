        }
        if (k === 'm' || k === 'ь') {
            if (Date.now() < window.cooldowns.spellM) { alert("Призыв магов на КД!"); return; }
            window.cooldowns.spellM = Date.now() + 60000; playSound('god');
            alert("🪄 Заклинание M: Призваны два волшебника-помощника!");
            for(let i=0; i<2; i++) {
                const helper = document.createElement("div"); helper.style = `position:absolute;left:${mouseX + (i===0?-80:80)}px;top:${mouseY + 50}px;padding:8px;background:purple;color:white;font-weight:bold;z-index:9996;border-radius:50%;`;
                helper.appendChild(helper); arena.appendChild(helper);
                const shootInt = setInterval(() => {
                    if(!arena.contains(helper)) { clearInterval(shootInt); return; }
                    let target = window.flyingViruses.find(v => !v.isZombie);
                    if(target) { playSound('laser'); damageVirus(target, 150 * lvl); }
                }, 1500);
                setTimeout(() => { helper.remove(); clearInterval(shootInt); }, 15000);
            }
        }
    }

    if (k === 'k' || k === 'л') {
        if (!window.hasObiShield) { if (window.loot.sauron_wall <= 0) return; window.loot.sauron_wall--; }
        const n = document.createElement("div"); n.className = "game-wall";
        if (window.hasObiShield) { n.style.height = "220px"; n.style.boxShadow = "0 0 35px #00ffea"; n.style.background = "#00ffea"; }
        n.style.left = mouseX + "px"; n.style.top = mouseY + "px"; arena.appendChild(n); window.gameWalls.push(n);
        let standTime = window.hasObiShield ? 15000 : 8000;
        setTimeout(() => { n.remove(); window.gameWalls = window.gameWalls.filter(w => w !== n); }, standTime); saveAllData();
    }
    if (k === 'q' || k === 'й') {
        if (window.bombsLeft <= 0) return; window.bombsLeft--; updateInterfaceText(); playSound('explosion');
        const b = document.createElement("div"); b.style = `position:absolute;left:${mouseX - 25}px;top:${mouseY - 25}px;width:50px;height:50px;border-radius:50%;background:red;border:3px solid white;color:white;text-align:center;line-height:50px;font-weight:bold;z-index:9998;`;
        let g = 3; b.textContent = g; arena.appendChild(b);
        const a = setInterval(() => { g--; b.textContent = g; if (g <= 0) { clearInterval(a); const rect = b.getBoundingClientRect(); const t = rect.left + 25; const z = rect.top + 25; b.remove(); window.flyingViruses.forEach(virusItem => { if (!virusItem.isZombie && Math.sqrt(Math.pow(virusItem.x - t, 2) + Math.pow(virusItem.y - z, 2)) <= 250) damageVirus(virusItem, 600); }); } }, 1000);
    }
    if (k === 'e' || k === 'у') {
        if (window.freezesLeft <= 0) return; window.freezesLeft--; updateInterfaceText(); playSound('god');
        window.flyingViruses.forEach(e => { e.isFrozen = true; e.element.style.borderColor = "#00ffff"; });
        setTimeout(() => { window.flyingViruses.forEach(e => { e.isFrozen = false; e.element.style.borderColor = "red"; }); }, 5000);
    }
};

function checkRoundEnd() {
    const normalVirusesLeft = window.flyingViruses.filter(v => !v.isZombie);
    if (window.spawnedThisRound >= getMaxViruses() && normalVirusesLeft.length === 0) {
        if (window.currentRound === 20 && window.chosenAura === "none") {
            const e = confirm("Вы прошли 20 раунд! Выберите СВЕТЛУЮ ауру (Брелеры x2) - ОК, или ТЕМНУЮ (Сила x2) - Отмена"); window.chosenAura = e ? "light" : "dark"; localStorage.setItem("vGame_aura", window.chosenAura);
        }
        window.currentRound++; window.bombsLeft = 2; window.freezesLeft = 2; window.spawnedThisRound = 0; updateSpawnButtonText(); saveAllData(); updateInterfaceText(); alert(`Раунд пройден! Начинается раунд ${window.currentRound}`);
    }
}

function hasAliveMinions(bossType) {
    if (bossType === "human") return window.flyingViruses.some(v => v.type === "human_robot");
    if (bossType === "lucifer") return window.flyingViruses.some(v => v.type === "luc_demon");
    if (bossType === "voldemort") return window.flyingViruses.some(v => v.type === "death_eater") || document.getElementsByClassName("voldemort-horcrux").length > 0;
    if (bossType === "neon_ninja") return window.flyingViruses.some(v => v.type === "ninja_shuriken");
    return false;
}

function damageVirus(e, t) {
    if (e.type === "prototype" && e.hp > 0 && e.hp - t <= e.maxHp / 2 && !e.hasSplit) {
        e.hasSplit = true; e.element.remove(); window.flyingViruses = window.flyingViruses.filter(i => i !== e);
        alert("🤖 Прототип 1006 разделился на два сверхбыстрых клона!");
        for(let i=0; i<2; i++) {
            const cloneHp = Math.floor(e.maxHp / 4);
            const a = document.createElement("div"); a.style = `position:absolute;background:#111;border:3px solid #0000ff;padding:15px;font-size:14px;color:white;font-weight:bold;z-index:9995;left:${e.x + (i===0?-50:50)}px;top:${e.y}px;`;
            a.textContent = `🤖 КЛОН 1006 [${cloneHp.toLocaleString()} HP]`; arena.appendChild(a);
            window.flyingViruses.push({ element: a, x: e.x + (i===0?-50:50), y: e.y, speedX: (Math.random()-0.5)*40, speedY: (Math.random()-0.5)*40, hp: cloneHp, maxHp: cloneHp, isBoss: false, isLucifer: false, type: "prototype_clone", isFrozen: false, isZombie: false, isBurning: false, burnTicks: 0, isGigachad: false });
        }
        return;
    }

    e.hp -= t; if (e.type === "mutant" && e.hp <= 100 && e.hp + t > 100 && !e.isZombie) { createVirusElement(100, false, false, Math.random() < 0.5 ? "doctor" : "spy"); }
    if (e.hp <= 0) {
        if(e.type === "sigma" && e.bassInterval) clearInterval(e.bassInterval);
        if (hasAliveMinions(e.type)) {
            e.element.remove(); window.flyingViruses = window.flyingViruses.filter(i => i !== e);
            alert(`⚠️ Босс повержен, но его свита или крестражи всё ещё активны! Убейте их всех, чтобы забрать лут!`);
            setTimeout(checkRoundEnd, 10); return;
        }

        e.element.remove(); let reward = 100 * window.currentRound;
        if (e.type === "lucifer") reward = 50000000;
        else if (e.type === "human") reward = 1000;
        else if (e.type === "sigma") reward = 100000000;
        else if (e.type === "vader") reward = 10500000;
        else if (e.type === "sauron") reward = 1000000;
        else if (e.type === "gazan") reward = 1000000;
        else if (e.type === "voldemort") reward = 500000000000;
        else if (e.type === "prototype_clone" || e.type === "prototype") reward = 1000000;
        else if (e.type === "mcdonald") reward = 50000000;
        else if (e.type === "neon_ninja") reward = 500000000;
        else if (e.isBoss) reward = (10000 * Math.pow(10, (window.currentRound / 10) - 1));

        const g = getDiffStats(); reward *= g.cash; if (window.chosenAura === "light") reward *= 2;
        
        if (e.type === "human") {
            let roll = Math.random(); if (roll < 0.5 && !window.unlockedWeapons.includes("human_gun")) window.unlockedWeapons.push("human_gun");
            if (roll < 0.5) window.loot.human_armor++; if (Math.random() < 0.4025 && !window.unlockedWeapons.includes("human_axe")) window.unlockedWeapons.push("human_axe");
            alert("Человек повержен!");
        }
        if (e.type === "sigma") { window.sigmaStatus = true; localStorage.setItem("vGame_sigmaStatus", "true"); alert("Вы Сигма! Урон x6!"); }
        if (e.type === "vader") {
            let roll = Math.random(); if (roll < 0.5) window.loot.vader_mask++; if (roll < 0.5 && !window.unlockedWeapons.includes("vader_saber")) window.unlockedWeapons.push("vader_saber");
            if (Math.random() < 0.40) window.loot.vader_cloak++; alert("Вейдер повержен!");
        }
        if (e.type === "sauron") {
            let roll = Math.random(); if (roll < 0.5 && !window.unlockedWeapons.includes("sauron_yatagan")) window.unlockedWeapons.push("sauron_yatagan");
            if (roll < 0.1) { window.sauronStatus = true; localStorage.setItem("vGame_sauronStatus", "true"); }
            if (Math.random() < 0.40) window.loot.sauron_wall++; alert("Саурон низвергнут!");
        }
        if (e.type === "lucifer") {
            let a = Math.random(); if (a < 0.5) window.loot.luc_wings++; if (a < 0.1) window.loot.luc_dna++; if(Math.random()<0.05) window.loot.luc_crown++; window.unlockedWeapons.push("luciferSword");
        }
        if (e.type === "voldemort") {
            if (Math.random() < 0.50 && !window.unlockedWeapons.includes("magic_wand")) window.unlockedWeapons.push("magic_wand");
            alert("🔮 Волан-Де-Морт окончательно уничтожен! Мир магии спасен!");
        }
        if (e.type === "prototype_clone") {
            let roll = Math.random();
            if (roll < 0.60) { window.loot.huggy_hand_item++; if(!window.unlockedWeapons.includes("huggy_hand")) window.unlockedWeapons.push("huggy_hand"); alert("Выпал лут: Рука Хагги Вагги!"); }
            else if (roll < 0.90) { window.loot.mommy_hand_item++; if(!window.unlockedWeapons.includes("mommy_hand")) window.unlockedWeapons.push("mommy_hand"); alert("Выпал лут: Рука Мамочки!"); }
            else { window.loot.claws_item++; if(!window.unlockedWeapons.includes("crab_claws")) window.unlockedWeapons.push("crab_claws"); alert("🔥 РЕДКИЙ ЛУТ: Клешни Прототипа!"); }
        }
        if (e.type === "mcdonald") {
            let roll = Math.random();
            if (roll < 0.60) { window.loot.mcd_tray_item++; if(!window.unlockedWeapons.includes("mcd_tray")) window.unlockedWeapons.push("mcd_tray"); alert("Выпал лут: Поднос Макдоналдс!"); }
            else if (roll < 0.90) { window.statusFat = true; localStorage.setItem("vGame_statusFat", "true"); alert("Вы получили пассивный статус: ЖИРНЫЙ!"); }
            else { window.loot.mcd_building++; document.getElementById("mcdRestaurantEl").style.display = "block"; alert("🏢 УЛЬТРА-ЛУТ: Вы построили ресторан Макдоналдс!"); }
        }
        if (e.type === "neon_ninja") {
            let roll = Math.random();
            if (roll < 0.30) { window.loot.ninja_pure_dna++; alert("Выпал лут: Образец Чистой ДНК!"); }
            else if (roll < 0.80) { if(!window.unlockedWeapons.includes("murasama_blade")) window.unlockedWeapons.push("murasama_blade"); alert("Выпал лут: Клинок Мурасама!"); }
            else { window.statusShadow = true; localStorage.setItem("vGame_statusShadow", "true"); alert("🥷 УЛЬТРА-СТАТУС: Вы получили статус Тень!"); }
        }

        if (!e.isZombie) window.score += reward; saveAllData();
        window.flyingViruses = window.flyingViruses.filter(i => i !== e); setTimeout(checkRoundEnd, 10);
    } else updateVirusText(e);
}

function saveAllData() { localStorage.setItem("vGame_brelers", window.score); localStorage.setItem("vGame_weapons", JSON.stringify(window.unlockedWeapons)); localStorage.setItem("vGame_levels", JSON.stringify(window.weaponLevels)); localStorage.setItem("vGame_loot", JSON.stringify(window.loot)); localStorage.setItem("vGame_favorites", JSON.stringify(window.favoriteWeapons)); localStorage.setItem("vGame_groups", JSON.stringify(window.weaponGroups)); updateInterfaceText(); }
updateInterfaceText();
if(window.loot.mcd_building >= 1) document.getElementById("mcdRestaurantEl").style.display = "block";
</script>
</body>
</html>
