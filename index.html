<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Арена Вирусов: Эволюция Боссов</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; user-select: none; }
        .lucifer-fire { position: absolute; background: radial-gradient(circle, #ff4500 0%, transparent 70%); pointer-events: none; z-index: 9991; animation: burn 0.5s infinite alternate; }
        .sound-wave { position: absolute; border: 4px double #00ffff; border-radius: 50%; pointer-events: none; z-index: 9992; animation: wave 0.8s linear forwards; }
        .volcano { position: absolute; bottom: 20px; right: 20px; width: 120px; height: 100px; background: linear-gradient(to top, #333, #555); clip-path: polygon(20% 100%, 40% 30%, 60% 30%, 80% 100%); border-top: 15px solid red; z-index: 9991; display: none; text-align: center; color: white; font-family: monospace; font-weight: bold; line-height: 140px; box-shadow: 0 0 30px red; }
        .game-wall { position: absolute; width: 15px; height: 120px; background: #00ffea; border: 1px solid #fff; box-shadow: 0 0 15px #00ffea; z-index: 9993; }
        @keyframes burn { from { transform: scale(1); opacity: 0.6; } to { transform: scale(1.2); opacity: 0.9; } }
        @keyframes wave { from { transform: scale(0.1); opacity: 1; } to { transform: scale(3); opacity: 0; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.5); }
        ::-webkit-scrollbar-thumb { background: #00ff00; border-radius: 3px; }
    </style>
</head>
<body>
<div id="volcanoEl" class="volcano">ВУЛКАН</div>
<script>
const arena = document.createElement("div"); arena.style.position = "fixed"; arena.style.top = "0"; arena.style.left = "0"; arena.style.width = "100vw"; arena.style.height = "100vh"; arena.style.backgroundColor = "black"; arena.style.zIndex = "9990"; arena.style.overflow = "hidden"; document.body.appendChild(arena);

// СБРОС ТЕКУЩЕГО РАУНДА ПРИ ВХОДЕ (Всегда 1 раунд, но очки и лут остаются!)
window.currentRound = 1;

window.score = parseInt(localStorage.getItem("vGame_brelers")) || 0;

// НОВЫЕ СТАТУСЫ
window.sigmaStatus = localStorage.getItem("vGame_sigmaStatus") === "true";
window.obiWanStatus = localStorage.getItem("vGame_obiWanStatus") === "true";
window.sauronStatus = localStorage.getItem("vGame_sauronStatus") === "true";

// ЗОМБИ-НАСТРОЙКИ (ДЛЯ СТАТУСА САУРОН)
window.zombieSettings = JSON.parse(localStorage.getItem("vGame_zombieSettings")) || { hp: 100, speed: 5 };

// ЛЮБИМОЕ ОРУЖИЕ (ЗАВЕРНУТОЕ В ПЛАЩ)
window.favoriteWeapons = JSON.parse(localStorage.getItem("vGame_favorites")) || [];

window.unlockedWeapons = JSON.parse(localStorage.getItem("vGame_weapons")) || ["laser", "bomb_default"];
window.weaponLevels = JSON.parse(localStorage.getItem("vGame_levels")) || { laser:1, bomb_default:1, brick:1, poison:1, darkBlade:1, gandalfStaff:1, hypnosis:1, godLight:1, luciferSword:1, saber:1, flyingMechSword:1, callLuciferPet:1, shocker:1, human_gun:1, human_axe:1, vader_saber:1, sauron_yatagan:1 };
window.loot = JSON.parse(localStorage.getItem("vGame_loot")) || { dna_default:0, core_default:0, luc_wings:0, luc_dna:0, luc_crown:0, human_armor:0, vader_mask:0, vader_cloak:0, sauron_wall:0 };

window.currentWeapon = "laser"; window.flyingViruses = []; window.gameWalls = [];
window.bombsLeft = 2; window.freezesLeft = 2; window.spawnedThisRound = 0;
window.cooldowns = { staff: 0, lightOfGod: 0, hypnosis: 0, shocker: 0, wall: 0 }; window.cursorSpeedMultiplier = 1;

let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2, realMouseX = mouseX, realMouseY = mouseY;
arena.onmousemove = (e) => { realMouseX = e.clientX; realMouseY = e.clientY; handleMouseTraces(); };
setInterval(() => { mouseX += (realMouseX - mouseX) * (0.2 * window.cursorSpeedMultiplier); mouseY += (realMouseY - mouseY) * (0.2 * window.cursorSpeedMultiplier); }, 16);

function getDiffStats() {
    if (window.gameDifficulty === "medium") return { speed: 1.5, hp: 1.5, cash: 1.5 };
    if (window.gameDifficulty === "hard") return { speed: 2, hp: 2, cash: 2 };
    if (window.gameDifficulty === "extreme") return { speed: 5, hp: 4, cash: 4 };
    return { speed: 1, hp: 1, cash: 1 };
}

const topBar = document.createElement("div"); topBar.style.position = "absolute"; topBar.style.top = "15px"; topBar.style.left = "20px"; topBar.style.display = "flex"; topBar.style.gap = "8px"; topBar.style.zIndex = "9999"; arena.appendChild(topBar);
const spawnBtn = document.createElement("button"); spawnBtn.style.padding = "8px 12px"; spawnBtn.style.background = "black"; spawnBtn.style.color = "#00ff00"; spawnBtn.style.border = "2px solid #00ff00"; spawnBtn.style.fontFamily = "monospace"; spawnBtn.style.cursor = "pointer"; spawnBtn.style.fontWeight = "bold"; topBar.appendChild(spawnBtn);

function getMaxViruses() { return window.currentRound % 10 === 0 ? 1 : window.currentRound; }
function updateSpawnButtonText() { spawnBtn.textContent = window.currentRound % 10 === 0 ? "ПРИЗВАТЬ БОССА РАУНДА" : `СПАВН ВИРУСА (${window.spawnedThisRound}/${getMaxViruses()})`; }
updateSpawnButtonText();

const menuBtn = spawnBtn.cloneNode(true); menuBtn.textContent = "МЕНЮ / ИНВЕНТАРЬ / ИНДЕКС"; topBar.appendChild(menuBtn);
const diffSelect = document.createElement("select"); diffSelect.style.background = "black"; diffSelect.style.color = "#00ff00"; diffSelect.style.border = "2px solid #00ff00"; diffSelect.style.fontFamily = "monospace"; diffSelect.style.fontWeight = "bold"; diffSelect.style.padding = "6px";
const modes = { easy: "Легкий (x1)", medium: "Средний (x1.5)", hard: "Сложный (x2)", extreme: "Экстремальный (x5)" };
for (let m in modes) { const opt = document.createElement("option"); opt.value = m; opt.textContent = modes[m]; if(m === window.gameDifficulty) opt.selected = true; diffSelect.appendChild(opt); }
diffSelect.onchange = () => { window.gameDifficulty = diffSelect.value; localStorage.setItem("vGame_diff", window.gameDifficulty); updateInterfaceText(); };
topBar.appendChild(diffSelect);

const scoreBoard = document.createElement("div"); scoreBoard.style.position = "absolute"; scoreBoard.style.top = "20px"; scoreBoard.style.right = "20px"; scoreBoard.style.color = "#00ff00"; scoreBoard.style.fontFamily = "monospace"; scoreBoard.style.fontSize = "22px"; scoreBoard.style.fontWeight = "bold"; scoreBoard.style.zIndex = "9999"; arena.appendChild(scoreBoard);
const roundBoard = scoreBoard.cloneNode(true); roundBoard.style.right = "320px"; arena.appendChild(roundBoard);

const infoBox = document.createElement("div"); infoBox.style.position = "absolute"; infoBox.style.bottom = "20px"; infoBox.style.left = "20px"; infoBox.style.width = "480px"; infoBox.style.backgroundColor = "rgba(0,0,0,0.9)"; infoBox.style.border = "1px solid #00ff00"; infoBox.style.zIndex = "9999"; infoBox.style.display = "flex"; infoBox.style.flexDirection = "column"; arena.appendChild(infoBox);
const infoHeader = document.createElement("div"); infoHeader.style.padding = "10px"; infoHeader.style.borderBottom = "1px solid #00ff00"; infoHeader.style.display = "flex"; infoHeader.style.justifyContent = "space-between"; infoHeader.style.alignItems = "center"; infoHeader.style.fontFamily = "monospace"; infoHeader.style.fontWeight = "bold"; infoHeader.style.color = "#00ff00"; infoHeader.style.cursor = "pointer"; infoBox.appendChild(infoHeader);
const infoTitle = document.createElement("span"); infoHeader.appendChild(infoTitle);
const toggleBtn = document.createElement("button"); toggleBtn.textContent = "[-] СВЕРНУТЬ"; toggleBtn.style.background = "transparent"; toggleBtn.style.border = "none"; toggleBtn.style.color = "#00ff00"; toggleBtn.style.fontFamily = "monospace"; toggleBtn.style.cursor = "pointer"; toggleBtn.style.fontWeight = "bold"; infoHeader.appendChild(toggleBtn);
const infoContent = document.createElement("div"); infoContent.style.padding = "15px"; infoContent.style.color = "#00ff00"; infoContent.style.fontFamily = "monospace"; infoContent.style.fontSize = "13px"; infoContent.style.lineHeight = "1.4"; infoContent.style.whiteSpace = "pre-line"; infoBox.appendChild(infoContent);
let isInfoCollapsed = false;
function toggleInfo() { infoContent.style.display = isInfoCollapsed ? "block" : "none"; infoHeader.style.borderBottom = isInfoCollapsed ? "1px solid #00ff00" : "none"; toggleBtn.textContent = isInfoCollapsed ? "[-] СВЕРНУТЬ" : "[+] РАЗВЕРНУТЬ"; isInfoCollapsed = !isInfoCollapsed; }
toggleBtn.onclick = (e) => { e.stopPropagation(); toggleInfo(); }; infoHeader.onclick = toggleInfo;

function updateInterfaceText() {
    scoreBoard.textContent = "БРЕЛЕРЫ: " + window.score.toLocaleString(); roundBoard.textContent = "РАУНД: " + window.currentRound; infoTitle.textContent = `=== СТАТУСЫ И АУРЫ ===`;
    let auraStr = window.chosenAura === "light" ? "Светлая (Брелеры x2)" : (window.chosenAura === "dark" ? "Тёмная (Сила x2)" : "Нет");
    let activeStatuses = [];
    if(window.musicianStatus) activeStatuses.push("Музыкант");
    if(window.sigmaStatus) activeStatuses.push("Сигма (урон x6)");
    if(window.obiWanStatus) activeStatuses.push("Оби-Ван-Кеноби");
    if(window.sauronStatus) activeStatuses.push("Саурон (Контроль зомби)");
    const weaponsMap = { laser: "Лазер", bomb_default: "Бомба", brick: "Кирпич", poison: "Отрава", darkBlade: "Меч Тьмы", gandalfStaff: "Посох Гэндальфа", hypnosis: "Гипноз", godLight: "Свет Бога", luciferSword: "Меч Люцифера", saber: "Сабля", flyingMechSword: "Летающий меч", callLuciferPet: "Призыв Люцифера", shocker: "Электрошокер", human_gun: "Человеческая Пушка", human_axe: "Топор Людей", vader_saber: "Лазерный Меч Вейдера", sauron_yatagan: "Ятаган Саурона" };
    infoContent.textContent = `Оружие: ${weaponsMap[window.currentWeapon] || window.currentWeapon} [Ур. ${window.weaponLevels[window.currentWeapon]||1}]\nАура: ${auraStr} | Статусы: ${activeStatuses.join(", ") || "Нет"}\n\n'Q' - Бомба | 'E' - Заморозка | 'K' - Поставить стену (из лута Саурона)`;
}

const megaWindow = document.createElement("div"); megaWindow.style.position = "absolute"; megaWindow.style.top = "70px"; megaWindow.style.left = "20px"; megaWindow.style.width = "calc(100vw - 40px)"; megaWindow.style.height = "calc(100vh - 180px)"; megaWindow.style.backgroundColor = "rgba(0,0,0,0.98)"; megaWindow.style.border = "2px solid #00ff00"; megaWindow.style.zIndex = "10000"; megaWindow.style.display = "none"; megaWindow.style.flexDirection = "column"; megaWindow.style.fontFamily = "monospace"; megaWindow.style.color = "#00ff00"; megaWindow.style.padding = "15px"; megaWindow.style.boxSizing = "border-box"; arena.appendChild(megaWindow);
menuBtn.onclick = (e) => { e.stopPropagation(); if (megaWindow.style.display === "none") { megaWindow.style.display = "flex"; switchTab("shop_normal"); } else { megaWindow.style.display = "none"; } };

const navTabs = document.createElement("div"); navTabs.style.display = "flex"; navTabs.style.gap = "6px"; navTabs.style.flexWrap = "wrap"; navTabs.style.borderBottom = "1px solid #00ff00"; navTabs.style.paddingBottom = "10px"; megaWindow.appendChild(navTabs);
const tabContainer = document.createElement("div"); tabContainer.style.flex = "1"; tabContainer.style.overflowY = "auto"; tabContainer.style.marginTop = "15px"; tabContainer.style.paddingRight = "5px"; megaWindow.appendChild(tabContainer);

const tabsConfig = [{ id: "shop_normal", name: "Обычный Магазин" }, { id: "shop_exclusive", name: "Эксклюзивное Оружие" }, { id: "shop_bonuses", name: "Магазин Бонусов" }, { id: "forge", name: "Кузница Крафта" }, { id: "inventory", name: "Инвентарь и Лут" }, { id: "virus_index", name: "Индекс Вирусов" }];
tabsConfig.forEach(t => { const btn = document.createElement("button"); btn.textContent = t.name; btn.style.background = "black"; btn.style.color = "#00ff00"; btn.style.border = "1px solid #00ff00"; btn.style.padding = "6px 10px"; btn.style.cursor = "pointer"; btn.style.fontWeight = "bold"; btn.onclick = () => switchTab(t.id); navTabs.appendChild(btn); });

function switchTab(tabId) { tabContainer.innerHTML = ""; if (tabId === "shop_normal") renderNormalShop(); if (tabId === "shop_exclusive") renderExclusiveShop(); if (tabId === "shop_bonuses") renderBonusesShop(); if (tabId === "forge") renderForge(); if (tabId === "inventory") renderInventory(); if (tabId === "virus_index") renderVirusIndex(); }

const normalWeapons = [{ id: "bomb_default", name: "Бомба", cost: 200, upgradeCost: 300, desc: "Взрывы кликом по площади.", color: "#ffff00" }, { id: "brick", name: "Кирпич", cost: 500, upgradeCost: 500, desc: "Бросок тяжелого кирпича. Крит х3.", color: "#cd853f" }, { id: "poison", name: "Отрава", cost: 1000, upgradeCost: 1000, desc: "Ядовитая лужа периодического урона.", color: "#00ff00" }, { id: "saber", name: "Сабля", cost: 100, upgradeCost: 200, desc: "1 урон на 1 ур., 10 урона на 10 ур. Крит х3.", color: "#aaa" }];
function renderNormalShop() { normalWeapons.forEach(item => { createWeaponShopRow(item, false); }); }

const exclusiveWeapons = [
    { id: "darkBlade", name: "Меч Тьмы", cost: 100000, upgradeCost: 50000, desc: "Урон ведением мыши по экрану. Крит х3.", color: "#8a2be2" }, 
    { id: "gandalfStaff", name: "Посох Гэндальфа", cost: 100000, upgradeCost: 80000, desc: "Взрыв на 600 урона. КД 10 сек.", color: "#00ffff" }, 
    { id: "hypnosis", name: "Гипноз", cost: 100000000, upgradeCost: 50000000, desc: "Обращает вирус в зомби-союзника. КД 10с.", color: "#00ffaa" }, 
    { id: "godLight", name: "Свет Бога", cost: 10000000000, upgradeCost: 5000000000, desc: "Аннигиляция врагов в области. КД 10с.", color: "#fff" }, 
    { id: "luciferSword", name: "Меч Люцифера", cost: 0, upgradeCost: 100000000, desc: "Трофей Босса Люцифера. Крит х3.", color: "#ff4500", isDropOnly: true }, 
    { id: "flyingMechSword", name: "Летающий меч", cost: 0, upgradeCost: 200000000, desc: "Крафт пушка. Рикошетит от стен.", color: "#ff8c00", isDropOnly: true }, 
    { id: "callLuciferPet", name: "Призыв Люцифера", cost: 0, upgradeCost: 500000000, desc: "Вызывает мини-Люцифера, выжигающего врагов.", color: "#ff3300", isDropOnly: true },
    { id: "human_gun", name: "Человеческая Пушка", cost: 0, upgradeCost: 5000, desc: "Выпадает с Человека. Стреляет мощно (600 урона).", color: "#6a5acd", isDropOnly: true },
    { id: "human_axe", name: "Топор Людей", cost: 0, upgradeCost: 7000, desc: "Выпадает с Человека. Тяжёлый топор с Крит х3.", color: "#8b4513", isDropOnly: true },
    { id: "vader_saber", name: "Лазерный Меч Вейдера", cost: 0, upgradeCost: 10000000, desc: "Выпадает с Вейдера. 800 базового урона, Крит х3.", color: "#ff0000", isDropOnly: true },
    { id: "sauron_yatagan", name: "Ятаган Саурона", cost: 0, upgradeCost: 50000000, desc: "Выпадает с Саурона. 500 урона, Крит х3.", color: "#4b0082", isDropOnly: true }
];
function renderExclusiveShop() { if (window.unlocked100Round) { const n = document.createElement("div"); n.style = "color:#00ffff;font-weight:bold;margin-bottom:10px;"; n.textContent = "🏆 100 раунд пройден! Эксклюзивное оружие доступно без ограничений!"; tabContainer.appendChild(n); } exclusiveWeapons.forEach(item => { createWeaponShopRow(item, true); }); }

function createWeaponShopRow(item, isEx) {
    const row = document.createElement("div"); row.style = "border:1px solid #00ff00;padding:10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;";
    const lvl = window.weaponLevels[item.id] || 1; const isUn = window.unlockedWeapons.includes(item.id) || item.id === "laser" || window.unlocked100Round;
    const left = document.createElement("div"); left.style = "display:flex;flex-direction:column;gap:4px;";
    const name = document.createElement("span"); name.style.color = item.color; name.style.fontWeight = "bold"; name.textContent = `${item.name} [Ур. ${lvl}${lvl >= 10 ? " МАКС" : ""}] ${window.favoriteWeapons.includes(item.id) ? "⭐" : ""}`;
    const desc = document.createElement("span"); desc.style.fontSize = "11px;color:#aaa;"; desc.textContent = item.desc; left.appendChild(name); left.appendChild(desc);
    const right = document.createElement("div"); right.style.display = "flex"; right.style.gap = "6px";
    const buyBtn = document.createElement("button"); buyBtn.style.padding = "5px 8px"; buyBtn.style.cursor = "pointer";
    if (isUn) { buyBtn.textContent = "РАЗБЛОКИРОВАНО"; buyBtn.style.background = "#222"; buyBtn.style.color = "#555"; buyBtn.style.border = "1px solid #555"; }
    else if (item.isDropOnly) { buyBtn.textContent = "ТОЛЬКО КРАФТ / ЛУТ"; buyBtn.style.background = "#200"; buyBtn.style.color = "#ff3333"; buyBtn.style.border = "1px solid #ff3333"; }
    else { buyBtn.textContent = `КУПИТЬ (${item.cost.toLocaleString()})`; buyBtn.style.background = "black"; buyBtn.style.color = "#00ff00"; buyBtn.style.border = "1px solid #00ff00"; buyBtn.onclick = () => { if (window.score >= item.cost) { window.score -= item.cost; window.unlockedWeapons.push(item.id); if(item.id === "darkBlade") window.hasDarkBlade = true; saveAllData(); switchTab(isEx ? "shop_exclusive" : "shop_normal"); } }; }
    const costToUpgrade = item.upgradeCost * lvl; const upBtn = document.createElement("button"); upBtn.style.padding = "5px 8px"; upBtn.style.cursor = "pointer";
    if (lvl >= 10) { upBtn.textContent = "МАКС"; upBtn.style.background = "#222"; upBtn.style.color = "#555"; upBtn.style.border = "1px solid #555"; }
    else { upBtn.textContent = `УЛУЧШИТЬ (+${costToUpgrade.toLocaleString()})`; upBtn.style.background = "black"; upBtn.style.color = "#00ffff"; upBtn.style.border = "1px solid #00ffff"; upBtn.disabled = !isUn; if(!isUn) { upBtn.style.color = "#333"; upBtn.style.borderColor = "#333"; } upBtn.onclick = () => { if (window.score >= costToUpgrade) { window.score -= costToUpgrade; window.weaponLevels[item.id]++; saveAllData(); switchTab(isEx ? "shop_exclusive" : "shop_normal"); } }; }
    const sellBtn = document.createElement("button"); sellBtn.style.padding = "5px 8px"; sellBtn.style.background = "#300"; sellBtn.style.color = "red"; sellBtn.style.border = "1px solid red"; sellBtn.style.cursor = "pointer"; sellBtn.textContent = `ЛОМБАРД (+${(item.cost/2).toLocaleString()})`;
    // ЗАЩИТА: Запрет продажи, если оружие завернуто в плащ (Любимое)
    sellBtn.style.display = isUn && item.id !== "laser" && !item.isDropOnly && !window.favoriteWeapons.includes(item.id) ? "block" : "none";
    sellBtn.onclick = () => { if(window.currentWeapon === item.id) window.currentWeapon = "laser"; window.score += item.cost / 2; window.unlockedWeapons = window.unlockedWeapons.filter(id => id !== item.id); if(item.id === "darkBlade") window.hasDarkBlade = false; saveAllData(); switchTab(isEx ? "shop_exclusive" : "shop_normal"); };
    right.appendChild(buyBtn); right.appendChild(upBtn); right.appendChild(sellBtn); row.appendChild(left); row.appendChild(right); tabContainer.appendChild(row);
}
function renderBonusesShop(){
    const e = document.createElement("div"); e.style = "border:1px solid #ffd700;padding:15px;display:flex;flex-direction:column;gap:10px;";
    
    // Статус Оби-Ван (для вызова Вейдера)
    const obiBox = document.createElement("div"); obiBox.style = "border-bottom:1px solid #444;padding-bottom:10px;";
    obiBox.innerHTML = `<b>🟢 СТАТУС: Оби-Ван-Кеноби (Цена: 200,000 бр.)</b><br><span style='font-size:12px;color:#aaa'>Необходим для вызова Дарт Вейдера. Даёт 6X урона на всех мечах и саблях!</span><br>`;
    const obiBtn = document.createElement("button"); obiBtn.style = "margin-top:5px;cursor:pointer;";
    if(window.obiWanStatus) { obiBtn.textContent = "КУПЛЕНО"; obiBtn.style.background = "#222"; obiBtn.style.color = "#555"; }
    else {
        obiBtn.textContent = "АКТИВИРОВАТЬ СТАТУС"; obiBtn.style = "background:black;color:#00ff00;border:1px solid #00ff00;";
        obiBtn.onclick = () => { if(window.score >= 200000) { window.score -= 200000; window.obiWanStatus = true; saveAllData(); renderBonusesShop(); } else alert("Не хватает брелеров!"); };
    }
    obiBox.appendChild(obiBtn); e.appendChild(obiBox);

    // Панель вызова Боссов
    const bTitle = document.createElement("b"); bTitle.style.color = "#ff3300"; bTitle.textContent = "☠️ ВЫЗОВ ЭКСКЛЮЗИВНЫХ БОССОВ:"; e.appendChild(bTitle);
    
    const bosses = [
        { id: "human", name: "Человек (500 HP)", desc: "Каждые 5с спавнит подмогу. Награда: 1000 бр. Лут: Пушка, Броня, Топор.", req: true },
        { id: "sigma", name: "Сигма (1,000,000 HP)", desc: "Награда: 100М бр. + Статус Сигма (6X урона всему оружию!).", req: true },
        { id: "vader", name: "Дарт Вейдер (1,000,000,000,000 HP)", desc: "Требует статус Оби-Ван! Спавнит роботов. Лут: Маска, Световой Меч, Плащ.", req: window.obiWanStatus },
        { id: "sauron", name: "Саурон (Бесконечное HP)", desc: "Уничтожается только сбросом Кольца в Вулкан! Лут: Ятаган, Стены, Статус.", req: true },
        { id: "lucifer", name: "Люцифер (100,000,000 HP)", desc: "Замедляет прицел. Разблокируется после 10 раунда.", req: window.firstBossDefeated }
    ];

    bosses.forEach(b => {

        const ctx = new(window.AudioContext||window.webkitAudioContext)(), osc = ctx.createOscillator(), gain = ctx.createGain();

}

    }
    window.flyingViruses.forEach(v => {
        const r = v.element.getBoundingClientRect();
        if (mouseX >= r.left && mouseX <= r.right && mouseY >= r.top && mouseY <= r.bottom) {
            if (window.currentWeapon === "darkBlade") {
                playSound('laser');
                let d = 15 * (window.weaponLevels.darkBlade || 1);
                if (Math.random() < 0.1) d *= 3; // 10% Шанс крита х3
                if (v.type !== "mutant") damageVirus(v, d * getAuraMult() * getStatusMult("darkBlade"));
            }
            if (window.currentWeapon === "luciferSword" && v.type !== "mutant" && !v.isBurning) {
                v.isBurning = true; v.burnTicks = 5;
            }
        }
    });
}

function getAuraMult() { return window.chosenAura === "dark" ? 2 : 1; }
function getStatusMult(wId) {
    let m = 1;
    if (window.sigmaStatus) m *= 6; // Статус Сигма дает 6Х урона на всё
    const swordWeapons = ["darkBlade", "luciferSword", "vader_saber", "saber"];
    if (window.obiWanStatus && swordWeapons.includes(wId)) m *= 6; // Оби-Ван дает 6Х мечам
    return m;
}

setInterval(() => {
    window.flyingViruses.forEach(v => {
        if (v.isBurning && v.burnTicks > 0) {
            v.burnTicks--; v.element.style.backgroundColor = "#ff4500";
            let t = 600 * (window.weaponLevels.luciferSword || 1);
            if (Math.random() < 0.1) t *= 3; // 10% Шанс крита х3
            damageVirus(v, t * getStatusMult("luciferSword"));
            if (v.burnTicks <= 0) { v.isBurning = false; v.element.style.backgroundColor = "black"; }
        }
    });
}, 1000);

// ИИ зомби-вирусов (подчиняются настройкам Саурона)
setInterval(() => {
    const z = window.flyingViruses.filter(e => e.isZombie);
    const n = window.flyingViruses.filter(e => !e.isZombie);
    z.forEach(e => {
        const rectZ = e.element.getBoundingClientRect(); const g = rectZ.left + rectZ.width / 2; const a = rectZ.top + rectZ.height / 2;
        n.forEach(t => {
            const rectN = t.element.getBoundingClientRect(); const o = Math.sqrt(Math.pow((rectN.left + rectN.width / 2) - g, 2) + Math.pow((rectN.top + rectN.height / 2) - a, 2));
            const s = window.weaponLevels.hypnosis || 1;
            if (o <= 150) { playSound('zombie'); damageVirus(t, 100 * s); damageVirus(e, 100 * s); }
        });
    });
}, 1000);

// ==========================================
// 8. КЛИКИ, АТАКИ И СВЕРХ-СПОСОБНОСТИ
// ==========================================
arena.onclick = function(e) {
    const t = e.target;
    const n = t && t.textContent && (t.textContent.includes("TARGET") || t.textContent.includes("БОСС") || t.textContent.includes("ZOMBIE") || t.textContent.includes("ЛЮЦИФЕР") || t.textContent.includes("ШПИОН") || t.textContent.includes("ДОКТОР") || t.textContent.includes("МУТАНТ") || t.textContent.includes("ГАЗАН") || t.textContent.includes("ЧЕЛОВЕК") || t.textContent.includes("СИГМА") || t.textContent.includes("ВЕЙДЕР") || t.textContent.includes("САУРОН") || t.textContent.includes("РОБОТ") || t.textContent.includes("ОРК"));
    let lvl = window.weaponLevels[window.currentWeapon] || 1;
    
    // Музыкант: Шанс волны
    if (n && window.musicianStatus && Math.random() < 0.465) {
        const w = document.createElement("div"); w.className = "sound-wave"; w.style.left = mouseX + "px"; w.style.top = mouseY + "px"; arena.appendChild(w); setTimeout(() => w.remove(), 800);
        window.flyingViruses.forEach(item => {
            if (Math.sqrt(Math.pow(item.x - mouseX, 2) + Math.pow(item.y - mouseY, 2)) <= 300) {
                item.isFrozen = true; item.element.style.borderColor = "#00ffff"; setTimeout(() => { item.isFrozen = false; item.element.style.borderColor = "#ff3333"; }, 3000); damageVirus(item, 100);
            }
        });
    }

    if (window.currentWeapon === "shocker") {
        if (Date.now() < window.cooldowns.shocker) { alert("Шокер КД!"); return; }
        window.cooldowns.shocker = Date.now() + 10000; playSound('laser');
        let a = [], o = 250; window.flyingViruses.forEach(v => { if (Math.sqrt(Math.pow(v.x - mouseX, 2) + Math.pow(v.y - mouseY, 2)) <= o) a.push(v); });
        let s = 50 * lvl * a.length; a.forEach(v => damageVirus(v, s * getStatusMult("shocker"))); return;
    }
    
    if (window.currentWeapon === "brick") {
        playSound('explosion'); window.flyingViruses.forEach(v => {
            const r = v.element.getBoundingClientRect(); if (mouseX >= r.left && mouseX <= r.right && mouseY >= r.top && mouseY <= r.bottom) {
                let d = 300 * g; if (Math.random() < 0.1) d *= 3; damageVirus(v, d * getAuraMult() * getStatusMult("brick"));
            }
        }); return;
    }

    if (n) {
        e.stopPropagation(); const a = window.flyingViruses.find(i => i.element === t); if (!a || a.isZombie) return;
        if (a.type === "sauron") { alert("Саурон неуязвим для оружия! Затолкните Кольцо в вулкан!"); return; }
        
        let o = 100;
        if (window.currentWeapon === "laser") o = 100;
        if (window.currentWeapon === "bomb_default") o = 200;
        if (window.currentWeapon === "saber") o = 1;
        if (window.currentWeapon === "human_gun") o = 600;
        if (window.currentWeapon === "human_axe") o = 400;
        if (window.currentWeapon === "vader_saber") o = 800;
        if (window.currentWeapon === "sauron_yatagan") o = 500;

        o *= lvl;
        const chanceWeapons = ["brick", "saber", "darkBlade", "luciferSword", "human_axe", "vader_saber", "sauron_yatagan"];
        if (chanceWeapons.includes(window.currentWeapon) && Math.random() < 0.1) o *= 3; // 10% шанс крита х3
        
        if (window.currentWeapon === "bomb_default") {
            playSound('explosion'); const rect = t.getBoundingClientRect(); window.flyingViruses.forEach(vItem => { if (Math.sqrt(Math.pow(vItem.x - rect.left, 2) + Math.pow(vItem.y - rect.top, 2)) <= 150) damageVirus(vItem, o * getAuraMult() * getStatusMult("bomb_default")); });
        } else {
            playSound('laser'); damageVirus(a, o * getAuraMult() * getStatusMult(window.currentWeapon));
        }
    }
};

function damageVirus(e, t) {
    e.hp -= t;
    if (e.type === "mutant" && e.hp <= 100 && e.hp + t > 100) { createVirusElement(100, false, false, Math.random() < 0.5 ? "doctor" : "spy"); }
    if (e.hp <= 0) {
        e.element.remove();
        let n = 100 * window.currentRound;
        if (e.type === "lucifer") n = 50000000;
        else if (e.type === "human") n = 1000;
        else if (e.type === "sigma") n = 100000000;
        else if (e.type === "vader") n = 10500000;
        else if (e.type === "sauron") n = 1000000;
        else if (e.isBoss) n = (10000 * Math.pow(10, (window.currentRound / 10) - 1));

        const g = getDiffStats(); n *= g.cash; if (window.chosenAura === "light") n *= 2; // Светлая аура удваивает брелеры
        
        // Расчёт уникального лута с новых боссов
        if (e.type === "human") {
            let roll = Math.random();
            if (roll < 0.5 && !window.unlockedWeapons.includes("human_gun")) window.unlockedWeapons.push("human_gun");
            if (roll < 0.5) window.loot.human_armor++;
            if (Math.random() < 0.4025 && !window.unlockedWeapons.includes("human_axe")) window.unlockedWeapons.push("human_axe");
            alert("Человек повержен! Проверьте Инвентарь.");
        }
        if (e.type === "sigma") { window.sigmaStatus = true; localStorage.setItem("vGame_sigmaStatus", "true"); alert("Вы обрели статус СИГМА! Весь ваш урон умножен на 6!"); }
        if (e.type === "vader") {
            let roll = Math.random();
            if (roll < 0.5) window.loot.vader_mask++;
            if (roll < 0.5 && !window.unlockedWeapons.includes("vader_saber")) window.unlockedWeapons.push("vader_saber");
            if (Math.random() < 0.40) window.loot.vader_cloak++;
            alert("Дарт Вейдер уничтожен! Маска, Лазерный меч и Плащ распределены в инвентарь.");
        }
        if (e.type === "sauron") {
            let roll = Math.random();
            if (roll < 0.5 && !window.unlockedWeapons.includes("sauron_yatagan")) window.unlockedWeapons.push("sauron_yatagan");
            if (roll < 0.1) { window.sauronStatus = true; localStorage.setItem("vGame_sauronStatus", "true"); }
            if (Math.random() < 0.40) window.loot.sauron_wall++;
            alert("Саурон низвергнут в бездну! Кольцо уничтожено.");
        }
        if (e.type === "lucifer") {
            let a = Math.random(); if (a < 0.5) window.loot.luc_wings++; if (a < 0.1) window.loot.luc_dna++; if (a < 0.01) window.loot.luc_crown++;
            window.hasLuciferSword = true; localStorage.setItem("vGame_hasLuciferSword", "true"); if (!window.unlockedWeapons.includes("luciferSword")) window.unlockedWeapons.push("luciferSword");
            alert("Вы одолели Люцифера! Меч Люцифера открыт!");
        }
        if (e.isBoss && window.currentRound === 10) { window.firstBossDefeated = true; localStorage.setItem("virusGame_boss1", "true"); }
        if (e.isBoss && window.currentRound === 100) { window.unlocked100Round = true; localStorage.setItem("vGame_r100_win", "true"); alert("🏆 100 раунд пройден! Открыт полный доступ ко всему эксклюзивному арсеналу!"); }
        
        if (!e.isZombie) window.score += n;
        saveAllData(); window.flyingViruses = window.flyingViruses.filter(i => i !== e); setTimeout(checkRoundEnd, 10);
    } else updateVirusText(e);
}

// Поставить стену Саурона на клавишу K
window.onkeydown = function(e) {
    const k = e.key;
    if (k.toLowerCase() === 'k' || k.toLowerCase() === 'л') {
        if (window.loot.sauron_wall <= 0) return;
        window.loot.sauron_wall--;
        const w = document.createElement("div"); w.className = "game-wall"; w.style.left = mouseX + "px"; w.style.top = (mouseY - 60) + "px"; arena.appendChild(w); window.gameWalls.push(w);
        setTimeout(() => { w.remove(); window.gameWalls = window.gameWalls.filter(item => item !== w); }, 8000); saveAllData();
    }
    if (k.toLowerCase() === 'q' || k.toLowerCase() === 'й') {
        if (window.bombsLeft <= 0) return; window.bombsLeft--; updateInterfaceText(); playSound('explosion');
        const b = document.createElement("div"); b.style = `position:absolute;left:${mouseX - 25}px;top:${mouseY - 25}px;width:50px;height:50px;border-radius:50%;background:red;border:3px solid white;color:white;text-align:center;line-height:50px;font-weight:bold;z-index:9998;`;
        let g = 3; b.textContent = g; arena.appendChild(b);
        const a = setInterval(() => { g--; b.textContent = g; if (g <= 0) { clearInterval(a); const rect = b.getBoundingClientRect(); const t = rect.left + 25; const z = rect.top + 25; b.remove(); window.flyingViruses.forEach(virusItem => { if (!virusItem.isZombie && Math.sqrt(Math.pow(virusItem.x - t, 2) + Math.pow(virusItem.y - z, 2)) <= 250) damageVirus(virusItem, 600); }); } }, 1000);
    }
    if (k.toLowerCase() === 'e' || k.toLowerCase() === 'у') {
        if (window.freezesLeft <= 0) return; window.freezesLeft--; updateInterfaceText(); playSound('god');
        window.flyingViruses.forEach(e => { e.isFrozen = true; e.element.style.borderColor = "#00ffff"; });
        setTimeout(() => { window.flyingViruses.forEach(e => { e.isFrozen = false; e.element.style.borderColor = e.type === 'lucifer' ? "#ff4500" : (e.isBoss ? "#8a2be2" : "#ff3333"); }); }, 5000);
    }
};

function checkRoundEnd() {
    if (window.spawnedThisRound >= getMaxViruses() && window.flyingViruses.length === 0) {
        if (window.currentRound === 20 && window.chosenAura === "none") {
            const e = confirm("Вы прошли 20 раунд! Выберите СВЕТЛУЮ ауру (Брелеры х2) - ОК, или ТЕМНУЮ (Сила х2) - Отмена"); window.chosenAura = e ? "light" : "dark"; localStorage.setItem("vGame_aura", window.chosenAura);
        }
        window.currentRound++; window.bombsLeft = 2; window.freezesLeft = 2; window.spawnedThisRound = 0; updateSpawnButtonText(); saveAllData(); updateInterfaceText(); alert(`Раунд пройден! Начинается раунд ${window.currentRound}`);
    }
}

function saveAllData() { localStorage.setItem("vGame_brelers", window.score); localStorage.setItem("vGame_round", window.currentRound); localStorage.setItem("vGame_weapons", JSON.stringify(window.unlockedWeapons)); localStorage.setItem("vGame_levels", JSON.stringify(window.weaponLevels)); localStorage.setItem("vGame_loot", JSON.stringify(window.loot)); localStorage.setItem("vGame_favorites", JSON.stringify(window.favoriteWeapons)); updateInterfaceText(); }
updateInterfaceText();
</script>
</body>
