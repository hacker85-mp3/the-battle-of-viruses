<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Арена Вирусов</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; }
        .lucifer-fire { position: absolute; background: radial-gradient(circle, #ff4500 0%, transparent 70%); pointer-events: none; z-index: 9991; animation: burn 0.5s infinite alternate; }
        @keyframes burn { from { transform: scale(1); opacity: 0.6; } to { transform: scale(1.2); opacity: 0.9; } }
    </style>
</head>
<body>
<script>
// ==========================================
// 1. ИГРОВЫЕ ПЕРЕМЕННЫЕ И УРОВНИ ПРОКАЧКИ
// ==========================================
const arena = document.createElement("div");
arena.style.position = "fixed"; arena.style.top = "0"; arena.style.left = "0";
arena.style.width = "100vw"; arena.style.height = "100vh";
arena.style.backgroundColor = "black"; arena.style.zIndex = "9990";
arena.style.overflow = "hidden"; document.body.appendChild(arena);

window.score = parseInt(localStorage.getItem("virusGame_score")) || 0;
window.unlockedWeapons = JSON.parse(localStorage.getItem("virusGame_weapons")) || ["laser", "bomb_default"];
window.hasDarkBlade = localStorage.getItem("virusGame_hasDarkBlade") === "true";
window.hasLuciferSword = localStorage.getItem("virusGame_hasLuciferSword") === "true";
window.firstBossDefeated = localStorage.getItem("virusGame_boss1") === "true";

// Хранилище уровней оружия (по умолчанию 1 уровень)
window.weaponLevels = JSON.parse(localStorage.getItem("virusGame_weaponLevels")) || {
    laser: 1, bomb_default: 1, brick: 1, poison: 1, darkBlade: 1, gandalfStaff: 1, hypnosis: 1, godLight: 1, luciferSword: 1
};

if (window.hasDarkBlade && !window.unlockedWeapons.includes("darkBlade")) window.unlockedWeapons.push("darkBlade");
if (window.hasLuciferSword && !window.unlockedWeapons.includes("luciferSword")) window.unlockedWeapons.push("luciferSword");

window.currentWeapon = "laser"; window.flyingViruses = [];
window.currentRound = 1; window.bombsLeft = 2; window.freezesLeft = 2; window.spawnedThisRound = 0;
window.cooldowns = { staff: 0, lightOfGod: 0, hypnosis: 0 };
window.cursorSpeedMultiplier = 1;

let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
let realMouseX = mouseX, realMouseY = mouseY;

arena.onmousemove = (e) => {
    realMouseX = e.clientX; realMouseY = e.clientY;
    handleDarkBladeTrace();
    handleLuciferTrace();
};

setInterval(() => {
    mouseX += (realMouseX - mouseX) * (0.2 * window.cursorSpeedMultiplier);
    mouseY += (realMouseY - mouseY) * (0.2 * window.cursorSpeedMultiplier);
}, 16);

// ==========================================
// 2. ИНТЕРФЕЙС И ТАБЛО ОЧКОВ
// ==========================================
const spawnBtn = document.createElement("button");
spawnBtn.style.position = "absolute"; spawnBtn.style.top = "20px"; spawnBtn.style.left = "20px";
spawnBtn.style.padding = "10px 15px"; spawnBtn.style.background = "black"; spawnBtn.style.color = "#00ff00";
spawnBtn.style.border = "2px solid #00ff00"; spawnBtn.style.fontFamily = "monospace"; spawnBtn.style.cursor = "pointer";
spawnBtn.style.fontWeight = "bold"; spawnBtn.style.zIndex = "9999"; arena.appendChild(spawnBtn);

function getMaxViruses() { return window.currentRound % 10 === 0 ? 1 : window.currentRound; }
function updateSpawnButtonText() {
    if (window.currentRound % 10 === 0) spawnBtn.textContent = window.spawnedThisRound > 0 ? "БОСС НА АРЕНЕ" : "ПРИЗВАТЬ БОССА";
    else spawnBtn.textContent = `СПАВН ВИРУСА (${window.spawnedThisRound}/${getMaxViruses()})`;
}
updateSpawnButtonText();

const shopBtn = spawnBtn.cloneNode(true); shopBtn.textContent = "МАГАЗИН И ПРОКАЧКА"; shopBtn.style.left = "280px"; arena.appendChild(shopBtn);
const scoreBoard = document.createElement("div"); scoreBoard.style.position = "absolute"; scoreBoard.style.top = "20px"; scoreBoard.style.right = "20px"; scoreBoard.style.color = "#00ff00"; scoreBoard.style.fontFamily = "monospace"; scoreBoard.style.fontSize = "24px"; scoreBoard.style.fontWeight = "bold"; scoreBoard.style.zIndex = "9999"; scoreBoard.textContent = "ОЧКИ: " + window.score; arena.appendChild(scoreBoard);
const roundBoard = scoreBoard.cloneNode(true); roundBoard.style.right = "250px"; roundBoard.textContent = "РАУНД: " + window.currentRound; arena.appendChild(roundBoard);

const infoBox = document.createElement("div"); infoBox.style.position = "absolute"; infoBox.style.bottom = "20px"; infoBox.style.left = "20px"; infoBox.style.width = "470px"; infoBox.style.backgroundColor = "rgba(0,0,0,0.85)"; infoBox.style.border = "1px solid #00ff00"; infoBox.style.zIndex = "9999"; infoBox.style.display = "flex"; infoBox.style.flexDirection = "column"; arena.appendChild(infoBox);
const infoHeader = document.createElement("div"); infoHeader.style.padding = "10px 15px"; infoHeader.style.borderBottom = "1px solid #00ff00"; infoHeader.style.display = "flex"; infoHeader.style.justifyContent = "space-between"; infoHeader.style.alignItems = "center"; infoHeader.style.fontFamily = "monospace"; infoHeader.style.fontWeight = "bold"; infoHeader.style.color = "#00ff00"; infoHeader.style.cursor = "pointer"; infoBox.appendChild(infoHeader);
const infoTitle = document.createElement("span"); infoHeader.appendChild(infoTitle);
const toggleBtn = document.createElement("button"); toggleBtn.textContent = "[-] СВЕРНУТЬ"; toggleBtn.style.background = "transparent"; toggleBtn.style.border = "none"; toggleBtn.style.color = "#00ff00"; toggleBtn.style.fontFamily = "monospace"; toggleBtn.style.cursor = "pointer"; toggleBtn.style.fontWeight = "bold"; infoHeader.appendChild(toggleBtn);
const infoContent = document.createElement("div"); infoContent.style.padding = "15px"; infoContent.style.color = "#00ff00"; infoContent.style.fontFamily = "monospace"; infoContent.style.fontSize = "13px"; infoContent.style.lineHeight = "1.4"; infoContent.style.whiteSpace = "pre-line"; infoBox.appendChild(infoContent);

let isInfoCollapsed = false;
function toggleInfo() { infoContent.style.display = isInfoCollapsed ? "block" : "none"; infoHeader.style.borderBottom = isInfoCollapsed ? "1px solid #00ff00" : "none"; toggleBtn.textContent = isInfoCollapsed ? "[-] СВЕРНУТЬ" : "[+] РАЗВЕРНУТЬ"; isInfoCollapsed = !isInfoCollapsed; }
toggleBtn.onclick = (e) => { e.stopPropagation(); toggleInfo(); }; infoHeader.onclick = toggleInfo;

function updateInterfaceText() {
    infoTitle.textContent = window.currentRound % 10 === 0 ? `⚠️ РАУНД С БОССОМ ${window.currentRound} ⚠️` : `=== РАУНД ${window.currentRound} ===`;
    const weaponsMap = { laser: "ЛАЗЕР", bomb_default: "БОМБА", brick: "КИРПИЧ", poison: "ОТРАВА", darkBlade: "КЛИНОК ТЕМНОТЫ", gandalfStaff: "ПОСОХ ГЭНДАЛЬФА", godLight: "СВЕТ БОГА", hypnosis: "ГИПНОЗ", luciferSword: "МЕЧ ЛЮЦИФЕРА" };
    const curLvl = window.weaponLevels[window.currentWeapon] || 1;
    infoContent.textContent = `Текущее оружие: ${weaponsMap[window.currentWeapon]} [Ур. ${curLvl}]
'Q' - Бесплатная Бомба (${window.bombsLeft}/2) | 'E' - Заморозка врагов на 5с (${window.freezesLeft}/2)

ХОТКЕИ: 1:Лазер | 2:Бомба | 3:Кирпич | 4:Отрава | 5:Клинок | 6:Посох | 7:Свет Бога | 8:Гипноз | 9:Меч Люцифера`;
}
updateInterfaceText();

// ==========================================
// 3. МАГАЗИН ОРУЖИЯ С СИСТЕМОЙ ПРОКАЧКИ ДО 10 УРОВНЯ
// ==========================================
const shopWindow = document.createElement("div");
shopWindow.style.position = "absolute"; shopWindow.style.top = "80px"; shopWindow.style.left = "280px";
shopWindow.style.width = "370px"; shopWindow.style.maxHeight = "400px"; shopWindow.style.background = "rgba(0,0,0,0.95)";
shopWindow.style.border = "2px solid #00ff00"; shopWindow.style.padding = "15px"; shopWindow.style.fontFamily = "monospace";
shopWindow.style.color = "#00ff00"; shopWindow.style.display = "none"; shopWindow.style.zIndex = "10000";
shopWindow.style.overflowY = "auto"; arena.appendChild(shopWindow);

const shopTitle = document.createElement("div"); shopTitle.style.fontWeight = "bold"; shopTitle.style.marginBottom = "15px"; shopTitle.textContent = "=== ОРУЖЕЙНАЯ, ПРОКАЧКА И ЛОМБАРД ===";

const luciferBox = document.createElement("div");
luciferBox.style.border = "2px solid #ff4500"; luciferBox.style.padding = "10px"; luciferBox.style.marginBottom = "15px";
luciferBox.style.display = window.firstBossDefeated ? "flex" : "none";
luciferBox.style.flexDirection = "column"; luciferBox.style.gap = "4px";

const luciferName = document.createElement("span"); luciferName.style.color = "#ff4500"; luciferName.style.fontWeight = "bold"; luciferName.textContent = "🔥 ВЫЗВАТЬ ЛЮЦИФЕРА (СУПЕР-БОСС)";
const luciferDesc = document.createElement("span"); luciferDesc.style.fontSize = "11px"; luciferDesc.style.color = "#aaa"; luciferDesc.textContent = "100 000 000 HP. Замедляет курсор. Награда: Меч Люцифера!";
const luciferCallBtn = document.createElement("button"); luciferCallBtn.style.background = "#300"; luciferCallBtn.style.color = "#ff4500"; luciferCallBtn.style.border = "1px solid #ff4500"; luciferCallBtn.style.cursor = "pointer"; luciferCallBtn.textContent = "ПРИЗВАТЬ НА АРЕНУ";

luciferCallBtn.onclick = (e) => { e.stopPropagation(); shopWindow.style.display = "none"; spawnLucifer(); };
luciferBox.appendChild(luciferName); luciferBox.appendChild(luciferDesc); luciferBox.appendChild(luciferCallBtn);

// Список всех пушек, их базовый урон, базовая стоимость и цена улучшения за уровень
const shopItems = [
    { id: "laser", name: "Лазер", cost: 0, upgradeCost: 1000, desc: "Стартовое оружие клика.", color: "#ff3333" },
    { id: "bomb_default", name: "Бомба", cost: 200, upgradeCost: 3000, desc: "Клик бьет по площади взрывом.", color: "#ffff00" },
    { id: "brick", name: "Кирпич", cost: 500, upgradeCost: 5000, desc: "Одиночный бросок тяжелого кирпича.", color: "#cd853f" },
    { id: "poison", name: "Отрава", cost: 1000, upgradeCost: 8000, desc: "Оставляет лужу, бьющую ядом.", color: "#00ff00" },
    { id: "darkBlade", name: "Клинок Темноты", cost: 100000, upgradeCost: 50000, desc: "Разрезает толпы вирусов движением мыши.", color: "#8a2be2" },
    { id: "gandalfStaff", name: "Посох Гэндальфа", cost: 100000, upgradeCost: 150000, desc: "Мега-взрыв. Перезарядка 10 сек.", color: "#00ffff" },
    { id: "hypnosis", name: "Гипноз", cost: 100000000, upgradeCost: 200000000, desc: "Обращает вирус против своих.", color: "#00ffaa" },
    { id: "godLight", name: "Свет Бога", cost: 10000000000, upgradeCost: 5000000000, desc: "Стирает всё в зоне.", color: "#fff" },
    { id: "luciferSword", name: "Меч Люцифера", cost: 0, upgradeCost: 500000000, desc: "Огненные ловушки [F] и бросок [R].", color: "#ff4500" }
];

function rebuildShopInterface() {
    while (shopWindow.firstChild) { shopWindow.removeChild(shopWindow.firstChild); }
    shopWindow.appendChild(shopTitle);
    
    luciferBox.style.display = window.firstBossDefeated ? "flex" : "none";
    shopWindow.appendChild(luciferBox);

    shopItems.forEach(item => {
        const box = document.createElement("div"); box.style.border = "1px dashed #00ff00"; box.style.padding = "10px"; box.style.marginBottom = "10px"; box.style.display = "flex"; box.style.flexDirection = "column"; box.style.gap = "4px";
        const lvl = window.weaponLevels[item.id] || 1;
        const isUnlocked = window.unlockedWeapons.includes(item.id) || item.id === "laser" || (item.id === "luciferSword" && window.hasLuciferSword);
        
        const name = document.createElement("span"); name.style.color = item.color; name.style.fontWeight = "bold"; 
        name.textContent = `${item.name} [Уровень ${lvl}${lvl >= 10 ? " (МАКС)" : ""}]`;
        
        const desc = document.createElement("span"); desc.style.fontSize = "11px"; desc.style.color = "#aaa"; desc.textContent = item.desc;
        
        // Расчет стоимости апгрейда: базовая цена * текущий уровень
        const costToUpgrade = item.upgradeCost * lvl;
        
        const containerBtns = document.createElement("div"); containerBtns.style.display = "flex"; containerBtns.style.gap = "4px";

        const btnBuy = document.createElement("button"); btnBuy.style.background = "#222"; btnBuy.style.color = "#00ff00"; btnBuy.style.border = "1px solid #00ff00"; btnBuy.style.cursor = "pointer"; btnBuy.style.flex = "1";
        btnBuy.textContent = isUnlocked ? "КУПЛЕНО" : `КУПИТЬ (${item.cost.toLocaleString()})`;
        if (isUnlocked) { btnBuy.style.color = "#555"; btnBuy.style.borderColor = "#555"; }

        // КНОПКА ПРОКАЧКИ УРОВНЯ
        const btnUpgrade = document.createElement("button"); btnUpgrade.style.background = "#113"; btnUpgrade.style.color = "#00ffff"; btnUpgrade.style.border = "1px solid #00ffff"; btnUpgrade.style.cursor = "pointer"; btnUpgrade.style.flex = "1";
        btnUpgrade.textContent = lvl >= 10 ? "МАКС УРОВЕНЬ" : `УЛУЧШИТЬ (+${costToUpgrade.toLocaleString()})`;
        btnUpgrade.style.display = isUnlocked && lvl < 10 ? "block" : (lvl >= 10 && isUnlocked ? "block" : "none");
        if (lvl >= 10) { btnUpgrade.style.color = "#555"; btnUpgrade.style.borderColor = "#555"; }

        // КНОПКА ЛОМБАРДА
        const btnSell = document.createElement("button"); btnSell.style.background = "#300"; btnSell.style.color = "#ff3333"; btnSell.style.border = "1px solid #ff3333"; btnSell.style.cursor = "pointer";
        btnSell.textContent = `ПРОДАТЬ В ЛОМБАРД (+${(item.cost / 2).toLocaleString()})`;
        // Стартовый лазер и трофейный меч Люцифера продать нельзя
        btnSell.style.display = isUnlocked && item.id !== "laser" && item.id !== "luciferSword" ? "block" : "none";

        btnBuy.onclick = (e) => {
            e.stopPropagation();
            if (window.unlockedWeapons.includes(item.id)) return;
            if (window.score >= item.cost) {
                window.score -= item.cost; window.unlockedWeapons.push(item.id);
                if (item.id === "darkBlade") { window.hasDarkBlade = true; localStorage.setItem("virusGame_hasDarkBlade", "true"); }
                saveAllData(); rebuildShopInterface(); updateInterfaceText();
            } else { alert("Недостаточно очков!"); }
        };

        btnUpgrade.onclick = (e) => {
            e.stopPropagation();
            if (lvl >= 10) return;
            if (window.score >= costToUpgrade) {
                window.score -= costToUpgrade;
                window.weaponLevels[item.id]++;
                saveAllData(); rebuildShopInterface(); updateInterfaceText();
                alert(`Уровень оружия ${item.name} повышен до ${window.weaponLevels[item.id]}! Урон увеличен.`);
            } else { alert(`Не хватает ${(costToUpgrade - window.score).toLocaleString()} очков для улучшения!`); }
        };

        btnSell.onclick = (e) => {
            e.stopPropagation();
            if (window.currentWeapon === item.id) window.currentWeapon = "laser";
            window.score += (item.cost / 2);
            window.unlockedWeapons = window.unlockedWeapons.filter(id => id !== item.id);
            if (item.id === "darkBlade") { window.hasDarkBlade = false; localStorage.setItem("virusGame_hasDarkBlade", "false"); }
            saveAllData(); rebuildShopInterface(); updateInterfaceText();
        };

        box.appendChild(name); box.appendChild(desc); if (!isUnlocked) box.appendChild(cost);
        containerBtns.appendChild(btnBuy); containerBtns.appendChild(btnUpgrade);
        box.appendChild(containerBtns); box.appendChild(btnSell); shopWindow.appendChild(box);
    });
}

function saveAllData() {
    scoreBoard.textContent = "ОЧКИ: " + window.score;
    localStorage.setItem("virusGame_score", window.score);
    localStorage.setItem("virusGame_weapons", JSON.stringify(window.unlockedWeapons));
    localStorage.setItem("virusGame_weaponLevels", JSON.stringify(window.weaponLevels));
}

shopBtn.onclick = (e) => { e.stopPropagation(); if(shopWindow.style.display === "none") { rebuildShopInterface(); shopWindow.style.display = "block"; } else { shopWindow.style.display = "none"; } };
// ==========================================
// 4. СИНТЕЗАТОР ЗВУКОВЫХ ЭФФЕКТОВ (БЕЗ ФАЙЛОВ)
// ==========================================
function playSound(type) {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);

        const now = ctx.currentTime;
        if (type === 'laser') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
            gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15); osc.start(now); osc.stop(now + 0.15);
        } else if (type === 'explosion' || type === 'fire') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(type === 'fire' ? 180 : 120, now); osc.frequency.linearRampToValueAtTime(10, now + 0.4);
            gain.gain.setValueAtTime(0.6, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4); osc.start(now); osc.stop(now + 0.4);
        } else if (type === 'glass') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(1500, now); osc.frequency.setValueAtTime(1800, now + 0.05);
            gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15); osc.start(now); osc.stop(now + 0.15);
        } else if (type === 'poison') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(250, now); osc.frequency.linearRampToValueAtTime(200, now + 0.2);
            gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2); osc.start(now); osc.stop(now + 0.2);
        } else if (type === 'god') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(554, now); osc.frequency.setValueAtTime(659, now);
            gain.gain.setValueAtTime(0.4, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.8); osc.start(now); osc.stop(now + 0.8);
        } else if (type === 'zombie') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(90, now); osc.frequency.linearRampToValueAtTime(70, now + 0.5);
            gain.gain.setValueAtTime(0.4, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5); osc.start(now); osc.stop(now + 0.5);
        }
    } catch(e) { console.log("Ошибка аудио:", e); }
}

// ==========================================
// 5. ДВИЖОК И СПАВН ВИРУСОВ / БОССОВ
// ==========================================
spawnBtn.onclick = function(e) {
    e.stopPropagation();
    if (window.spawnedThisRound >= getMaxViruses() || (window.currentRound % 10 === 0 && window.flyingViruses.length > 0)) return;
    
    window.spawnedThisRound++; updateSpawnButtonText();
    
    const isBossRound = window.currentRound % 10 === 0;
    const bossIndex = window.currentRound / 10;
    const maxHp = isBossRound ? (10000 * Math.pow(10, bossIndex - 1)) : (100 * window.currentRound);
    
    createVirusElement(maxHp, isBossRound, false);
};

function createVirusElement(maxHp, isBoss, isLucifer) {
    const el = document.createElement("div");
    el.style.position = "absolute"; el.style.backgroundColor = "black"; el.style.fontFamily = "monospace";
    el.style.fontWeight = "bold"; el.style.cursor = "crosshair"; el.style.zIndex = "9995";
    
    if (isLucifer) {
        el.style.border = "6px solid #ff4500"; el.style.padding = "40px 60px"; el.style.fontSize = "30px"; el.style.color = "#fff";
        el.style.background = "linear-gradient(45deg, #ff4500, #ff8c00)"; el.style.boxShadow = "0 0 50px #ff4500";
        el.style.left = (window.innerWidth / 2 - 150) + "px"; el.style.top = (window.innerHeight / 2 - 80) + "px";
        el.textContent = `😈 ЛЮЦИФЕР [100000000/100000000 HP]`;
    } else if (isBoss) {
        el.style.border = "4px solid #8a2be2"; el.style.padding = "25px 40px"; el.style.fontSize = "24px"; el.style.color = "#fff"; el.style.boxShadow = "0 0 30px #ff3333";
        el.style.left = (window.innerWidth / 2 - 150) + "px"; el.style.top = (window.innerHeight / 2 - 50) + "px";
        el.textContent = `👑 БОСС [${maxHp}/${maxHp} HP]`;
    } else {
        el.style.border = "1px solid #ff3333"; el.style.padding = "8px"; el.style.color = "#ff3333";
        el.style.left = (Math.random() * (window.innerWidth - 150)) + "px"; el.style.top = (100 + Math.random() * (window.innerHeight - 200)) + "px";
        el.textContent = `🦠 TARGET_${window.spawnedThisRound} [${maxHp}/${maxHp} HP]`;
    }
    arena.appendChild(el);

    const speed = isLucifer ? 22 : (isBoss ? (14 + (window.currentRound/10) * 2) : 5 * (1 + window.currentRound * 0.15));
    window.flyingViruses.push({
        element: el, x: parseFloat(el.style.left), y: parseFloat(el.style.top),
        speedX: (Math.random() - 0.5) * speed, speedY: (Math.random() - 0.5) * speed,
        hp: maxHp, maxHp: maxHp, isBoss: isBoss, id: window.spawnedThisRound, isZombie: false, isLucifer: isLucifer,
        isFrozen: false, isBurning: false, burnTicks: 0
    });
}

function spawnLucifer() {
    window.spawnedThisRound = 1;
    createVirusElement(100000000, true, true);
    
    window.luciferFireInterval = setInterval(() => {
        const lucifer = window.flyingViruses.find(v => v.isLucifer);
        if (!lucifer) { clearInterval(window.luciferFireInterval); return; }
        
        const f = document.createElement("div"); f.className = "lucifer-fire";
        f.style.left = (lucifer.x + 30) + "px"; f.style.top = (lucifer.y + 30) + "px";
        f.style.width = "180px"; f.style.height = "180px"; arena.appendChild(f);
        playSound('fire');

        const checkSlow = setInterval(() => {
            if (!arena.contains(f)) { clearInterval(checkSlow); return; }
            const fR = f.getBoundingClientRect();
            const dist = Math.sqrt(Math.pow((fR.left+90) - mouseX, 2) + Math.pow((fR.top+90) - mouseY, 2));
            window.cursorSpeedMultiplier = dist <= 90 ? 0.2 : 1;
        }, 100);

        setTimeout(() => { clearInterval(checkSlow); window.cursorSpeedMultiplier = 1; f.remove(); }, 4000);
    }, 1500);
}

function moveEngine() {
    window.flyingViruses.forEach(item => {
        if (!item.isFrozen) {
            const rect = item.element.getBoundingClientRect();
            item.x += item.speedX; item.y += item.speedY;
            if (item.x <= 0 || item.x + rect.width >= window.innerWidth) item.speedX *= -1;
            if (item.y <= 0 || item.y + rect.height >= window.innerHeight) item.speedY *= -1;
            item.element.style.left = item.x + "px"; item.element.style.top = item.y + "px";
        }
    });
    requestAnimationFrame(moveEngine);
}
moveEngine();

setInterval(() => {
    window.flyingViruses.forEach(item => {
        if (item.isBurning && item.burnTicks > 0) {
            item.burnTicks--;
            item.element.style.backgroundColor = "#ff4500";
            // Урон от горения меча Люцифера увеличивается от уровня прокачки
            const lvl = window.weaponLevels.luciferSword || 1;
            damageVirus(item, 600 * lvl);
            if (item.burnTicks <= 0) { item.isBurning = false; item.element.style.backgroundColor = "black"; }
        }
    });
}, 1000);

// ==========================================
// 6. СЛЕДЫ БЛИЖНЕГО ОРУЖИЯ (МЫШЬ)
// ==========================================
function handleDarkBladeTrace() {
    if (window.currentWeapon === "darkBlade" && window.unlockedWeapons.includes("darkBlade")) {
        window.flyingViruses.forEach(item => {
            const r = item.element.getBoundingClientRect();
            if (!item.isZombie && mouseX >= r.left && mouseX <= r.right && mouseY >= r.top && mouseY <= r.bottom) {
                playSound('laser'); 
                // УРОН КЛИНКА ТЕМНОТЫ: 15 на 1 ур., 50 на 2 ур., и по +30 за каждый ур. дальше
                const lvl = window.weaponLevels.darkBlade || 1;
                let darkBladeDamage = 15;
                if (lvl > 1) darkBladeDamage = 15 + (lvl - 1) * 32; // Около 300 урона за микротик на 10 ур.!
                damageVirus(item, darkBladeDamage); 
            }
        });
    }
}

function handleLuciferTrace() {
    if (window.currentWeapon === "luciferSword" && window.unlockedWeapons.includes("luciferSword")) {
        const trace = document.createElement("div");
        trace.style.position = "absolute"; trace.style.left = mouseX + "px"; trace.style.top = mouseY + "px";
        trace.style.width = "10px"; trace.style.height = "10px"; trace.style.borderRadius = "50%";
        trace.style.backgroundColor = "#ff4500"; trace.style.boxShadow = "0 0 15px #ff4500";
        trace.style.pointerEvents = "none"; arena.appendChild(trace); setTimeout(() => trace.remove(), 250);

        window.flyingViruses.forEach(item => {
            const r = item.element.getBoundingClientRect();
            if (!item.isZombie && mouseX >= r.left && mouseX <= r.right && mouseY >= r.top && mouseY <= r.bottom) {
                if (!item.isBurning) { item.isBurning = true; item.burnTicks = 5; }
            }
        });
    }
}

setInterval(() => {
    const zombies = window.flyingViruses.filter(v => v.isZombie);
    const normals = window.flyingViruses.filter(v => !v.isZombie);
    zombies.forEach(zombie => {
        const zR = zombie.element.getBoundingClientRect();
        const zX = zR.left + zR.width/2, zY = zR.top + zR.height/2;
        normals.forEach(normal => {
            const nR = normal.element.getBoundingClientRect();
            const dist = Math.sqrt(Math.pow((nR.left + nR.width/2) - zX, 2) + Math.pow((nR.top + nR.height/2) - zY, 2));
            // Урон зомби зависит от его уровня прокачки гипноза
            const lvl = window.weaponLevels.hypnosis || 1;
            if (dist <= 150) { playSound('zombie'); damageVirus(normal, 100 * lvl); damageVirus(zombie, 100 * lvl); }
        });
    });
}, 1000);

// ==========================================
// 7. КЛИКИ: АТАКА И ИСПОЛЬЗОВАНИЕ ОРУЖИЯ
// ==========================================
arena.onclick = function(e) {
    const targetEl = e.target;
    const isVirus = targetEl && targetEl.textContent && (targetEl.textContent.includes("TARGET") || targetEl.textContent.includes("БОСС") || targetEl.textContent.includes("ZOMBIE") || targetEl.textContent.includes("ЛЮЦИФЕР"));
    
    if (window.currentWeapon === "brick" && window.unlockedWeapons.includes("brick")) {
        playSound('glass'); createFlashEffect(mouseX, mouseY, 40, "#cd853f");
        const lvl = window.weaponLevels.brick || 1;
        window.flyingViruses.forEach(item => {
            const r = item.element.getBoundingClientRect();
            if (!item.isZombie && mouseX >= r.left && mouseX <= r.right && mouseY >= r.top && mouseY <= r.bottom) damageVirus(item, 300 * lvl);
        });
        return;
    }

    if (window.currentWeapon === "poison" && window.unlockedWeapons.includes("poison")) {
        playSound('poison');
        const puddle = document.createElement("div");
        puddle.style.position = "absolute"; puddle.style.left = (mouseX - 60) + "px"; puddle.style.top = (mouseY - 60) + "px";
        puddle.style.width = "120px"; puddle.style.height = "120px"; puddle.style.borderRadius = "50%";
        puddle.style.background = "radial-gradient(circle, rgba(0,255,0,0.5) 0%, transparent 70%)";
        puddle.style.pointerEvents = "none"; puddle.style.zIndex = "9991"; arena.appendChild(puddle);
        
        const lvl = window.weaponLevels.poison || 1;
        const poisonInterval = setInterval(() => {
            if (!arena.contains(puddle)) { clearInterval(poisonInterval); return; }
            const pR = puddle.getBoundingClientRect();
            const pX = pR.left + 60, pY = pR.top + 60;
            window.flyingViruses.forEach(item => {
                if (!item.isZombie) {
                    const vR = item.element.getBoundingClientRect();
                    const dist = Math.sqrt(Math.pow((vR.left + vR.width/2) - pX, 2) + Math.pow((vR.top + vR.height/2) - pY, 2));
                    if (dist <= 70) damageVirus(item, 20 * lvl);
                }
            });
        }, 1000);
        setTimeout(() => { clearInterval(poisonInterval); puddle.remove(); }, 5000);
        return;
    }

    if (window.currentWeapon === "gandalfStaff" && window.unlockedWeapons.includes("gandalfStaff")) {
        if (Date.now() < window.cooldowns.staff) { alert("Посох перезаряжается!"); return; }
        window.cooldowns.staff = Date.now() + 10000;
        playSound('explosion'); createFlashEffect(mouseX, mouseY, 250, "#00ffff");
        const lvl = window.weaponLevels.gandalfStaff || 1;
        window.flyingViruses.forEach(item => {
            if (!item.isZombie) {
                const r = item.element.getBoundingClientRect();
                const dist = Math.sqrt(Math.pow((r.left + r.width/2) - mouseX, 2) + Math.pow((r.top + r.height/2) - mouseY, 2));
                if (dist <= 250) damageVirus(item, 600 * lvl);
            }
        });
        return;
    }

    if (window.currentWeapon === "godLight" && window.unlockedWeapons.includes("godLight")) {
        if (Date.now() < window.cooldowns.lightOfGod) { alert("Свет Бога перезаряжается!"); return; }
        window.cooldowns.lightOfGod = Date.now() + 10000;
        playSound('god'); createFlashEffect(mouseX, mouseY, 200, "#ffffff");
        window.flyingViruses.forEach(item => {
            if (!item.isZombie && !item.isLucifer) {
                const r = item.element.getBoundingClientRect();
                const dist = Math.sqrt(Math.pow((r.left + r.width/2) - mouseX, 2) + Math.pow((r.top + r.height/2) - mouseY, 2));
                if (dist <= 200) damageVirus(item, item.maxHp);
            }
        });
        return;
    }

    if (window.currentWeapon === "hypnosis" && window.unlockedWeapons.includes("hypnosis")) {
        if (Date.now() < window.cooldowns.hypnosis) { alert("Гипноз перезаряжается!"); return; }
        if (isVirus) {
            const virusItem = window.flyingViruses.find(item => item.element === targetEl);
            if (virusItem && !virusItem.isZombie && !virusItem.isLucifer) {
                window.cooldowns.hypnosis = Date.now() + 10000; playSound('zombie');
                virusItem.isZombie = true; virusItem.element.style.borderColor = "#00ffaa"; virusItem.element.style.color = "#00ffaa";
                virusItem.element.textContent = `🧟 ZOMBIE [${virusItem.hp}/${virusItem.maxHp} HP]`;
            }
        }
        return;
    }

    if (isVirus) {
        e.stopPropagation();
        const virusItem = window.flyingViruses.find(item => item.element === targetEl);
        if (!virusItem || virusItem.isZombie) return;
        if (window.currentWeapon === "laser") { playSound('laser'); const lvl = window.weaponLevels.laser || 1; damageVirus(virusItem, 100 * lvl); }
        if (window.currentWeapon === "bomb_default") { playSound('explosion'); const lvl = window.weaponLevels.bomb_default || 1; damageVirus(virusItem, 200 * lvl); }
    }
};

function jsonSaveGame() {
    localStorage.setItem("virusGame_score", window.score);
    localStorage.setItem("virusGame_weapons", JSON.stringify(window.unlockedWeapons));
    localStorage.setItem("virusGame_weaponLevels", JSON.stringify(window.weaponLevels));
}

function damageVirus(item, dmg) {
    item.hp -= dmg;
    if (item.hp <= 0) {
        item.element.remove();
        let reward = item.isLucifer ? 50000000 : (item.isBoss ? (10000 * Math.pow(10, (window.currentRound/10) - 1)) : 100 * window.currentRound);
        
        if (item.isLucifer) {
            window.hasLuciferSword = true; localStorage.setItem("virusGame_hasLuciferSword", "true");
            if (!window.unlockedWeapons.includes("luciferSword")) window.unlockedWeapons.push("luciferSword");
            alert("🔥 ВЫ ПОБЕДИЛИ ЛЮЦИФЕРА! Меч Люцифера разблокирован (Клавиша 9)!");
        }

        if (item.isBoss && window.currentRound === 10) {
            window.firstBossDefeated = true; localStorage.setItem("virusGame_boss1", "true");
        }

        if (!item.isZombie) { window.score += reward; scoreBoard.textContent = "ОЧКИ: " + window.score; jsonSaveGame(); }
        window.flyingViruses = window.flyingViruses.filter(v => v !== item);
        setTimeout(checkRoundEnd, 10);
    } else {
        if (item.isZombie) item.element.textContent = `🧟 ZOMBIE [${item.hp}/${item.maxHp} HP]`;
        else if (item.isLucifer) item.element.textContent = `😈 ЛЮЦИФЕР [${item.hp}/${item.maxHp} HP]`;
        else if (item.isBoss) item.element.textContent = `👑 БОСС [${item.hp}/${item.maxHp} HP]`;
        else item.element.textContent = `🦠 TARGET_${item.id} [${item.hp}/${item.maxHp} HP]`;
    }
}

function createFlashEffect(x, y, radius, color) {
    const flash = document.createElement("div");
    flash.style.position = "absolute"; flash.style.left = (x - radius) + "px"; flash.style.top = (y - radius) + "px";
    flash.style.width = (radius*2) + "px"; flash.style.height = (radius*2) + "px"; flash.style.borderRadius = "50%";
    flash.style.background = `radial-gradient(circle, ${color} 0%, transparent 70%)`;
    flash.style.pointerEvents = "none"; flash.style.zIndex = "9997"; arena.appendChild(flash);
    setTimeout(() => flash.remove(), 400);
}

// ==========================================
// 8. ГОРЯЧИЕ КЛАВИШИ И ТАЙМЕРЫ
// ==========================================
window.onkeydown = function(e) {
    if (e.key === "1") { window.currentWeapon = "laser"; updateInterfaceText(); }
    if (e.key === "2") { window.currentWeapon = "bomb_default"; updateInterfaceText(); }
    if (e.key === "3" && window.unlockedWeapons.includes("brick")) { window.currentWeapon = "brick"; updateInterfaceText(); }
    if (e.key === "4" && window.unlockedWeapons.includes("poison")) { window.currentWeapon = "poison"; updateInterfaceText(); }
    if (e.key === "5" && window.unlockedWeapons.includes("darkBlade")) { window.currentWeapon = "darkBlade"; updateInterfaceText(); }
    if (e.key === "6" && window.unlockedWeapons.includes("gandalfStaff")) { window.currentWeapon = "gandalfStaff"; updateInterfaceText(); }
    if (e.key === "7" && window.unlockedWeapons.includes("godLight")) { window.currentWeapon = "godLight"; updateInterfaceText(); }
    if (e.key === "8" && window.unlockedWeapons.includes("hypnosis")) { window.currentWeapon = "hypnosis"; updateInterfaceText(); }
    if (e.key === "9" && window.unlockedWeapons.includes("luciferSword")) { window.currentWeapon = "luciferSword"; updateInterfaceText(); }
    
    if (e.key.toLowerCase() === "e" || e.key.toLowerCase() === "у") {
        if (window.freezesLeft <= 0) return;
        window.freezesLeft--; updateInterfaceText(); playSound('god');

        window.flyingViruses.forEach(v => {
            v.isFrozen = true; v.element.style.borderColor = "#00ffff"; v.element.style.boxShadow = "0 0 15px #00ffff";
        });

        setTimeout(() => {
            window.flyingViruses.forEach(v => {
                v.isFrozen = false; v.element.style.borderColor = v.isLucifer ? "#ff4500" : (v.isBoss ? "#8a2be2" : "#ff3333");
                v.element.style.boxShadow = "none";
            });
        }, 5000);
    }

    if ((e.key.toLowerCase() === "f" || e.key.toLowerCase() === "а") && window.currentWeapon === "luciferSword") {
        playSound('fire');
        const fire = document.createElement("div"); fire.className = "lucifer-fire";
        fire.style.left = (mouseX - 50) + "px"; fire.style.top = (mouseY - 50) + "px";
        fire.style.width = "100px"; fire.style.height = "100px"; arena.appendChild(fire);

        const lvl = window.weaponLevels.luciferSword || 1;
        const burnInt = setInterval(() => {
            if (!arena.contains(fire)) { clearInterval(burnInt); return; }
            window.flyingViruses.forEach(item => {
                const r = item.element.getBoundingClientRect();
                if (mouseX >= r.left && mouseX <= r.right && mouseY >= r.top && mouseY <= r.bottom) damageVirus(item, 100 * lvl);
            });
        }, 300);
        setTimeout(() => { clearInterval(burnInt); fire.remove(); }, 3000);
    }

    if ((e.key.toLowerCase() === "r" || e.key.toLowerCase() === "к") && window.currentWeapon === "luciferSword") {
        playSound('laser');
        const proj = document.createElement("div");
        proj.style.position = "absolute"; proj.style.left = mouseX + "px"; proj.style.top = mouseY + "px";
        proj.style.width = "40px"; proj.style.height = "6px"; proj.style.backgroundColor = "#ff4500";
        proj.style.boxShadow = "0 0 15px #ff4500"; proj.style.zIndex = "9998"; arena.appendChild(proj);

        let pX = mouseX;
        const projInt = setInterval(() => {
            pX += 15; proj.style.left = pX + "px";
            if (pX > window.innerWidth || !arena.contains(proj)) { clearInterval(projInt); proj.remove(); return; }

            window.flyingViruses.forEach(item => {
                const r = item.element.getBoundingClientRect();
                if (pX >= r.left && pX <= r.right && mouseY >= r.top && mouseY <= r.bottom) {
                    if (!item.isBurning) { item.isBurning = true; item.burnTicks = 5; }
                }
            });
        }, 16);
    }

    if (e.key.toLowerCase() === "q" || e.key.toLowerCase() === "й") {
        if (window.bombsLeft <= 0) return;
        window.bombsLeft--; updateInterfaceText(); playSound('explosion');

        const bombEl = document.createElement("div");
        bombEl.style.position = "absolute"; bombEl.style.left = (mouseX - 25) + "px"; bombEl.style.top = (mouseY - 25) + "px";
        bombEl.style.width = "50px"; bombEl.style.height = "50px"; bombEl.style.borderRadius = "50%";
        bombEl.style.backgroundColor = "red"; bombEl.style.border = "3px solid white"; bombEl.style.color = "white";
        bombEl.style.fontFamily = "monospace"; bombEl.style.fontWeight = "bold"; bombEl.style.display = "flex";
        bombEl.style.alignItems = "center"; bombEl.style.justifyContent = "center"; bombEl.style.zIndex = "9998";
        
        let timeLeft = 3; bombEl.textContent = timeLeft; arena.appendChild(bombEl);

        const timerInterval = setInterval(() => {
            timeLeft--; bombEl.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                
                const bombRect = bombEl.getBoundingClientRect();
                const bX = bombRect.left + bombRect.width / 2;
                const bY = bombRect.top + bombRect.height / 2;
                
                createFlashEffect(bX, bY, 250, "orange"); 
                bombEl.remove();

                window.flyingViruses.forEach(item => {
                    if (!item.isZombie) {
                        const rect = item.element.getBoundingClientRect();
                        const vX = rect.left + rect.width / 2;
                        const vY = rect.top + rect.height / 2;
                        
                        const dist = Math.sqrt(Math.pow(vX - bX, 2) + Math.pow(vY - bY, 2));
                        if (dist <= 250) damageVirus(item, 600);
                    }
                });
            }
        }, 1000);
    }
};

function checkRoundEnd() {
    if (window.spawnedThisRound >= getMaxViruses() && window.flyingViruses.length === 0) {
        window.currentRound++;
        if ((window.currentRound - 1) % 10 === 0) {
            const bossIndex = (window.currentRound - 1) / 10;
            alert(`🎉 НЕВЕРОЯТНО! Раунд с боссом пройден! Начинается РАУНД ${window.currentRound}.`);
        } else {
            alert(`🎉 Раунд пройден! Начинается РАУНД ${window.currentRound}. Лимит вирусов: ${getMaxViruses()}!`);
        }
        window.bombsLeft = 2; window.freezesLeft = 2; window.spawnedThisRound = 0;
        roundBoard.textContent = "РАУНД: " + window.currentRound;
        updateSpawnButtonText(); updateInterfaceText();
    }
}
</script>
